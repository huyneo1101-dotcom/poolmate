<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>PoolMate — Kết nối & ghép cặp người chơi bi-a</title>
<!-- PWA: cài như app + chạy offline (chỉ hoạt động khi mở qua http/https, không phải file://) -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0fb985" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="PoolMate" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />

<!-- Leaflet (bản đồ) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- React + Babel (không cần build) -->
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
<!-- Supabase (backend tuỳ chọn — chỉ hoạt động khi người dùng cấu hình URL+key) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root{
    --felt:#0a5c42; --felt-dark:#073d2c; --felt-light:#0b6e4f;
    --bg:#0c1411; --panel:#10211a; --panel-2:#16302479; --card:#13241d;
    --line:#1f3b2e; --gold:#f2c14e; --gold-dim:#caa23f;
    --text:#eaf3ee; --muted:#8fb0a1; --muted-2:#6f9384;
    --red:#e5564b; --blue:#3d7bd6; --zalo:#0068ff; --fb:#1877f2;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
    /* accent contrast + chip — đổi theo từng theme */
    --gold-top:#f7d271; --gold-sh:rgba(242,193,78,.26); --on-gold:#3a2e06;
    --chip-bg:#0e2c20; --chip-fg:#9fe7c4; --chip-bd:#1c4a37;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #114a37 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #0d3a2b 0%, transparent 55%),
      var(--bg);
    color:var(--text); -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100%}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  input,select,textarea{font-family:inherit}
  a{color:var(--gold)}

  .app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
  @media(min-width:900px){ .app{max-width:920px} }

  /* ===== Top bar ===== */
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,rgba(12,20,17,.96),rgba(12,20,17,.78));backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.2px}
  .ball{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;font-weight:900;
    background:radial-gradient(circle at 32% 28%, #fff 0 12%, var(--gold) 13% 70%, var(--gold-dim) 100%);
    color:var(--on-gold);box-shadow:inset -3px -4px 8px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.4)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.3px}
  @media(max-width:400px){ .brand small{display:none} .me{gap:4px} }
  .topbar .me{margin-left:auto;display:flex;align-items:center;gap:8px}

  .avatar{border-radius:50%;display:grid;place-items:center;font-weight:800;color:#06120d;flex:none;
    box-shadow:0 2px 8px rgba(0,0,0,.35), inset 0 0 0 2px rgba(255,255,255,.08)}

  /* ===== Generic ===== */
  .content{flex:1;padding:16px 16px 96px}
  .h1{font-size:22px;font-weight:800;margin:2px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .row{display:flex;gap:10px;align-items:center}
  .wrap{flex-wrap:wrap}
  .grow{flex:1}
  .pill{padding:6px 11px;border-radius:999px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);font-size:12.5px;font-weight:600;white-space:nowrap;cursor:pointer;
    transition:background .15s ease,color .15s ease,border-color .15s ease,transform .06s ease}
  .pill:hover{border-color:var(--gold-dim);color:var(--text)}
  .pill:active{transform:scale(.95)}
  .pill.on{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}
  .pill.on:hover{color:var(--on-gold)}
  .chip{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;background:var(--chip-bg);color:var(--chip-fg);
    border:1px solid var(--chip-bd)}
  .chip.gt{background:#10243a;color:#9ec7ff;border-color:#1f4368}

  .card{background:linear-gradient(180deg,var(--card),#0f1f18);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);
    transition:border-color .15s ease,transform .08s ease,box-shadow .15s ease}
  .card+.card{margin-top:12px}

  .btn{padding:11px 16px;border-radius:12px;font-weight:800;font-size:14px;color:var(--on-gold);
    background:linear-gradient(180deg,var(--gold-top),var(--gold));box-shadow:0 4px 14px var(--gold-sh);
    transition:transform .06s ease, filter .15s ease, box-shadow .15s ease}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px);box-shadow:0 2px 8px var(--gold-sh)}
  .btn.block{width:100%}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);box-shadow:none}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold);filter:none}
  .btn.green{background:linear-gradient(180deg,var(--felt-light),var(--felt-dark));color:#eafff4;border:1px solid var(--felt);
    box-shadow:0 6px 16px rgba(0,0,0,.22)}
  .btn.sm{padding:8px 12px;font-size:12.5px;border-radius:10px}
  .btn.danger{background:transparent;border:1px solid #5a2b28;color:#f0a59f;box-shadow:none}
  .btn.danger:hover{border-color:#e5564b;color:#ff9b92;filter:none}
  .btn:disabled{opacity:.5;cursor:default;box-shadow:none;filter:none}

  .field{margin-bottom:12px}
  .field label{display:block;font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .input,.select,.textarea{width:100%;padding:11px 12px;border-radius:11px;background:#0b1813;
    border:1px solid var(--line);color:var(--text);font-size:14px;
    transition:border-color .15s ease, box-shadow .15s ease}
  .input:focus,.select:focus,.textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(242,193,78,.16)}
  .textarea{resize:vertical;min-height:74px}

  /* ===== Login ===== */
  .login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;text-align:center}
  .logo-big{width:84px;height:84px;margin:0 auto 14px;border-radius:24px;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--felt-light),var(--felt-dark));border:1px solid #1c5c44;
    box-shadow:var(--shadow);font-size:40px}
  .login h1{font-size:30px;margin:6px 0 4px;font-weight:900}
  .login p{color:var(--muted);margin:0 0 26px}
  .social{display:flex;flex-direction:column;gap:11px;max-width:340px;margin:0 auto;width:100%}
  .sbtn{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px;border-radius:13px;
    font-weight:800;font-size:15px;color:#fff}
  .sbtn .ic{width:22px;height:22px;display:grid;place-items:center;font-weight:900}
  .sbtn.fb{background:var(--fb)} .sbtn.zalo{background:var(--zalo)}
  .sbtn.demo{background:#13241d;border:1px solid var(--line);color:var(--text)}
  .sbtn.vneid{background:#1e63c9}
  .orline{display:flex;align-items:center;gap:10px;color:var(--muted-2);font-size:12px;margin:6px 0 2px}
  .orline:before,.orline:after{content:"";flex:1;height:1px;background:var(--line)}
  .legal{color:var(--muted-2);font-size:11.5px;margin-top:18px;max-width:320px;margin-left:auto;margin-right:auto}
  .feat{display:flex;gap:14px;justify-content:center;margin-top:30px;color:var(--muted);font-size:12px;flex-wrap:wrap}
  .feat span{display:flex;align-items:center;gap:6px}

  /* ===== Player card ===== */
  .pcard{display:flex;gap:13px;align-items:flex-start}
  .tap{cursor:pointer}
  .tap:hover{border-color:var(--gold-dim)}
  .tap:active{transform:scale(.995)}
  .pcard .meta{flex:1;min-width:0}
  .pcard .name{font-weight:800;font-size:15.5px;display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:#3b5a4c;flex:none}
  .dot.on{background:#37d67a;box-shadow:0 0 0 3px rgba(55,214,122,.18)}
  .pcard .line{color:var(--muted);font-size:12.5px;margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tier{font-weight:800;font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid}
  .elo{font-variant-numeric:tabular-nums;font-weight:800;color:var(--gold)}
  .gts{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .pcard .actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}

  /* ===== Map ===== */
  #map{height:62vh;min-height:380px;border-radius:var(--radius);border:1px solid var(--line);overflow:hidden}
  .leaflet-container{background:#0b1813;font-family:inherit}
  .mk{display:grid;place-items:center;border-radius:50% 50% 50% 4px;transform:rotate(45deg);
    border:2px solid #06120d;box-shadow:0 3px 8px rgba(0,0,0,.5);font-weight:900}
  .mk b{transform:rotate(-45deg);font-size:12px}
  .mapbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .legend{display:flex;gap:14px;color:var(--muted);font-size:12px;margin-top:10px;flex-wrap:wrap}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:-1px}
  .pop b{font-size:14px} .pop .pm{color:#356;font-size:12px}

  /* ===== Ranking ===== */
  .rank-row{display:flex;align-items:center;gap:12px;padding:11px 8px;border-bottom:1px solid var(--line);
    border-radius:10px;transition:background .15s ease}
  .rank-row:hover{background:var(--panel-2)}
  .rank-row:last-child{border-bottom:none}
  .rk{width:30px;text-align:center;font-weight:900;font-size:16px;color:var(--muted);font-variant-numeric:tabular-nums}
  .rk.g1{color:#ffd75e} .rk.g2{color:#cdd6dc} .rk.g3{color:#e0a06a}

  /* ===== Bottom nav ===== */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40}
  .nav-inner{max-width:520px;margin:0 auto;display:flex;background:linear-gradient(180deg,rgba(12,20,17,.85),rgba(8,14,11,.98));
    backdrop-filter:blur(10px);border-top:1px solid var(--line)}
  @media(min-width:900px){ .nav-inner{max-width:920px} }
  .nav button{flex:1;background:none;color:var(--muted-2);padding:9px 2px 11px;display:flex;flex-direction:column;
    align-items:center;gap:3px;font-size:9.5px;font-weight:700;white-space:nowrap;transition:color .15s ease}
  .nav button:hover{color:var(--muted)}
  .nav button .ni{font-size:18px;line-height:1;transition:transform .15s ease}
  .nav button.on{color:var(--gold);box-shadow:inset 0 2px 0 var(--gold)}
  .nav button.on .ni{transform:translateY(-1px) scale(1.08)}
  .nav button .badge{position:absolute;transform:translate(14px,-6px);background:var(--red);color:#fff;font-size:9px;
    min-width:15px;height:15px;border-radius:9px;display:grid;place-items:center;padding:0 3px;font-weight:800}

  /* ===== misc ===== */
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px;
    overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .seg::-webkit-scrollbar{height:0}
  .seg button{flex:1 0 auto;background:none;color:var(--muted);padding:8px 11px;border-radius:9px;font-weight:700;font-size:12.5px;white-space:nowrap;
    transition:background .18s ease,color .18s ease}
  .seg button:hover{color:var(--text)}
  .seg button.on{background:var(--felt-light);color:#eafff4}
  .empty{text-align:center;color:var(--muted);padding:34px 10px}
  .empty .ic{font-size:32px;margin:0 auto 10px;width:72px;height:72px;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 35%,#15392a,#0e2419);border:1px solid var(--line)}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#0e2c20;border:1px solid #1c5c44;
    color:#cdeedd;padding:11px 16px;border-radius:12px;z-index:90;box-shadow:var(--shadow);font-size:13.5px;font-weight:600;
    max-width:90%;animation:toastin .26s cubic-bezier(.2,.8,.3,1.1)}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
  .modal-bg{position:fixed;inset:0;background:rgba(3,8,6,.6);backdrop-filter:blur(3px);z-index:80;display:grid;
    place-items:center;padding:18px;animation:fadein .16s ease}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;max-width:380px;width:100%;
    box-shadow:var(--shadow);animation:pop .2s cubic-bezier(.2,.8,.3,1.1)}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .kv:last-child{border-bottom:none}
  .kv span{color:var(--muted)}
  .stat{display:flex;gap:10px;text-align:center;margin-top:6px}
  .stat .b{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 6px}
  .stat .b b{display:block;font-size:18px;color:var(--gold)} .stat .b small{color:var(--muted);font-size:11px}
  .multi{display:flex;gap:8px;flex-wrap:wrap}
  .scrollx{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .scrollx::-webkit-scrollbar{height:0}

  /* ===== Chat ===== */
  .chat{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
    background:radial-gradient(900px 500px at 50% -10%, #114a37 0%, transparent 60%), var(--bg)}
  .chat-inner{max-width:520px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;min-height:0}
  @media(min-width:900px){ .chat-inner{max-width:920px} }
  .chat-head{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--line);
    background:rgba(12,20,17,.92);backdrop-filter:blur(8px)}
  .chat-head .bk{background:none;color:var(--text);font-size:26px;line-height:1;padding:0 6px}
  .chat-body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:8px}
  .bub{max-width:78%;padding:8px 13px 6px;border-radius:16px;font-size:14px;line-height:1.4;word-break:break-word}
  .bub.them{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
  .bub.me{align-self:flex-end;background:var(--felt-light);color:#eafff4;border-bottom-right-radius:5px}
  .bub .t{display:block;font-size:9.5px;opacity:.55;margin-top:2px;text-align:right}
  .chat-day{align-self:center;font-size:11.5px;color:var(--muted-2);margin:6px 14px;text-align:center;max-width:80%}
  .chat-input{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:rgba(12,20,17,.92);backdrop-filter:blur(8px)}
  .chat-input input{flex:1;padding:11px 14px;border-radius:999px;background:#0b1813;border:1px solid var(--line);color:var(--text);font-size:14px}
  .chat-input button{width:44px;height:44px;border-radius:50%;background:var(--gold);color:var(--on-gold);font-size:17px;flex:none}
  .unread-dot{background:var(--red);color:#fff;font-size:9.5px;min-width:16px;height:16px;border-radius:9px;
    display:inline-grid;place-items:center;padding:0 4px;font-weight:800;vertical-align:1px}

  /* ===== Section headers & achievements ===== */
  .shead{font-size:12px;color:var(--muted);font-weight:700;margin:0 0 8px;letter-spacing:.4px;text-transform:uppercase}
  .ach{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
  .ach .a{border:1px solid var(--line);border-radius:13px;padding:11px 7px;text-align:center;background:#0e1f18}
  .ach .a.on{border-color:var(--gold);background:radial-gradient(circle at 50% -20%,#2c2510,#0e1f18)}
  .ach .a .e{font-size:25px;line-height:1;filter:grayscale(1);opacity:.4}
  .ach .a.on .e{filter:none;opacity:1}
  .ach .a .t{font-size:11px;font-weight:800;margin-top:5px}
  .ach .a .d{font-size:9.5px;color:var(--muted-2);margin-top:2px;line-height:1.3}
  .ach .a.on .d{color:#9fe7c4}

  /* ===== Scrollbar & a11y ===== */
  html{scroll-behavior:smooth}
  .modal,.chat-body,.content{scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .modal::-webkit-scrollbar,.chat-body::-webkit-scrollbar{width:8px}
  .modal::-webkit-scrollbar-thumb,.chat-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .modal::-webkit-scrollbar-thumb:hover,.chat-body::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

  /* ===== Chế độ sáng ===== */
  body.light{
    --bg:#e9efeb; --panel:#ffffff; --panel-2:#0000000a; --card:#ffffff;
    --line:#d2ddd6; --text:#13241d; --muted:#5d756a; --muted-2:#8aa498;
    --gold:#9c7410; --gold-dim:#7d5d0c; --shadow:0 8px 24px rgba(20,40,30,.12);
  }
  body.light{ background:
    radial-gradient(1200px 600px at 80% -10%, #d8ebe2 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 110%, #dceee5 0%, transparent 55%), var(--bg); }
  body.light .topbar{ background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(255,255,255,.82)) }
  body.light .nav-inner{ background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(240,245,242,.98)) }
  body.light .card{ background:linear-gradient(180deg,#ffffff,#f4f8f5) }
  body.light .input,body.light .select,body.light .textarea{ background:#ffffff }
  body.light .seg,body.light .pill{ background:#eef3f0 }
  body.light .modal{ background:#ffffff }
  body.light .modal-bg{ background:rgba(30,50,42,.4) }
  body.light .chat{ background:radial-gradient(900px 500px at 50% -10%, #d8ebe2 0%, transparent 60%), var(--bg) }
  body.light .chat-head,body.light .chat-input{ background:rgba(255,255,255,.93) }
  body.light .bub.them{ background:#eef3f0 }
  body.light .empty .ic{ background:radial-gradient(circle at 50% 35%,#e0ece6,#eef3f0) }
  body.light .rk{ color:var(--muted) }

  /* ===== BỘ THEME (chọn trong Hồ sơ) — body.theme-* ; theme sáng kèm class .light ===== */

  /* 14 · Xanh mint tươi (MẶC ĐỊNH, sáng) */
  body.theme-mint{
    --bg:#eafaf3; --panel:#ffffff; --panel-2:#0e352808; --card:#ffffff; --line:#d4ece0;
    --text:#0e3528; --muted:#5f8a78; --muted-2:#93b8a8;
    --gold:#0fb985; --gold-dim:#0a9e72; --gold-top:#3fd3a3; --gold-sh:rgba(15,185,133,.28); --on-gold:#ffffff;
    --felt:#0a7d5a; --felt-light:#0fb985; --felt-dark:#086b4d;
    --chip-bg:#d6f3e7; --chip-fg:#0a7d5a; --chip-bd:#bce8d6;
    --shadow:0 8px 24px rgba(16,80,60,.12);
  }
  body.theme-mint{ background:
    radial-gradient(1200px 600px at 80% -10%, #d6f5e8 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 110%, #ddf6ec 0%, transparent 55%), var(--bg); }
  body.theme-mint .chat{ background:radial-gradient(900px 500px at 50% -10%, #d6f5e8 0%, transparent 60%), var(--bg) }

  /* 8 · Hồng pastel (sáng) */
  body.theme-rose{
    --bg:#fdf1f4; --panel:#ffffff; --panel-2:#34202a08; --card:#ffffff; --line:#f1dde4;

<script>
(function(){
  var lastErr = null;
  window.addEventListener("error", function(e){
    lastErr = (e && (e.message || (e.error && e.error.message))) || "Lỗi không xác định";
  });
  function panel(title, lines){
    var html = '<div style="max-width:520px;margin:0 auto;padding:40px 22px;font-family:system-ui,Segoe UI,sans-serif;color:#eaf3ee">'
      + '<div style="font-size:46px;text-align:center">🎱</div>'

      + '<div style="font-weight:800;color:#f2c14e;margin-bottom:8px">'+title+'</div>'
      + '<ul style="margin:0;padding-left:18px;line-height:1.7;color:#8fb0a1;font-size:14px">'
      + lines.map(function(l){return "<li>"+l+"</li>";}).join("")
      + '</ul></div></div>';
    document.getElementById("root").innerHTML = html;
  }
  // Sau khi tải xong, kiểm tra thư viện + xem app đã render chưa
  window.addEventListener("load", function(){
    setTimeout(function(){
      var root = document.getElementById("root");
      if(root && root.childElementCount > 0) return; // app đã chạy -> ok
      var missing = [];
      if(typeof React === "undefined")    missing.push("React");
      if(typeof ReactDOM === "undefined") missing.push("ReactDOM");
      if(typeof Babel === "undefined")    missing.push("Babel");
      if(typeof L === "undefined")        missing.push("Leaflet (bản đồ)");
      if(missing.length){
        panel("Không tải được thư viện từ Internet", [
          "Thiếu: <b>"+missing.join(", ")+"</b>",
          "App cần <b>kết nối Internet</b> lần đầu để tải React &amp; bản đồ. Hãy kiểm tra mạng rồi tải lại trang (F5).",
          "Nếu mạng vẫn chặn CDN, báo lại để mình đóng gói bản chạy <b>hoàn toàn offline</b>."
        ]);
      } else {
        panel("App tải thư viện xong nhưng không khởi động được", [
          lastErr ? ("Lỗi: <b>"+lastErr+"</b>") : "Có lỗi khi chạy mã.",

          "Nên mở bằng <b>Chrome</b> hoặc <b>Microsoft Edge</b> bản mới."
        ]);
      }
    }, 2500);
  });
})();
</script>

function compat(u,p){ if(!u||!p) return 0;
  const elo=Math.max(0,1-Math.abs((u.elo||1200)-(p.elo||1200))/400);
  const dist=Math.max(0,1-haversine(u,p)/20);
  const us=u.avail||[], ps=p.avail||[], slot=(us.length&&ps.length)? ps.filter(s=>us.includes(s)).length/Math.max(us.length,ps.length):0;
  const ud=u.days||[], pd=p.days||[], day=(ud.length&&pd.length)? pd.filter(d=>ud.includes(d)).length/Math.max(ud.length,pd.length):0;
  const area=(u.area&&p.area&&u.area===p.area)?1:0;
  const purp=(purposeOf(u)===purposeOf(p))?1:0;   // cùng mục đích chơi → hợp hơn
  return Math.round((elo*0.35+dist*0.2+slot*0.15+day*0.1+area*0.1+purp*0.1)*100); }

function haversine(a,b){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(b.lat-a.lat), dLng=toRad(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

function shrinkImage(file, max){ return new Promise((resolve)=>{ try{
  const url=URL.createObjectURL(file); const img=new Image();
  img.onload=()=>{ try{ let w=img.width,h=img.height; const m=max||1024;
    if(w>m||h>m){ if(w>=h){ h=Math.round(h*m/w); w=m; } else { w=Math.round(w*m/h); h=m; } }
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
    cv.toBlob(b=>{ URL.revokeObjectURL(url); resolve(b||file); }, "image/jpeg", 0.82);
  }catch(e){ resolve(file); } };
  img.onerror=()=>{ try{URL.revokeObjectURL(url);}catch(e){} resolve(file); }; img.src=url;
}catch(e){ resolve(file); } }); }

function notifSupported(){ return typeof Notification!=="undefined"; }
function pushNote(title, body, tag){
  try{
    if(!notifSupported() || Notification.permission!=="granted") return;
    if(!store.get("ct.notifOn",false)) return;
    if(document.visibilityState==="visible") return;   // đang mở app thì thôi (đã có chuông + chấm đỏ)
    const opts={ body:body||"", tag:tag||"poolmate", icon:"icon.svg", badge:"icon.svg", data:{url:"./index.html"} };
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>{ try{ reg.showNotification(title,opts); }catch(e){ try{ new Notification(title,opts); }catch(_){} } }).catch(()=>{ try{ new Notification(title,opts); }catch(e){} });
    } else { try{ new Notification(title,opts); }catch(e){} }
  }catch(e){}
}

}

  useEffect(()=>{ store.set("ct.points",points); },[points]);
  useEffect(()=>{ store.set("ct.uitheme",theme); applyTheme(theme); },[theme]);
  useEffect(()=>{ window.scrollTo(0,0); },[tab]);   // đổi tab → cuộn lên đầu (khỏi rơi giữa trang)
  // điểm danh hằng ngày: +5đ lần đầu mở app mỗi ngày
  useEffect(()=>{ if(!user||!user.onboarded||user.role==="club") return; const t=todayStr();
    if(store.get("ct.lastBonus","")!==t){ store.set("ct.lastBonus",t); setPoints(p=>p+5); setTimeout(()=>flash("🎁 +5đ điểm danh hôm nay! Ghé Hồ sơ để đổi quà."),700); } },[user&&user.onboarded]);

  // thông báo: video/kết quả mới của cơ thủ yêu thích (riêng tư)
  const favPros=(user&&user.favPros)||[];
  const allNoti = useMemo(()=>{
    const out=[];
    // 1) Cơ thủ yêu thích: video/kết quả mới
    const involves=pl=>(pl||[]).some(p=>favPros.includes(p));
    HIGHLIGHTS.forEach(h=>{ if(h.isNew && involves(h.players)) out.push({id:"nh_"+h.id,kind:"Video mới",title:h.title,players:h.players,link:YT(h.q)}); });
    CLASSICS.forEach(c=>{ if(c.isNew && involves(c.players)) out.push({id:"nc_"+c.id,kind:"Video mới",title:c.title,players:c.players,link:YT(c.q)}); });
    RESULTS.forEach(r=>{ if(r.isNew && involves(r.players)) out.push({id:"nr_"+r.event,kind:"Kết quả mới",title:r.event,players:r.players,link:"https://www.google.com/search?q="+encodeURIComponent(r.event+" results")}); });
    // 1b) Lịch thi đấu sắp tới của cơ thủ đang theo dõi
    favPros.forEach(p=>{ const inf=PRO_INFO[p]; if(inf&&inf.schedule) inf.schedule.forEach(s=>{
      const d=Math.round((Date.parse(s.date)-Date.parse(todayStr()))/86400000);
      if(d>=0&&d<=14) out.push({id:"sch_"+p+"_"+s.event,kind:"Lịch thi đấu",players:[p],link:null,
        title:'Cơ thủ "'+p+'" thi đấu tại '+s.event+(d===0?" hôm nay!":d===1?" ngày mai":" — còn "+d+" ngày")+" ("+fmtDateVN(s.date)+")"}); }); });
    // 2) Nhắc giải đã đăng ký (trước ngày + ~2 tiếng trước giờ thi đấu)
    [...TOURNAMENTS,...clubTours].forEach(t=>{ if(!tourjoined[t.id]) return;
      const d=Math.round((Date.parse(t.date)-Date.parse(todayStr()))/86400000);
      if(d===1) out.push({id:"rt1_"+t.id,kind:"Nhắc giải",title:"Ngày mai có giải bạn đã đăng ký: "+t.name+" lúc "+t.time+". Chuẩn bị nhé!",players:[],link:null});
      else if(d===0){ const hrs=parseInt((t.time||"0").split(":")[0],10)-new Date().getHours();
        out.push({id:"rt0_"+t.id,kind:"Nhắc giải",title:"Hôm nay "+t.time+": "+t.name+(hrs>=0&&hrs<=2?" — sắp bắt đầu (~"+Math.max(hrs,0)+"h nữa)!":"")+".",players:[],link:null}); }
    });
    // 3) Tin nhắn mới
    Object.keys(chats).forEach(pid=>{ const uc=(chats[pid]||[]).filter(m=>!m.me&&!m.read).length;
      if(uc>0){ const p=anyPlayer(pid); out.push({id:"chat_"+pid+"_"+uc,kind:"Tin nhắn",title:'Bạn có '+uc+' tin nhắn mới từ "'+(p?p.name:"?")+'"',players:[],link:null}); } });
    // 3b) Lời mời kết bạn thật (từ máy chủ)
    const _me=cloud.uid&&cloud.uid();
    if(_me) (friends||[]).forEach(f=>{ if(f.addressee===_me && f.status==="pending"){ const rp=anyPlayer(f.requester);
      out.push({id:"fr_"+f.id,kind:"Kết bạn",title:'"'+((rp&&rp.name)||"Một cơ thủ")+'" muốn kết bạn — vào tab Kết nối để chấp nhận.',players:[],link:null}); } });
    // 3c) Tỉ số chờ mình xác nhận
    if(_me) (confirms||[]).forEach(c=>{ if(c.opponent===_me && c.status==="pending") out.push({id:"sc_"+c.id,kind:"Xác nhận tỉ số",title:'"'+(c.reporter_name||"Đối thủ")+'" báo tỉ số '+c.reporter_score+'–'+c.opponent_score+' ('+c.game+') — vào Kết nối để xác nhận.',players:[],link:null}); });
    // 4) Gợi ý luyện kỹ năng yếu
    const ds=store.get("ct.drillscores",[]);
    if(ds.length){ const by={}; ds.forEach(s=>{ (by[s.drill]=by[s.drill]||[]).push(s.made/s.total); });
      let weak=null,wv=2; Object.keys(by).forEach(d=>{ const a=by[d].reduce((x,y)=>x+y,0)/by[d].length; if(a<wv){wv=a;weak=d;} });
      if(weak && wv<0.8) out.push({id:"train_"+weak,kind:"Gợi ý tập",title:'Bạn còn yếu "'+weak+'" ('+Math.round(wv*100)+'%). Hôm nay tập thêm chứ? Mình gợi ý drill cho kỹ năng này ở tab Tập luyện → Bài tập.',players:[],link:null}); }
    return out;
  },[favPros,tourjoined,chats,friends,confirms]);
  const unseen = allNoti.filter(n=>!seenNoti.includes(n.id));
  const openNoti = ()=>{ setNotiOpen(true); setSeenNoti(s=>{ const set=new Set(s); allNoti.forEach(n=>set.add(n.id)); return [...set]; }); };
  // đẩy thông báo hệ thống khi có việc mới (tin nhắn/kết bạn/xác nhận tỉ số/nhắc giải) — kể cả khi tab nền
  useEffect(()=>{
    const ICON={"Tin nhắn":"💬","Kết bạn":"🤝","Xác nhận tỉ số":"⚖️","Nhắc giải":"🏆"};
    if(_pushedIds===null){ _pushedIds=new Set(allNoti.map(n=>n.id)); return; }   // bỏ qua lần đầu (state có sẵn)
    allNoti.forEach(n=>{ if(!_pushedIds.has(n.id)){ _pushedIds.add(n.id); if(ICON[n.kind]) pushNote(ICON[n.kind]+" "+n.kind, n.title, n.id); } });
  },[allNoti]);
  // đăng ký nhận push từ máy chủ khi đã đăng nhập + đã bật thông báo (nhận cả khi đóng app, sau khi deploy)
  useEffect(()=>{ if(cloud.ready() && typeof Notification!=="undefined" && Notification.permission==="granted" && store.get("ct.notifOn",false)) cloud.pushSubscribe(myId()); },[authUid]);

  const flash = useCallback(msg=>{ setToast(msg); setTimeout(()=>setToast(null),2200); },[]);

  if(!user) return <Login onLogin={u=>{ setUser(u); flash(u.role==="club"?"Chào CLB / Nhà tổ chức 👋":"Chào mừng, "+u.name+" 👋"); }} />;
  if(user.role==="club") return <ClubDashboard user={user} setUser={setUser} flash={flash} onLogout={()=>{ cloud.signOut(); store.del("ct.user"); setUser(null); }} />;
  if(!user.onboarded) return <Onboarding user={user} onDone={u=>{setUser(u); flash("Hồ sơ đã sẵn sàng!");}} />;

  const myUid = authUid || deviceId;
  const cloudRel = useMemo(()=>{ const m={}; (friends||[]).forEach(f=>{ const other=f.requester===myUid?f.addressee:f.requester; m[other]= f.status==="accepted"?"matched":(f.requester===myUid?"sent":"incoming"); }); return m; },[friends,myUid]);
  const cloudFid = useMemo(()=>{ const m={}; (friends||[]).forEach(f=>{ const other=f.requester===myUid?f.addressee:f.requester; m[other]=f.id; }); return m; },[friends,myUid]);
  const rel = useMemo(()=>({...relLocal,...cloudRel}),[relLocal,cloudRel]);
  const setRelOf=(id,v)=>{
    if(isRealId(id) && cloud.ready()){
      if(v==="sent"){ cloud.friendRequest(id).then(()=>cloud.friendsList().then(l=>l&&setFriends(l))); cloud.pushSend(id,"🤝 Lời mời kết bạn",(user.name||"Một cơ thủ")+" muốn kết bạn với bạn trên PoolMate"); }
      else if(v==="matched"){ const fid=cloudFid[id]; if(fid) cloud.friendAccept(fid).then(()=>cloud.friendsList().then(l=>l&&setFriends(l))); }
      return;
    }
    setRel(r=>({...r,[id]:v}));
  };
  const addPoints=(n)=>setPoints(p=>p+n); // điểm thưởng loyalty

  // ghi kết quả 1 trận → cập nhật ELO của bạn + lưu lịch sử
  const recordMatch = (opp,myScore,oppScore,game,date)=>{
    if(isRealId(opp.id) && cloud.ready()){   // đấu người THẬT → chờ đối thủ xác nhận, chưa tính ELO
      const cid="sc"+Date.now()+myId().slice(0,6);
      cloud.confirmAdd({id:cid,opponent:opp.id,reporter_name:user.name,opponent_name:opp.name,game,reporter_score:+myScore,opponent_score:+oppScore,reporter_elo:user.elo,opponent_elo:opp.elo}).then(ok=>{ if(ok) cloud.confirmsList().then(l=>l&&setConfirms(l)); });
      cloud.pushSend(opp.id,"⚖️ Xác nhận tỉ số",(user.name||"Đối thủ")+" báo tỉ số "+myScore+"–"+oppScore+" ("+game+") — vào Kết nối để xác nhận");
      flash("Đã gửi tỉ số — chờ "+opp.name+" xác nhận ⚖️"); return;
    }
    const win = myScore>oppScore;
    const K = matches.length<10 ? 48 : 32;   // tài khoản mới định hạng nhanh hơn
    const delta = eloDelta(user.elo, opp.elo, win, K);
    const newElo = user.elo + delta;
    const pts = win?15:8;
    setUser(u=>({...u, elo:newElo}));
    setMatches(m=>[{id:"m"+Date.now(), oppId:opp.id, oppName:opp.name, game, date,
      myScore:+myScore, oppScore:+oppScore, win, delta, elo:newElo}, ...m]);
    if(cloud.ready()) cloud.matchAdd({id:"m"+Date.now()+"_"+myId().slice(0,8), player_id:myId(), opp_id:opp.id, opp_name:opp.name,
      game, my_score:+myScore, opp_score:+oppScore, win, delta, elo:newElo, date});
    setPoints(p=>p+pts);
    flash((win?"Thắng":"Thua")+" · ELO "+(delta>=0?"+":"")+delta+" → "+newElo+" · +"+pts+"đ 🏵️");
  };
  const addChallenge = c => { setChallenges(cs=>[{...c, id:"ch"+Date.now(), dir:"out", status:"pending"}, ...cs]); flash("Đã gửi lời thách đấu 📅"); };
  const setChallenge = (id,patch)=> setChallenges(cs=>cs.map(c=>c.id===id?{...c,...patch}:c));

  // giải đấu (dùng chung cho tab Giải đấu + icon Giải đấu trên header)
  const joinTour  = id => { setTourjoined(j=>({...j,[id]:true})); addPoints(10); flash("Đăng ký thành công 🏆 · +10đ"); };
  const leaveTour = id => { setTourjoined(j=>({...j,[id]:false})); flash("Đã huỷ đăng ký"); };
  const recordTour = (t,a,b,sa,sb)=>{ sa=+sa; sb=+sb;
    setTourResults(r=>({...r,[t.id]:[...(r[t.id]||[]),{a,b,sa,sb,round:"Vòng đấu",ts:nowHM()}]}));
    if(a==="me"||b==="me"){ const oppId=a==="me"?b:a; const opp=SEED_PLAYERS.find(p=>p.id===oppId);
      if(opp) recordMatch(opp, a==="me"?sa:sb, a==="me"?sb:sa, t.game, todayStr()); }
    else flash("Đã lưu tỉ số trận đấu ✅"); };

  // chat
  const unreadFor = pid => (chats[pid]||[]).filter(m=>!m.me && !m.read).length;
  const totalUnread = Object.keys(chats).reduce((s,pid)=>s+unreadFor(pid),0);
  const openChat = pid => { setActiveChat(pid);
    setChats(prev=> prev[pid]? {...prev,[pid]:prev[pid].map(m=>({...m,read:true}))} : prev); };
  const sendMessage = (pid,text)=>{
    const t=(text||"").trim(); if(!t) return;
    setChats(prev=>({...prev,[pid]:[...(prev[pid]||[]),{id:"m"+Date.now(),me:true,text:t,read:true,ts:nowHM()}]}));
    if(isRealId(pid) && cloud.ready()){ cloud.messageSend(pid,t); cloud.pushSend(pid,"💬 "+(user.name||"Tin nhắn mới"),t); return; }   // người thật: gửi qua máy chủ, KHÔNG bot tự trả lời
    setTimeout(()=>setChats(prev=>{
      const list=prev[pid]||[]; const r=REPLIES[list.length % REPLIES.length];
      return {...prev,[pid]:[...list,{id:"r"+Date.now(),me:false,text:r,read:true,ts:nowHM()}]};
    }), 1000);
  };

  const incoming = Object.entries(rel).filter(([,v])=>v==="incoming").length
    + challenges.filter(c=>c.dir==="in" && c.status==="pending").length;

  // cần đăng nhập thật (email OTP) mới ghi lên máy chủ; chưa đăng nhập thì chặn để khỏi "mất bài"
  const requireAuth = (act)=>{ if(cloud.on && !cloud.ready()){ flash("Đăng nhập bằng Email để "+(act||"đồng bộ")+" ✉️ (đang ở chế độ xem)"); return false; } return true; };
  // Clip "đi chấm": đăng link YouTube, thả tim, bình luận
  const addClip = (url,title)=>{ const vid=ytId(url); if(!vid){ flash("Link YouTube không hợp lệ"); return false; }
    if(!requireAuth("đăng clip")) return false;
    const c={id:"clip"+Date.now()+myId(),vid,url,title:(title||"").trim()||"Clip đi chấm",by:user.name,byId:myId(),ts:todayStr(),likedBy:[],comments:[]};
    setClips(cs=>[c,...cs]);
    if(cloud.ready()) cloud.clipAdd(c).then(ok=>{ if(ok) cloud.clipsList().then(l=>l&&setClips(l)); });
    flash("Đã đăng clip đi chấm 🎬"); return true; };
  const likeClip = id=>{ if(!requireAuth("thả tim")) return; setClips(cs=>cs.map(c=>{ if(c.id!==id) return c; const nl=c.likedBy.includes(myId())?c.likedBy.filter(x=>x!==myId()):[...c.likedBy,myId()]; if(cloud.ready()) cloud.clipPatch(id,{liked_by:nl}); return {...c,likedBy:nl}; })); };
  const commentClip = (id,text)=>{ const t=(text||"").trim(); if(!t)return; if(!requireAuth("bình luận")) return; setClips(cs=>cs.map(c=>{ if(c.id!==id) return c; const nc=[...c.comments,{by:user.name,text:t,ts:nowHM()}]; if(cloud.ready()) cloud.clipPatch(id,{comments:nc}); return {...c,comments:nc}; })); };
  const delClip = id=>{ if(!window.confirm("Xoá clip này?")) return; if(cloud.ready()) cloud.clipDel(id); setClips(cs=>cs.filter(c=>c.id!==id)); };

  // ===== Xác nhận tỉ số 2 phía: áp ELO cho mỗi bên đúng 1 lần khi đã 'confirmed' =====
  const applyConfirm=(row)=>{ if(!row||appliedRef.current.has(row.id)) return;
    appliedRef.current.add(row.id); store.set("ct.appliedConfirms",[...appliedRef.current]);
    const me=cloud.uid()||deviceId, amR=row.reporter===me;
    const myElo=(amR?row.reporter_elo:row.opponent_elo)||1200, oppElo=(amR?row.opponent_elo:row.reporter_elo)||1200;
    const myS=amR?row.reporter_score:row.opponent_score, oppS=amR?row.opponent_score:row.reporter_score;
    const oppName=amR?row.opponent_name:row.reporter_name, oppId=amR?row.opponent:row.reporter;
    const win=myS>oppS, delta=eloDelta(myElo,oppElo,win,32);
    setUser(u=>({...u,elo:(u.elo||myElo)+delta}));
    setMatches(m=> m.some(x=>x.id==="cm"+row.id)? m : [{id:"cm"+row.id,oppId,oppName,game:row.game,date:(row.created_at||"").slice(0,10)||todayStr(),myScore:+myS,oppScore:+oppS,win,delta,elo:myElo+delta,confirmed:true},...m]);
    setPoints(p=>p+(win?15:8));
    flash("✓ Tỉ số đã xác nhận 2 phía vs "+oppName+" · ELO "+(delta>=0?"+":"")+delta); };
  const confirmAccept=(id)=>{ cloud.confirmSet(id,"confirmed").then(()=>cloud.confirmsList().then(l=>l&&setConfirms(l))); };
  const confirmReject=(id)=>{ cloud.confirmSet(id,"rejected").then(()=>cloud.confirmsList().then(l=>l&&setConfirms(l))); flash("Đã từ chối tỉ số"); };
  useEffect(()=>{ if(!cloud.ready()){ setConfirms([]); return; } let alive=true,ch;
    const load=()=>cloud.confirmsList().then(l=>{ if(!alive||!l) return; setConfirms(l); l.forEach(r=>{ if(r.status==="confirmed") applyConfirm(r); }); });
    load(); ch=cloud.subscribeConfirms(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[authUid]);

  const headerCheckin=()=>{ flash("📍 Đang định vị…"); geoNearestClub((err,res)=>{
    if(err){ flash(err); return; }
    if(!res){ flash("Không tìm thấy quán nào gần đây"); return; }
    const {club,distM}=res;
    if(distM>700){ flash("Quán gần nhất: "+club.name+" (~"+fmtDist(distM)+") — có vẻ bạn chưa ở quán."); return; }
    if(cloud.on && !cloud.ready()){ flash("Đăng nhập bằng Email để check-in ✉️"); return; }
    cloud.checkinAdd(club.id,(user&&user.name)||"Cơ thủ").then(ok=>{ flash(ok?("✅ Đã check-in tại "+club.name+" (~"+fmtDist(distM)+")"):"Check-in lỗi, thử lại"); }); }); };
  const shared = {user,setUser,rel,setRelOf,flash,matches,challenges,recordMatch,addChallenge,setChallenge,openChat,unreadFor,
    tourjoined,joinTour,leaveTour,recordTour,tourResults,clubTours,ads,
    clips,addClip,likeClip,commentClip,delClip,points,addPoints,theme,setTheme,meId:myId(),
    confirms,confirmAccept,confirmReject,myUid,online,blocked,toggleBlock};
  const tabs = {
    discover:  <Explore {...shared} />,
    compete:   <Compete {...shared} />,
    ranking:   <RankTabs {...shared} />,
    connect:   <Connections {...shared} />,
    training:  <Training {...shared} />,
    watch:     <WatchTab {...shared} />,
    profile:   <Profile {...shared} onLogout={()=>{ cloud.signOut(); store.del("ct.user"); setUser(null); }} />,
  };

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand"><Balls size={34}/>
          <div>PoolMate<small>Tìm đối chơi bi a</small></div></div>
        <div className="me">
          <button onClick={headerCheckin} title="Check-in tại quán (định vị)" aria-label="Check-in" style={{background:"none",fontSize:19,padding:"0 4px",color:"var(--text)"}}>📍</button>
          <button onClick={()=>setMyTourOpen(true)} title="Giải đấu của tôi" aria-label="Giải đấu của tôi" style={{background:"none",fontSize:19,position:"relative",padding:"0 4px",color:"var(--text)"}}>🏆
            {Object.values(tourjoined).filter(Boolean).length>0 && <span style={{position:"absolute",top:-4,right:-2,background:"var(--felt-light)",color:"#fff",fontSize:9,minWidth:15,height:15,borderRadius:8,display:"grid",placeItems:"center",padding:"0 3px",fontWeight:800}}>{Object.values(tourjoined).filter(Boolean).length}</span>}</button>
          <button onClick={()=>{setTab("connect");window.scrollTo(0,0);}} title="Kết nối" aria-label="Kết nối" style={{background:"none",fontSize:19,position:"relative",padding:"0 4px",color:tab==="connect"?"var(--gold)":"var(--text)"}}>🤝
            {incoming>0 && <span style={{position:"absolute",top:-4,right:-2,background:"var(--red)",color:"#fff",fontSize:9,minWidth:15,height:15,borderRadius:8,display:"grid",placeItems:"center",padding:"0 3px",fontWeight:800}}>{incoming}</span>}</button>
          <ThemeMenu theme={theme} setTheme={setTheme} />
          <button onClick={openNoti} title="Thông báo" aria-label="Thông báo" style={{background:"none",fontSize:19,position:"relative",padding:"0 4px",color:"var(--text)"}}>🔔
            {unseen.length>0 && <span style={{position:"absolute",top:-4,right:-2,background:"var(--red)",color:"#fff",fontSize:9,minWidth:15,height:15,borderRadius:8,display:"grid",placeItems:"center",padding:"0 3px",fontWeight:800}}>{unseen.length}</span>}</button>
          {points>0 && <button onClick={()=>{setTab("profile");window.scrollTo(0,0);}} title="Điểm thưởng — đổi quà ở Hồ sơ" aria-label="Điểm thưởng" style={{background:"none",fontSize:12.5,fontWeight:800,color:"var(--gold)",padding:"0 2px"}}>⭐{points}</button>}
          <span className="elo">{user.elo}</span>
          <Avatar name={user.name} id={user.id} size={34} av={user.avatar}/>
        </div>
      </div>

      <div className="content">{tabs[tab]}</div>

      <div className="nav"><div className="nav-inner">
        {[
          ["compete","⚔️","Thi đấu"],
          ["training","📈","Tập luyện"],
          ["watch","📺","Xem bi-a"],
          ["discover","🔍","Khám phá"],
          ["profile","👤","Hồ sơ"],
        ].map(([k,ic,label])=>(
          <button key={k} className={tab===k?"on":""} onClick={()=>{setTab(k);window.scrollTo(0,0);}} style={{position:"relative"}}>
            <span className="ni">{ic}</span>{label}
          </button>
        ))}
      </div></div>

      {toast && <div className="toast" onClick={()=>setToast(null)} style={{cursor:"pointer"}}>{toast}</div>}
      {activeChat && <ChatScreen pid={activeChat} msgs={chats[activeChat]||[]} onSend={sendMessage} onClose={()=>setActiveChat(null)} />}
      {notiOpen && <NotificationsModal items={allNoti} favPros={favPros} onClose={()=>setNotiOpen(false)} onGoFav={()=>{setNotiOpen(false);setTab("profile");}} />}
      {myTourOpen && <MyTournamentsModal user={user} joined={tourjoined} results={tourResults} clubTours={clubTours} onRecord={recordTour} onClose={()=>setMyTourOpen(false)} rel={rel} setRelOf={setRelOf} flash={flash} openChat={openChat} matches={matches} />}
    </div>
  );
}

/* ============================================================
   ĐĂNG NHẬP (giả lập)
   ============================================================ */
function Login({onLogin}){
  const [estep,setEstep]=useState("email"); // email → code
  const [email,setEmail]=useState("");
  const [code,setCode]=useState("");
  const [busy,setBusy]=useState(false);

function Onboarding({user,onDone}){
  const [f,setF]=useState({name:/^(Người dùng|Cơ thủ)\b/.test(user.name)?"":user.name, area:user.area, level:"1210", games:user.games, clubs:user.clubs, bio:"", avail:user.avail||["Tối"], bet:user.bet||BET_LEVELS[0], freq:user.freq||FREQ_LEVELS[1], purpose:user.purpose||"vui", hand:user.hand||"Phải", cue:user.cue||""});
  const up=(k,v)=>setF(s=>({...s,[k]:v}));
  const toggle=(k,v)=>setF(s=>({...s,[k]: s[k].includes(v)? s[k].filter(x=>x!==v):[...s[k],v]}));

  const submit=()=>{
    if(!f.name.trim()) return;
    const a=areaById(f.area);
    onDone({...user, name:f.name.trim(), area:f.area, elo:parseInt(f.level,10),
      games:f.games.length?f.games:["Bi-a lỗ (8 bi)"], clubs:f.clubs, bio:f.bio,
      avail:f.avail, bet:f.bet, freq:f.freq, purpose:f.purpose, hand:f.hand, cue:f.cue, lat:a.lat, lng:a.lng, onboarded:true});

  return (
    <div className="app"><div className="content" style={{paddingBottom:30}}>
      <div className="h1">Hoàn thiện hồ sơ cơ thủ</div>
      <div className="sub">Giúp người khác tìm và ghép cặp với bạn chính xác hơn.</div>

      <div className="card">
        <div className="field"><label>Tên hiển thị</label>

        <div className="field"><label>Khu vực của bạn</label>
          <select className="select" value={f.area} onChange={e=>up("area",e.target.value)}>
            {AREAS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>

        <div className="field"><label>Hạng hiện tại (điểm ELO khởi điểm)</label>
          <select className="select" value={f.level} onChange={e=>up("level",e.target.value)}>
            <option value="850">Hạng I — mới tập</option>
            <option value="950">Hạng H</option>
            <option value="1080">Hạng G</option>
            <option value="1210">Hạng F</option>
            <option value="1340">Hạng E</option>
            <option value="1470">Hạng D</option>
            <option value="1600">Hạng C</option>
            <option value="1730">Hạng B</option>
            <option value="1860">Hạng A</option>
            <option value="2000">Hạng CN — đỉnh cao</option>
          </select>
          <div style={{fontSize:11.5,color:"var(--muted-2)",marginTop:5}}>Chọn đúng trình để ghép cặp chuẩn. Sau mỗi trận, ELO tự tăng/giảm và hạng đổi theo (CN &gt; A &gt; … &gt; I).</div></div>

        <div className="field"><label>Thể loại yêu thích</label>
          <div className="multi">{GAME_TYPES.map(g=>(
            <span key={g} className={"pill"+(f.games.includes(g)?" on":"")} onClick={()=>toggle("games",g)}>{g}</span>))}</div></div>

        <div className="field"><label>Mục đích chơi</label>
          <div className="multi">{PURPOSES.map(P=>(
            <span key={P.k} className={"pill"+(f.purpose===P.k?" on":"")} onClick={()=>up("purpose",P.k)}>{P.emoji} {P.label}</span>))}</div>
          <div style={{fontSize:11.5,color:"var(--muted-2)",marginTop:5}}>Ghép cặp sẽ ưu tiên người cùng mục đích với bạn.</div></div>

        <div className="field"><label>Tay thuận</label>
          <div className="multi">{["Phải","Trái"].map(h=>(
            <span key={h} className={"pill"+(f.hand===h?" on":"")} onClick={()=>up("hand",h)}>{h==="Phải"?"✋ Tay phải":"🤚 Tay trái"}</span>))}</div></div>

        <div className="field"><label>Cơ đang dùng (tuỳ chọn)</label>
          <input className="input" value={f.cue} placeholder="VD: Predator P3, Mezz, cơ CLB…" onChange={e=>up("cue",e.target.value)}/></div>

        <div className="field"><label>Giờ chơi ưu tiên</label>
          <div className="multi">{AVAIL_SLOTS.map(s=>(
            <span key={s} className={"pill"+(f.avail.includes(s)?" on":"")} onClick={()=>toggle("avail",s)}>{s}</span>))}</div></div>

        <div className="field"><label>Mức độ chơi thường xuyên</label>
          <select className="select" value={f.freq} onChange={e=>up("freq",e.target.value)}>{FREQ_LEVELS.map(b=><option key={b}>{b}</option>)}</select></div>

        <div className="field"><label>Kèo vui — thua mời (bàn nước/cà phê/bữa ăn)</label>
          <select className="select" value={f.bet} onChange={e=>up("bet",e.target.value)}>{BET_LEVELS.map(b=><option key={b}>{b}</option>)}</select></div>

        <div className="field"><label>CLB hay chơi</label>
          <div style={{color:"var(--muted)",fontSize:13,lineHeight:1.5}}>Chọn CLB yêu thích ở tab <b style={{color:"var(--gold)"}}>🎱 CLB</b> (chạm ⭐) sau khi vào app — có đủ {CLUBS.length} quán để tìm.</div></div>

        <div className="field"><label>Giới thiệu ngắn (tuỳ chọn)</label>
          <textarea className="textarea" value={f.bio} placeholder="VD: Tìm bạn giao lưu 9 bi tối cuối tuần…" onChange={e=>up("bio",e.target.value)}/></div>

        <button className="btn block" disabled={!f.name.trim()} onClick={submit}>Bắt đầu tìm bạn chơi →</button>
      </div>
    </div></div>
  );
}

function Discover({user,setUser,rel,setRelOf,flash,openChat,matches,online=[],blocked=[],toggleBlock}){
  const [tier,setTier]   = useState("all");
  const [schedOpen,setSchedOpen] = useState(false);
  const [game,setGame]   = useState("all");
  const [maxKm,setMaxKm] = useState(20);
  const [sort,setSort]   = useState("near");
  const [q,setQ]         = useState("");
  const [detail,setDetail]=useState(null);
  const [view,setView]   = useState("list");   // list | map
  const [mnIdx,setMnIdx] = useState(0);
  const [mnOpen,setMnOpen]=useState(false);
  const [swipeOpen,setSwipeOpen]=useState(false);
  const [freeNow,setFreeNow]=useState(false);
  const [pArea,setPArea] = useState("all");
  const [betF,setBetF]   = useState("all");   // lọc theo mức kèo
  const [purpF,setPurpF] = useState("all");   // lọc theo mục đích chơi
  useEffect(()=>{ const d=store.get("ct.discoverF",{}); if(d.maxKm)setMaxKm(d.maxKm); if(d.sort)setSort(d.sort); if(d.pArea)setPArea(d.pArea); if(d.betF)setBetF(d.betF); },[]);
  useEffect(()=>{ store.set("ct.discoverF",{maxKm,sort,pArea,betF}); },[maxKm,sort,pArea,betF]);
  const [tip,setTip] = useState(()=>!store.get("ct.seenTip",false));
  const [cloudUsers,setCloudUsers]=useState([]); // người chơi THẬT từ máy chủ (đã đăng nhập)
  useEffect(()=>{ if(!cloud.on) return; let alive=true,ch;
    const load=()=>cloud.profilesList().then(l=>{ if(alive&&l) setCloudUsers(l); });
    load(); ch=cloud.subscribeProfiles(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[]);
  // Kèo mở / bảng tin tìm người chơi
  const [openM,setOpenM]=useState([]);
  const [postOpen,setPostOpen]=useState(false);
  useEffect(()=>{ if(!cloud.on) return; let alive=true,ch;
    const load=()=>cloud.openMatchesList().then(l=>{ if(alive&&l) setOpenM(l); });
    load(); ch=cloud.subscribeOpenMatches(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[]);
  const openVisible=(openM||[]).filter(o=>!(blocked||[]).includes(o.host_id));
  const addOpen=(f)=>{ if(cloud.on && !cloud.ready()){ flash("Đăng nhập bằng Email để đăng kèo ✉️"); return; }
    const item={id:"om"+Date.now(), host_name:user.name, game:f.game, area:f.area, when_text:f.when_text, tier_label:f.tier_label, note:f.note};
    setPostOpen(false);
    if(cloud.ready()) cloud.openMatchAdd(item).then(ok=>{ if(ok){ cloud.openMatchesList().then(l=>l&&setOpenM(l)); flash("Đã đăng kèo mở 📣"); } else flash("Không đăng được, thử lại"); });
    else { setOpenM(m=>[{...item,host_id:myId()},...m]); flash("Đã đăng kèo (chế độ xem) 📣"); } };

  const list = useMemo(()=>{
    const cp = cloudUsers.filter(r=>r.id!==myId() && !r.banned).map(r=>{ const a=areaById(r.area); return {id:r.id,name:r.name||"Cơ thủ",elo:r.elo||1200,area:r.area,areaName:a.name,lat:a.lat,lng:a.lng,games:(r.games&&r.games.length?r.games:["9 bi"]),clubs:[],avatar:r.avatar,online:(online||[]).indexOf(r.id)>=0,lookingNow:!!r.looking,cloud:true,purpose:r.purpose,bio:"",avail:[],days:[]}; });
    const out = [...SEED_PLAYERS, ...cp].map(p=>({...p, dist:haversine(user,p), _compat:compat(user,p)}))
      .filter(p=> tier==="all" || tierOf(p.elo).name===tier)
      .filter(p=> game==="all" || p.games.includes(game))
      .filter(p=> pArea==="all" || p.area===pArea)
      .filter(p=> p.dist<=maxKm)
      .filter(p=> !freeNow || (p.avail && p.avail.includes(nowSlot())))
      .filter(p=> betF==="all" || p.bet===betF)
      .filter(p=> purpF==="all" || purposeOf(p)===purpF)
      .filter(p=> !(blocked||[]).includes(p.id))
      .filter(p=> !q || p.name.toLowerCase().includes(q.toLowerCase()));
    out.sort((a,b)=> sort==="near"? a.dist-b.dist : sort==="elo"? b.elo-a.elo : b._compat-a._compat);
    return out;
  },[tier,game,maxKm,sort,q,user,freeNow,pArea,betF,purpF,cloudUsers,online,blocked]);
  const onlineCount=(online||[]).filter(id=>id!==myId() && isRealId(id)).length;
  // danh sách để "quẹt": chưa kết nối/chưa gửi, xếp theo độ hợp cao → thấp
  const swipeList = useMemo(()=> list.filter(p=> rel[p.id]!=="matched" && rel[p.id]!=="sent").slice().sort((a,b)=> b._compat-a._compat), [list,rel]);

  // "Tìm đối ngay": ai đang muốn chơi (lookingNow + online), gần nhất, chưa kết nối
  const candidates = useMemo(()=>{
    const cp = cloudUsers.filter(r=>r.id!==myId() && r.looking && !r.banned).map(r=>{ const a=areaById(r.area); return {id:r.id,name:r.name||"Cơ thủ",elo:r.elo||1200,area:r.area,areaName:a.name,lat:a.lat,lng:a.lng,games:(r.games&&r.games.length?r.games:["9 bi"]),clubs:[],avatar:r.avatar,online:true,lookingNow:true,cloud:true,bio:"",zalo:""}; });
    return [...SEED_PLAYERS.filter(p=>p.online&&p.lookingNow), ...cp]
      .map(p=>({...p,dist:haversine(user,p)}))
      .filter(p=>rel[p.id]!=="matched" && rel[p.id]!=="sent")
      .filter(p=> !(blocked||[]).includes(p.id))
      .sort((a,b)=> compat(user,b)-compat(user,a) || a.dist-b.dist);
  },[rel,user,cloudUsers,blocked]);
  const startMatch=()=>{ if(!candidates.length){ flash("Hiện chưa có cơ thủ nào đang tìm trận gần bạn"); return; } setMnIdx(0); setMnOpen(true); };
  const useGPS=()=>{ if(!navigator.geolocation){ flash("Trình duyệt không hỗ trợ định vị"); return; }
    navigator.geolocation.getCurrentPosition(
      pos=>{ setUser&&setUser(u=>({...u, lat:pos.coords.latitude, lng:pos.coords.longitude})); flash("Đã cập nhật vị trí GPS — khoảng cách giờ tính theo vị trí thật 📍"); },
      ()=>flash("Không lấy được vị trí — cần mở qua HTTPS và cho phép quyền định vị"), {enableHighAccuracy:true,timeout:8000}); };
  const cand = candidates[mnIdx];
  const rankPos = [...SEED_PLAYERS,user].sort((a,b)=>b.elo-a.elo).findIndex(p=>p.id===user.id)+1;
  const incomingCount = Object.values(rel).filter(v=>v==="incoming").length;
  // Lịch "tôi muốn chơi" → gợi ý đối khớp giờ/quán
  const myDays=user.days||[], mySlots=user.avail||[], myClubs=user.schedClubs||(user.clubs?user.clubs.slice(0,3):[]), myBet=user.schedBet||"";
  const toggleU=(key,v)=>setUser&&setUser(u=>{ const cur=u[key]||[]; return {...u,[key]:cur.includes(v)?cur.filter(x=>x!==v):[...cur,v]}; });
  const addClubSched=id=>{ if(!id) return; setUser&&setUser(u=>{ const cur=u.schedClubs||(u.clubs?u.clubs.slice(0,3):[]); if(cur.includes(id)||cur.length>=3) return u; return {...u,schedClubs:[...cur,id]}; }); };
  const rmClubSched=id=>setUser&&setUser(u=>({...u,schedClubs:(u.schedClubs||(u.clubs?u.clubs.slice(0,3):[])).filter(x=>x!==id)}));
  const sched = useMemo(()=> SEED_PLAYERS.map(p=>{
      const dayOv=(p.days||[]).filter(d=>myDays.includes(d)), slotOv=(p.avail||[]).filter(s=>mySlots.includes(s));
      const clubM=(p.clubs||[]).some(c=>myClubs.indexOf(c)>=0), betM=!!myBet && p.bet===myBet;
      return {...p,dist:haversine(user,p),dayOv,slotOv,clubM,betM,score:dayOv.length*2+slotOv.length*2+(clubM?3:0)+(betM?1:0)};
    }).filter(p=>p.score>0 && rel[p.id]!=="matched" && rel[p.id]!=="sent")
    .sort((a,b)=> b.score-a.score || a.dist-b.dist).slice(0,8),
    [user,rel,myDays.join(),mySlots.join(),myClubs.join(),myBet]);

  return (
    <div>
      <div className="h1" style={{fontSize:19,marginTop:2}}>Chào {user.name} 👋</div>
      <div className="sub">{list.length} cơ thủ trong bán kính {maxKm} km quanh {areaById(user.area).name}. <span className="pill" style={{marginLeft:2,verticalAlign:"middle"}} onClick={useGPS}>📍 Định vị GPS</span></div>
      {(()=>{ var tips=["Bật \"⚡ muốn chơi\" để người khác thấy và mời bạn.","Quẹt theo độ hợp để tìm đối nhanh hơn.","Mở hồ sơ cơ thủ để xem \"gợi ý chấp\".","Ghi kết quả trận để cập nhật ELO & lên hạng.","Theo dõi cơ thủ pro ở tab Xem bi-a để nhận thông báo video mới.","Điểm danh mỗi ngày +5đ — đổi quà ở Hồ sơ."]; var i=(new Date().getDate())%tips.length; return <div className="card" style={{padding:"9px 12px",marginTop:10}}><span style={{fontSize:12.5}}>💡 <b>Mẹo:</b> {tips[i]}</span></div>; })()}
      <div className="stat" style={{marginTop:10}}>
        <div className="b"><b>#{rankPos}</b><small>Hạng TP</small></div>
        <div className="b" onClick={startMatch} style={{cursor:candidates.length?"pointer":"default"}}><b style={{color:"#37d67a"}}>{candidates.length}</b><small>Đang tìm trận{candidates.length?" ▸":""}</small></div>
        <div className="b"><b>{incomingCount}</b><small>Lời mời chờ</small></div>
      </div>

      <div className="card" style={{marginTop:10}}>
        <div className="row" style={{alignItems:"center"}}><b className="grow">📅 Lịch "tôi muốn chơi"</b>
          <button className="btn sm ghost" onClick={()=>setSchedOpen(o=>!o)}>{schedOpen?"Thu":"Đặt lịch"}</button></div>
        {schedOpen && <div style={{marginTop:9}}>
          <div className="shead">Thứ rảnh</div>
          <div className="multi">{DAYS.map(d=><span key={d} className={"pill"+(myDays.includes(d)?" on":"")} onClick={()=>toggleU("days",d)}>{d}</span>)}</div>
          <div className="shead" style={{marginTop:10}}>Giờ rảnh</div>
          <div className="multi">{AVAIL_SLOTS.map(s=><span key={s} className={"pill"+(mySlots.includes(s)?" on":"")} onClick={()=>toggleU("avail",s)}>{s}</span>)}</div>
          <div className="shead" style={{marginTop:10}}>Kèo vui</div>
          <div className="multi">{["",...BET_LEVELS].map(b=><span key={b||"any"} className={"pill"+((myBet||"")===b?" on":"")} onClick={()=>setUser&&setUser(u=>({...u,schedBet:b}))}>{b||"Bất kỳ"}</span>)}</div>
          <div className="field" style={{marginTop:10,marginBottom:0}}><label>Quán muốn chơi (tối đa 3)</label>
            {myClubs.length>0 && <div className="gts" style={{marginBottom:6}}>{myClubs.map(id=><span key={id} className="chip" style={{cursor:"pointer"}} onClick={()=>rmClubSched(id)}>{(clubById(id)||{}).name||id} ✕</span>)}</div>}
            {myClubs.length<3 && <select className="select" value="" onChange={e=>addClubSched(e.target.value)}>
              <option value="">+ Thêm quán…</option>{CLUBS_AZ.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>}
          </div>
        </div>}
        {(myDays.length||mySlots.length||myClubs.length||myBet) ? <div style={{marginTop:10}}>
          <div className="shead">Đối thủ khớp lịch ({sched.length})</div>
          {sched.length===0 && <div className="sub" style={{margin:0}}>Chưa có ai khớp — thử thêm thứ/giờ hoặc đổi quán.</div>}
          {sched.map(p=>(
            <div className="card pcard tap" key={p.id} style={{padding:10,marginBottom:6}} onClick={()=>setDetail(p)}>
              <Avatar name={p.name} id={p.id} size={38} av={p.avatar}/>
              <div className="meta" style={{minWidth:0}}><div className="name" style={{fontSize:14}}><span className={"dot"+(p.online?" on":"")}></span>{p.name}</div>
                <div className="line"><TierBadge elo={p.elo}/><span className="elo">{p.elo}</span> · {fmtKm(p.dist)}</div>
                <div className="line" style={{color:"#37d67a",fontSize:12}}>✓ {[...p.dayOv,...p.slotOv].join(", ")||"giờ khác"}{p.clubM?" · cùng quán":""}{p.betM?" · ☕ "+p.bet:""}</div></div>
              <div onClick={e=>e.stopPropagation()}><ConnectBtn rel={rel[p.id]} id={p.id} setRelOf={setRelOf} flash={flash} name={p.name}/></div>
            </div>))}
        </div> : <div className="sub" style={{marginTop:9,fontSize:12}}>Chọn thứ/giờ rảnh & quán để xem gợi ý đối thủ khớp lịch.</div>}
      </div>

      {tip && <div className="card" style={{borderColor:"#1c5c44",marginTop:10}}>
        <div className="row" style={{alignItems:"flex-start",gap:8}}>
          <div className="grow" style={{fontSize:13,lineHeight:1.55}}>👋 <b>Mới dùng?</b> Bấm <b style={{color:"#37d67a"}}>⚡ Tìm đối ngay</b> để ghép trận gần bạn · lọc theo hạng/quận/giờ rảnh · mở hồ sơ cơ thủ để xem <b>gợi ý chấp</b> · vào <b>Giải đấu</b> để thi đấu, <b>Tập luyện</b> để lên trình.</div>
          <button className="btn sm ghost" onClick={()=>{setTip(false);store.set("ct.seenTip",true);}}>Ẩn</button>
        </div>
      </div>}

      <button className="btn block" style={{margin:"4px 0 8px",background:"#37d67a",color:"#062314"}} onClick={startMatch}>⚡ Tìm đối ngay {candidates.length>0?"— "+candidates.length+" người đang tìm trận gần bạn":""}</button>
      <button className="btn ghost block" style={{margin:"0 0 8px"}} onClick={()=>setSwipeOpen(true)} disabled={swipeList.length===0}>🃏 Quẹt tìm đối theo độ hợp {swipeList.length>0?"("+swipeList.length+")":""}</button>
      <button className="btn ghost block" style={{margin:"0 0 12px",borderColor:user.lookingNow?"#37d67a":"var(--line)",color:user.lookingNow?"#37d67a":"var(--text)"}} onClick={()=>setUser&&setUser(u=>({...u,lookingNow:!u.lookingNow}))}>{user.lookingNow?"🟢 Đang hiện 'muốn chơi ngay' — bấm để tắt":"⚡ Bật: tôi đang muốn chơi (người khác thấy & mời)"}</button>
      {onlineCount>0 && <div style={{margin:"-4px 0 12px",fontSize:13,color:"#37d67a",fontWeight:700}}>🟢 {onlineCount} cơ thủ đang online</div>}

      <div className="card" style={{marginBottom:12}}>
        <div className="row" style={{alignItems:"center",marginBottom:8}}>
          <b className="grow">📣 Kèo mở quanh đây{openVisible.length>0?" · "+openVisible.length:""}</b>
          <button className="btn sm" onClick={()=>setPostOpen(true)}>+ Đăng kèo</button>
        </div>
        {openVisible.length===0
          ? <div className="sub" style={{margin:0}}>Chưa có kèo nào. Bấm <b>+ Đăng kèo</b> để rủ mọi người — kiểu "Ai 9 bi tối nay ở Cầu Giấy?"</div>
          : openVisible.slice(0,8).map(o=>{ const mine=o.host_id===myId(); return (
              <div className="kv" key={o.id} style={{alignItems:"flex-start",gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <b>{o.host_name||"Cơ thủ"}</b> <span className="chip gt">{o.game}</span>
                  <div style={{fontSize:12.5,color:"var(--muted)",marginTop:2}}>📍 {o.area} · 🕒 {o.when_text}{o.tier_label?" · 🎯 "+o.tier_label:""}</div>
                  {o.note && <div style={{fontSize:12.5,color:"var(--muted-2)",marginTop:2}}>{o.note}</div>}
                </div>
                {mine
                  ? <button className="btn sm ghost" onClick={()=>{ if(cloud.ready())cloud.openMatchDel(o.id); setOpenM(m=>m.filter(x=>x.id!==o.id)); }}>Gỡ</button>
                  : <button className="btn sm" onClick={()=>{ if(isRealId(o.host_id)) openChat(o.host_id); else flash("Đây là kèo mẫu — hãy đăng kèo của bạn!"); }}>Nhắn</button>}
              </div>
            );})}
      </div>
      {postOpen && <OpenMatchForm user={user} onSave={addOpen} onClose={()=>setPostOpen(false)} />}

      <div style={{position:"relative",marginBottom:12}}>
        <input className="input" placeholder="🔎 Tìm theo tên…" value={q} onChange={e=>setQ(e.target.value)}/>
        {q && <span onClick={()=>setQ("")} title="Xoá" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"var(--muted)",fontSize:15}}>✕</span>}
      </div>

      <div className="row wrap" style={{marginBottom:12,gap:8,alignItems:"center"}}>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={purpF} onChange={e=>setPurpF(e.target.value)}>
          <option value="all">Mục đích</option>
          {PURPOSES.map(P=><option key={P.k} value={P.k}>{P.emoji} {P.label}</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={tier} onChange={e=>setTier(e.target.value)}>
          <option value="all">Hạng</option>
          {TIERS.map(t=><option key={t.name} value={t.name}>Hạng {t.name}</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={game} onChange={e=>setGame(e.target.value)}>
          <option value="all">Thể loại</option>
          {GAME_TYPES.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={pArea} onChange={e=>setPArea(e.target.value)}>
          <option value="all">Quận</option>
          {AREAS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={maxKm} onChange={e=>setMaxKm(+e.target.value)}>
          {[5,10,20,30].map(k=><option key={k} value={k}>≤ {k} km</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={freeNow?"now":"all"} onChange={e=>setFreeNow(e.target.value==="now")}>
          <option value="all">Thời gian</option>
          <option value="now">🟢 Rảnh giờ này</option>
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={betF} onChange={e=>setBetF(e.target.value)}>
          <option value="all">Kèo</option>
          {BET_LEVELS.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="near">Gần nhất</option>
          <option value="elo">ELO cao nhất</option>
          <option value="match">🤝 Độ hợp cao nhất</option>
        </select>
        {(tier!=="all"||game!=="all"||pArea!=="all"||q||freeNow||betF!=="all"||maxKm!==20) && <span className="pill" onClick={()=>{setTier("all");setGame("all");setPArea("all");setQ("");setFreeNow(false);setBetF("all");setMaxKm(20);}}>✕ Xoá lọc</span>}
      </div>

      <div className="seg" style={{marginBottom:12}}>
        <button className={view==="list"?"on":""} onClick={()=>setView("list")}>📋 Danh sách</button>
        <button className={view==="map"?"on":""} onClick={()=>setView("map")}>🗺️ Bản đồ</button>
      </div>

      {view==="map"
        ? <MapBox user={user} players={list} rel={rel} onPlayer={p=>setDetail({...p,dist:haversine(user,p)})} />
        : <React.Fragment>
            {list.length===0 && <div className="empty"><div className="ic">🎱</div>Không có cơ thủ nào khớp bộ lọc. Thử nới bán kính nhé.</div>}
            {list.map(p=><PlayerCard key={p.id} p={p} rel={rel[p.id]} setRelOf={setRelOf} flash={flash} onOpen={()=>setDetail(p)} />)}
          </React.Fragment>}

      {detail && <PlayerModal p={detail} rel={rel[detail.id]} setRelOf={setRelOf} flash={flash} onClose={()=>setDetail(null)} openChat={openChat} matches={matches} user={user} blocked={blocked} toggleBlock={toggleBlock} />}
      {mnOpen && cand && <MatchNowModal p={cand} user={user} remaining={candidates.length-mnIdx-1}
        onConnect={()=>{ setRelOf(cand.id,"sent"); flash("Đã gửi lời mời ghép trận tới "+cand.name+" ⚡"); setMnOpen(false); }}
        onSkip={()=>{ if(mnIdx+1<candidates.length) setMnIdx(mnIdx+1); else { setMnOpen(false); flash("Đã hết cơ thủ đang tìm trận gần bạn"); } }}
        onClose={()=>setMnOpen(false)} />}
      {swipeOpen && <SwipeModal list={swipeList} user={user} onConnect={id=>setRelOf(id,"sent")} onClose={()=>setSwipeOpen(false)} />}
    </div>
  );
}

function SwipeModal({list,user,onConnect,onClose}){
  const [i,setI]=useState(0);
  const p=list[i];
  const next=()=>setI(x=>x+1);
  const back=()=>setI(x=>Math.max(0,x-1));
  const connect=()=>{ if(p){ onConnect(p.id); } setI(x=>x+1); };
  useEffect(()=>{ const h=e=>{ if(e.key==="ArrowRight"){ if(p) onConnect(p.id); setI(x=>x+1); } else if(e.key==="ArrowLeft") setI(x=>x+1); else if(e.key==="Escape") onClose(); }; window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[i,p,onConnect,onClose]);
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:360}}>
      <div className="row" style={{marginBottom:8,alignItems:"center"}}><b className="grow">🃏 Quẹt tìm đối</b>
        <button onClick={onClose} aria-label="Đóng" style={{background:"none",color:"var(--muted)",fontSize:22,lineHeight:.8,cursor:"pointer"}}>×</button></div>
      {!p ? <div className="empty"><div className="ic">🎱</div>Hết cơ thủ phù hợp. Thử nới bộ lọc hoặc bán kính nhé.</div>
      : <React.Fragment>
        <div style={{textAlign:"center",padding:"6px 0 2px"}}>
          <Avatar name={p.name} id={p.id} size={84} av={p.avatar}/>
          <div className="name" style={{fontSize:20,marginTop:8,justifyContent:"center"}}><span className={"dot"+(p.online?" on":"")}></span>{p.name}{p.cloud&&<span className="chip" style={{marginLeft:6}}>● thật</span>}</div>
          <div style={{marginTop:6}}><TierBadge elo={p.elo}/> <span className="elo">{p.elo} ELO</span></div>
          <div style={{margin:"10px 0",fontSize:32,fontWeight:900,color:"var(--gold)"}}>🤝 {p._compat}%</div>
          <div className="line" style={{justifyContent:"center"}}>📍 {p.areaName} · {fmtKm(p.dist)}{user?" · chấp "+handicap(user.elo,p.elo):""}</div>
          <div className="gts" style={{justifyContent:"center",marginTop:8}}>{p.games.map(g=><span key={g} className="chip gt">{g}</span>)}</div>
          {p.bio && <p style={{color:"var(--muted)",fontSize:13,marginTop:8}}>"{p.bio}"</p>}
        </div>
        <div className="row" style={{gap:12,marginTop:14}}>
          <button className="btn ghost grow" style={{fontSize:15}} onClick={next}>✕ Bỏ qua</button>
          <button className="btn green grow" style={{fontSize:15}} onClick={connect}>💚 Kết nối</button>
        </div>
        <div style={{textAlign:"center",fontSize:11,color:"var(--muted-2)",marginTop:10}}>{i>0 && <span onClick={back} style={{cursor:"pointer",color:"var(--gold)",marginRight:8}}>↩ Hoàn tác</span>}{i+1} / {list.length}</div>
      </React.Fragment>}
    </div></div>
  );
}

function MatchNowModal({p,user,onConnect,onSkip,onClose,remaining}){
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div style={{textAlign:"center",marginBottom:6}}><div style={{fontSize:12,color:"#37d67a",fontWeight:800,letterSpacing:.5}}>⚡ ĐANG MUỐN CHƠI NGAY</div></div>
      <div className="row" style={{gap:13,marginBottom:10}}>
        <Avatar name={p.name} id={p.id} size={56} av={p.avatar}/>
        <div><div className="name" style={{fontSize:18}}><span className="dot on"></span>{p.name}</div>
          <div className="line"><TierBadge elo={p.elo}/><span className="elo">{p.elo} ELO</span></div></div>
      </div>
      <div className="kv"><span>Khoảng cách</span><b style={{color:"var(--gold)"}}>📍 {p.areaName} · {fmtKm(p.dist)}</b></div>
      <div className="kv"><span>Thể loại</span><b style={{textAlign:"right"}}>{p.games.join(", ")}</b></div>
      {p.bet && <div className="kv"><span>Kèo vui</span><b>☕ {p.bet}</b></div>}
      {user && <div className="kv"><span>Độ hợp</span><b style={{textAlign:"right",color:"var(--gold)"}}>🤝 {compat(user,p)}%</b></div>}
      {user && <div className="kv"><span>Gợi ý chấp</span><b style={{textAlign:"right",color:"var(--gold)"}}>{handicap(user.elo,p.elo)}</b></div>}
      <div className="kv"><span>Trạng thái</span><b style={{color:"#37d67a"}}>Đang tìm trận{p.avail?" · rảnh "+p.avail.join("/"):""}</b></div>
      {p.bio && <p style={{color:"var(--muted)",fontSize:13,marginTop:10}}>"{p.bio}"</p>}
      <button className="btn block" style={{marginTop:14,background:"#37d67a",color:"#062314"}} onClick={onConnect}>Kết nối ngay ⚡</button>
      <button className="btn ghost block" style={{marginTop:8}} onClick={onSkip}>Bỏ qua{remaining>0?" ("+remaining+" người nữa)":""}</button>
    </div></div>
  );
}

function PlayerCard({p,rel,setRelOf,flash,onOpen}){
  return (
    <div className="card pcard tap" onClick={onOpen}>
      <Avatar name={p.name} id={p.id}/>
      <div className="meta">
        <div className="name"><span className={"dot"+(p.online?" on":"")}></span>{p.name}
          {p.cloud && <span className="chip" style={{marginLeft:6}}>● thật</span>}
          {p.online&&p.lookingNow && <span className="chip" style={{marginLeft:6,background:"#0e2c20",color:"#37d67a",borderColor:"#1c5c44"}}>⚡ đang tìm trận</span>}
          {p.dist<1.5 && <span className="chip" style={{marginLeft:6}}>📍 rất gần</span>}</div>
        <div className="line"><TierBadge elo={p.elo}/><span className="elo">{p.elo}</span> · <span>📍 {p.areaName} · {fmtKm(p.dist)}</span>{p.bet?" · ☕ "+p.bet:""}{typeof p._compat==="number"?<span> · 🤝 <b style={{color:"var(--gold)"}}>{p._compat}%</b></span>:null}</div>
        <div className="gts">{(()=>{const P=purposeMeta(purposeOf(p)); return P?<span className="chip" style={{background:"#1a2e25",color:"#8fe3bf",borderColor:"#2c5c47"}}>{P.emoji} {P.label}</span>:null;})()}{p.games.map(g=><span key={g} className="chip gt">{g}</span>)}</div>
      </div>
      <div onClick={e=>e.stopPropagation()}><ConnectBtn rel={rel} id={p.id} setRelOf={setRelOf} flash={flash} name={p.name}/></div>
    </div>
  );
}

function ConnectBtn({rel,id,setRelOf,flash,name,big}){
  const cls = big?"btn block":"btn sm";
  if(rel==="matched") return <button className={cls+" green"} disabled>✓ Đã kết nối</button>;
  if(rel==="sent")    return <button className={cls+" ghost"} disabled>Đã gửi lời mời</button>;
  if(rel==="incoming")return <button className={cls+" green"} onClick={()=>{setRelOf(id,"matched");flash("Đã kết nối với "+name+"! 🎉");}}>Chấp nhận</button>;
  return <button className={cls} onClick={()=>{setRelOf(id,"sent");flash("Đã gửi lời mời tới "+name);}}>+ Kết nối</button>;
}

function PlayerModal({p,rel,setRelOf,flash,onClose,openChat,matches,user,blocked=[],toggleBlock}){
  const t=tierOf(p.elo);
  const h2h=(matches||[]).filter(m=>m.oppId===p.id);
  const h2hW=h2h.filter(m=>m.win).length, h2hL=h2h.length-h2hW;
  const [rep,setRep]=useState(()=>{ const v=store.get("ct.rep",{})[p.id]; return (v&&typeof v==="object")?v:{}; }); // uy tín bạn chấm cho đối thủ (đa tiêu chí)
  const rate=(k,v)=>{ const nr={...rep,[k]:v}; setRep(nr); const all=store.get("ct.rep",{}); all[p.id]=nr; store.set("ct.rep",all);
    const vals=Object.values(nr).filter(Boolean); const avg=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
    if(avg && cloud.ready()) cloud.rate("player",p.id,avg);
    flash&&flash("Đã chấm uy tín ⭐"); };
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:"90vh",overflowY:"auto"}}>
      <button onClick={onClose} aria-label="Đóng" style={{float:"right",background:"none",color:"var(--muted)",fontSize:24,lineHeight:.8,cursor:"pointer",padding:"0 2px"}}>×</button>
      <div className="row" style={{gap:13,marginBottom:8}}>
        <Avatar name={p.name} id={p.id} size={56}/>
        <div><div className="name" style={{fontSize:18}}><span className={"dot"+(p.online?" on":"")}></span>{p.name}</div>
          <div className="line"><TierBadge elo={p.elo}/><span className="elo">{p.elo} ELO</span></div></div>
      </div>
      {p.bio && <p style={{color:"var(--muted)",fontSize:13.5,margin:"6px 0 12px"}}>"{p.bio}"</p>}
      <div className="kv"><span>Khu vực</span><b>{p.areaName} · {fmtKm(p.dist)}</b></div>
      <div className="kv"><span>Thể loại</span><b style={{textAlign:"right"}}>{p.games.join(", ")}</b></div>
      {(()=>{const P=purposeMeta(purposeOf(p)); return P?<div className="kv"><span>Mục đích</span><b>{P.emoji} {P.label}</b></div>:null;})()}

      {p.freq && <div className="kv"><span>Mức độ chơi</span><b>🔁 {p.freq}</b></div>}
      {p.bet && <div className="kv"><span>Kèo vui</span><b>☕ {p.bet}</b></div>}
      {user && p.id!==user.id && <div className="kv"><span>Độ hợp với bạn</span><b style={{textAlign:"right",color:"var(--gold)"}}>🤝 {compat(user,p)}%</b></div>}
