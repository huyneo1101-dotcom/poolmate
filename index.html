    {h:"Nghi thức reset",p:"Khi thấy tilt: lùi khỏi bàn, 3 hơi thở dài, lau tay/lơ cơ, nói một câu mỏ neo ('về với quá trình'), rồi mới vào lại pre-shot."},
    {h:"Chuỗi thua",p:"Đừng đổi toàn bộ lối chơi sau 2–3 ván thua. Quay về cơ bản: một cú một, mục tiêu quá trình. Chuỗi thua thường có yếu tố biến động — kiên nhẫn."},
    {h:"Sau trận",p:"Tách 'kết quả' khỏi 'màn trình diễn'. Tự hỏi: quyết định có hợp lý không? Nếu có, đó là trận tốt dù thua. Ghi lại 1 điều cần cải thiện, rồi gác lại."},
  ]},
  {id:"a9",icon:"🧊",title:"Tâm lý ván quyết định (clutch)",sub:"Giữ vững ở hill-hill và những cú áp lực nhất.",body:[
    {h:"Coi là cú bình thường",p:"Ván quyết định vẫn chỉ là những cú bạn đã đánh nghìn lần. Đừng 'nâng tầm' nó lên thành sống còn — làm đúng routine như mọi cú."},
    {h:"Thu hẹp sự chú ý",p:"Khi áp lực, thu nhỏ thế giới lại còn: bi mục tiêu, điểm chạm, lực. Bỏ qua tỉ số, khán giả, hậu quả."},
    {h:"Thở để hạ adrenaline",p:"Một nhịp thở ra dài ngay trước khi cúi xuống giúp tay hết run. Đây là lúc QUAN TRỌNG NHẤT để chậm lại, không phải nhanh lên."},
    {h:"Cam kết với cú đánh",p:"Đã quyết thì đánh dứt khoát, theo cơ trọn vẹn. Do dự giữa chừng (giảm tốc, 'gồng') là nguyên nhân số 1 trượt cú quan trọng."},
  ]},
  {id:"a10",icon:"⚖️",title:"Khi đang dẫn hoặc bị dẫn",sub:"Giữ tâm thế đúng ở cả hai đầu tỉ số.",body:[
    {h:"Khi đang dẫn",p:"Đừng 'giữ' tỉ số hay nghĩ tới chiến thắng — đó là lúc dễ chùng tay. Tiếp tục tấn công từng cú như khi tỉ số 0–0. Một ván một."},
    {h:"Khi bị dẫn",p:"Đừng tính 'phải gỡ mấy ván' — quá tải tâm lý. Chỉ tập trung thắng VÁN TIẾP THEO. Nhiều cú lội ngược dòng bắt đầu từ đúng một ván chắc chắn."},
    {h:"Đừng thay đổi lối chơi vì tỉ số",p:"Cố đánh quá an toàn khi dẫn, hoặc liều lĩnh khi bị dẫn, đều phá nhịp. Giữ chiến lược hợp lý bất kể tỉ số."},
    {h:"Mốc neo cảm xúc",p:"Dù dẫn hay thua, giữ nhịp thở & body language ổn định — cảm xúc bình thản giúp quyết định sáng suốt hơn."},
  ]},
  {id:"a11",icon:"🎞️",title:"Hình dung & diễn tập tinh thần",sub:"'Chiếu phim' cú đánh trong đầu trước khi thực hiện.",body:[
    {h:"Vì sao hiệu quả",p:"Não gần như không phân biệt việc tưởng tượng sống động với việc làm thật — hình dung giúp 'lập trình' động tác & tăng tự tin."},
    {h:"Trong pre-shot",p:"Trước khi cúi xuống, thấy rõ trong đầu: đường bi mục tiêu vào lỗ và bi cái dừng ở đâu. Đánh theo 'cuốn phim' đó."},
    {h:"Trước trận",p:"Vài phút nhắm mắt, hình dung mình bình tĩnh, vào nhịp, xử lý tốt cả cú khó lẫn lúc áp lực."},
    {h:"Diễn tập tình huống khó",p:"Tưởng tượng cảnh bị dẫn, ván hill-hill, hay bị hook — và thấy mình phản ứng điềm tĩnh. Khi gặp thật sẽ bớt sốc."},
  ]},
  {id:"a12",icon:"💪",title:"Tự tin & ngôn ngữ cơ thể",sub:"Dáng đứng và thói quen định hình cảm xúc của bạn.",body:[
    {h:"Cơ thể dẫn dắt tâm trí",p:"Đứng thẳng, bước chậm chắc, nhịp thở đều — não nhận tín hiệu 'đang kiểm soát'. Gục vai, thở dốc, lắc đầu sẽ kéo tinh thần xuống."},
    {h:"Giữ phản ứng trung tính",p:"Hạn chế bộc lộ thất vọng sau cú trượt (đối thủ đọc được, và bạn tự ám thị tiêu cực). Giữ mặt 'poker' giúp ổn định bản thân."},
    {h:"Tự tin từ bằng chứng",p:"Nuôi tự tin bằng nhật ký thành tích & buổi tập tốt, không phải hô khẩu hiệu. Nhớ lại cú/ván bạn từng đánh hay."},
    {h:"Câu mỏ neo",p:"Chọn 1 câu ngắn lặp trước cú ('tin tay', 'theo cơ') như công tắc đưa bạn về trạng thái tốt."},
  ]},
  {id:"a13",icon:"😮‍💨",title:"Đối phó hồi hộp / lo âu",sub:"Biến căng thẳng thành sự tập trung có ích.",body:[
    {h:"Hồi hộp là bình thường",p:"Tim đập nhanh, tay hơi run là cơ thể đang 'lên dây' — kể cả cao thủ cũng vậy. Vấn đề không phải có hồi hộp, mà là cách bạn diễn giải nó."},
    {h:"Đổi nhãn: 'lo' → 'hứng'",p:"Cùng một cảm giác sinh lý, hãy gọi nó là 'mình đang sẵn sàng/hào hứng' thay vì 'mình đang sợ'. Cách gắn nhãn đổi cả trải nghiệm."},
    {h:"Thở 4–6",p:"Hít 4 giây, thở ra 6 giây trong vài nhịp: thở ra dài hơn hít vào sẽ hạ nhịp tim & làm dịu thần kinh."},
    {h:"Hành động nhỏ trước mắt",p:"Khi lo lắng về kết quả, kéo sự chú ý về việc cụ thể ngay lúc này: lơ cơ, đọc bàn, một cú. Lo âu giảm khi tay & đầu có việc rõ ràng."},
  ]},
];
function ArticleModal({a,onClose}){
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:"90vh",overflowY:"auto"}}>
      <button onClick={onClose} aria-label="Đóng" style={{float:"right",background:"none",color:"var(--muted)",fontSize:24,lineHeight:.8,cursor:"pointer",padding:"0 2px"}}>×</button>
      <div className="h1" style={{fontSize:18,marginBottom:4,paddingRight:22}}>{a.icon} {a.title}</div>
      <div className="sub" style={{marginBottom:12}}>{a.sub}</div>
      {a.body.map((b,i)=>(<div key={i} style={{marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:14,marginBottom:3}}>{b.h}</div>
        <div style={{fontSize:13.5,color:"var(--text)",lineHeight:1.6}}>{b.p}</div></div>))}
      <div className="legal" style={{margin:"6px auto 0"}}>Kiến thức thể thao/tâm lý chung — tham khảo, không thay tư vấn chuyên môn.</div>
      <button className="btn ghost block" style={{marginTop:12}} onClick={onClose}>Đóng</button>
    </div></div>
  );
}
function PsychTab(){
  const [open,setOpen]=useState(null);
  return (
    <div>
      <div className="sub" style={{marginTop:2}}>Tâm lý, dòng chảy, tập trung, hơi thở, routine & sức khỏe — nền tảng để kỹ thuật phát huy khi thi đấu. Chạm để đọc.</div>
      {ARTICLES.map(a=>(
        <div className="card tap" key={a.id} style={{padding:12,marginBottom:8,display:"flex",gap:12,alignItems:"center"}} onClick={()=>setOpen(a)}>
          <div style={{fontSize:26}}>{a.icon}</div>
          <div className="grow" style={{minWidth:0}}><div className="name" style={{fontSize:14.5}}>{a.title}</div>
            <div className="line" style={{marginTop:2,color:"var(--muted)"}}>{a.sub}</div></div>
          <span style={{color:"var(--muted)",fontSize:18}}>›</span>
        </div>))}
      {open && <ArticleModal a={open} onClose={()=>setOpen(null)} />}
    </div>
  );
}

/* ============================================================
   CLB BI-A (danh sách 143 quán thật)
   ============================================================ */
const stars = n => "★★★★★☆☆☆☆☆".slice(5-Math.round(n), 10-Math.round(n));
function ClubBadge({label}){ const s=STATUS_STYLE[label]||{color:"var(--muted)",bg:"var(--panel)",b:"var(--line)"};
  return <span className="chip" style={{marginLeft:4,color:s.color,background:s.bg,borderColor:s.b}}>{label}</span>; }
function ClubsView({user,setUser,flash,addPoints}){
  const [q,setQ]=useState("");
  const [area,setArea]=useState("all");
  const [view,setView]=useState("list");
  const [flt,setFlt]=useState("all"); // all | new | promo | fav
  const [slot,setSlot]=useState("all"); // khung giờ tính giá: all|Sáng|Trưa|Tối
  const [tbl,setTbl]=useState("all"); // hãng bàn: all|<tên hãng>
  const [limit,setLimit]=useState(40);
  const [sortBy,setSortBy]=useState("near"); // near | rating | price
  const [detail,setDetail]=useState(null);
  const [ratings,setRatings]=useState(()=>store.get("ct.clubRatings",{}));
  const [reviews,setReviews]=useState(()=>{ const s=store.get("ct.clubReviews",null); return s||SEED_REVIEWS; });
  const [bookings,setBookings]=useState(()=>store.get("ct.bookings",[]));
  const [photos,setPhotos]=useState(()=>store.get("ct.clubPhotos",{}));
  const [cfac,setCfac]=useState(()=>store.get("ct.clubFactors",{})); // {clubId:{service,food,cue,space,price}}
  useEffect(()=>{ store.set("ct.clubRatings",ratings); },[ratings]);
  useEffect(()=>{ store.set("ct.clubReviews",reviews); },[reviews]);
  useEffect(()=>{ store.set("ct.bookings",bookings); },[bookings]);
  useEffect(()=>{ store.set("ct.clubPhotos",photos); },[photos]);
  useEffect(()=>{ store.set("ct.clubFactors",cfac); },[cfac]);
  const addPhoto=(id,img)=>{ setPhotos(p=>({...p,[id]:[img,...(p[id]||[])]})); flash("Đã thêm ảnh CLB 📷"); };
  const rateFactor=(id,k,s)=>{ setCfac(f=>{ const cur={...(f[id]||{}),[k]:s}; const vals=Object.values(cur).filter(Boolean); const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    setRatings(rt=>({...rt,[id]:avg})); if(cloud.ready()) cloud.rate("club",id,avg); return {...f,[id]:cur}; }); flash("Đã chấm điểm tiêu chí ⭐"); };
  const fav = user.clubs||[];
  const toggleFav = id => { const has=(user.clubs||[]).includes(id);
    setUser(u=>({...u, clubs: has ? (u.clubs||[]).filter(x=>x!==id) : [...(u.clubs||[]),id]}));
    flash(has?"Đã bỏ khỏi yêu thích":"Đã thêm vào CLB yêu thích ⭐"); };
  const [cloudRatings,setCloudRatings]=useState([]); // đánh giá thật từ máy chủ (mọi người)
  useEffect(()=>{ if(!cloud.on) return; let alive=true,ch;
    const load=()=>cloud.ratingsList().then(l=>{ if(alive&&l) setCloudRatings(l); });
    load(); ch=cloud.subscribeRatings(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[]);
  // review (chữ) thật từ máy chủ — gộp với review mẫu để hiển thị
  useEffect(()=>{ if(!cloud.on) return; let alive=true,ch;
    const load=()=>cloud.clubReviewsList().then(rows=>{ if(!alive||!rows) return; const g={};
      rows.forEach(r=>{ (g[r.club_id]||(g[r.club_id]=[])).push({id:r.id,by:r.by||"Người dùng",stars:r.stars,text:r.body,ts:fmtDateVN((r.created_at||"").slice(0,10))}); });
      const merged={...SEED_REVIEWS}; Object.keys(g).forEach(cid=>{ merged[cid]=[...g[cid],...(SEED_REVIEWS[cid]||[])]; }); setReviews(merged); });
    load(); ch=cloud.subscribeClubReviews(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[]);
  const clubAgg = useMemo(()=>{ const m={}; cloudRatings.forEach(r=>{ if(r.kind!=="club") return; const t=m[r.target]||(m[r.target]={sum:0,n:0}); t.sum+=r.stars; t.n++; }); return m; },[cloudRatings]);
  const ratingOf = id => { const base=clubRating(id), ag=clubAgg[id], my=ratings[id];
    let sum=base.avg*base.count+(ag?ag.sum:0), cnt=base.count+(ag?ag.n:0);
    if(my && !ag){ sum+=my; cnt+=1; }
    return {avg:sum/cnt, count:cnt, my:my||0}; };
  const addReview=(id,st,text,img)=>{ if(cloud.on && !cloud.ready()){ flash("Đăng nhập bằng Email để đánh giá ✉️"); return; }
    const rid="rv"+Date.now()+myId().slice(0,6);
    setReviews(rv=>({...rv,[id]:[{id:rid,by:(user.name||"Bạn"),stars:st,text,img,ts:fmtDateVN(todayStr())},...(rv[id]||[])]})); setRatings(rt=>({...rt,[id]:st}));
    if(cloud.ready()){ cloud.rate("club",id,st); cloud.clubReviewAdd({id:rid,club_id:id,by:(user.name||"Bạn"),stars:st,text}); }
    flash("Đã gửi đánh giá ⭐"); };
  const addBooking=(id,date,slot,tables)=>{ const bid="bk"+Date.now(); setBookings(b=>[{id:bid,clubId:id,date,slot,tables,ts:todayStr()},...b]); addPoints&&addPoints(8);
    if(cloud.ready()) cloud.bookingAdd({id:bid,kind:"club",target:id,target_name:(clubById(id)||{}).name,by_name:user.name,date,slot,info:(tables||"")+" bàn"});
    flash("Đã đặt bàn ✅ — CLB sẽ xác nhận · +8đ 🏵️"); };
  const autoCheckin=()=>{ flash("📍 Đang định vị…"); geoNearestClub((err,res)=>{
    if(err){ flash(err); return; }
    if(!res){ flash("Không tìm thấy quán nào gần đây"); return; }
    const {club,distM}=res;
    if(distM>700){ flash("Quán gần nhất: "+club.name+" (~"+fmtDist(distM)+") — có vẻ bạn chưa ở quán."); setDetail(club); return; }
    if(cloud.on && !cloud.ready()){ flash("Đăng nhập bằng Email để check-in ✉️"); return; }
    cloud.checkinAdd(club.id,(user&&user.name)||"Cơ thủ").then(ok=>{ flash(ok?("✅ Đã tự check-in tại "+club.name+" (~"+fmtDist(distM)+")"):"Check-in lỗi, thử lại"); }); }); };
  const areasWith = AREAS.filter(a=>CLUBS.some(c=>c.area===a.id));
  const list = useMemo(()=> CLUBS.map(c=>({...c,dist:haversine(user,c)}))
    .filter(c=> area==="all"||c.area===area)
    .filter(c=> flt==="all" || (flt==="new"? NEW_CLUBS.includes(c.id) : flt==="promo"? !!clubVoucher(c.id) : flt==="open"? clubOpenNow(c.id) : fav.includes(c.id)))
    .filter(c=> tbl==="all" || clubBrand(c.id)===tbl)
    .filter(c=> !q || (c.name+" "+c.addr).toLowerCase().includes(q.toLowerCase()))
    .sort((a,b)=> sortBy==="rating"? clubRating(b.id).avg-clubRating(a.id).avg : sortBy==="price"? priceAt(a.id,slot)-priceAt(b.id,slot) : a.dist-b.dist),
    [q,area,user,flt,slot,tbl,sortBy]);

  return (
    <div>
      <div className="sub" style={{marginTop:4}}>{CLUBS.length} câu lạc bộ (tên & địa chỉ thật). Chạm thẻ để xem & đánh giá.</div>
      <div style={{position:"relative",marginBottom:12}}>
        <input className="input" placeholder="🔎 Tìm theo tên hoặc địa chỉ…" value={q} onChange={e=>setQ(e.target.value)}/>
        {q && <span onClick={()=>setQ("")} title="Xoá" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"var(--muted)",fontSize:15}}>✕</span>}
      </div>
      <button className="btn block" style={{marginBottom:10,background:"#37d67a",color:"#062314"}} onClick={autoCheckin}>📍 Tự check-in — tìm quán tôi đang ở (định vị)</button>
      <div className="scrollx" style={{marginBottom:10}}>
        <span className={"pill"+(flt==="all"?" on":"")} onClick={()=>setFlt("all")}>Tất cả</span>
        <span className={"pill"+(flt==="fav"?" on":"")} onClick={()=>setFlt("fav")}>❤️ Yêu thích ({fav.length})</span>
        <span className={"pill"+(flt==="new"?" on":"")} onClick={()=>setFlt("new")}>🆕 Mới</span>
        <span className={"pill"+(flt==="promo"?" on":"")} onClick={()=>setFlt("promo")}>🎟️ Đang KM</span>
        <span className={"pill"+(flt==="open"?" on":"")} onClick={()=>setFlt("open")}>🟢 Mở cửa</span>
      </div>
      <div className="row wrap" style={{marginBottom:12,gap:8,alignItems:"center"}}>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={area} onChange={e=>setArea(e.target.value)}>
          <option value="all">Tất cả quận ({CLUBS.length})</option>
          {areasWith.map(a=><option key={a.id} value={a.id}>{a.name} ({CLUBS.filter(c=>c.area===a.id).length})</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={tbl} onChange={e=>setTbl(e.target.value)}>
          <option value="all">Hãng bàn</option>
          {BRANDS.map(b=><option key={b} value={b}>Bàn {b}</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={slot} onChange={e=>setSlot(e.target.value)}>
          <option value="all">Giá thấp nhất</option>
          {PRICE_SLOTS.map(s=><option key={s} value={s}>Giá giờ {s}</option>)}
        </select>
        <select className="select" style={{width:"auto",padding:"7px 10px"}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="near">Gần nhất</option>
          <option value="rating">Điểm cao</option>
          <option value="price">Giá rẻ</option>
        </select>
      </div>
      <div className="seg" style={{marginBottom:12}}>
        <button className={view==="list"?"on":""} onClick={()=>setView("list")}>📋 Danh sách</button>
        <button className={view==="map"?"on":""} onClick={()=>setView("map")}>🗺️ Bản đồ</button>
      </div>

      {view==="map"
        ? <MapBox user={user} clubs={list} onClub={c=>setDetail(c)} />
        : <React.Fragment>
            <div className="sub" style={{marginBottom:10}}>{list.length} kết quả{area!=="all"?" tại "+areaById(area).name:""}.</div>
            {list.slice(0,limit).map(c=>{ const r=ratingOf(c.id); return (
              <div className="card" key={c.id} style={{padding:13,cursor:"pointer"}} onClick={()=>setDetail(c)}>
                <div className="row" style={{alignItems:"flex-start",gap:10}}>
                  <div className="grow">
                    <div className="name" style={{fontSize:15}}>{c.name}
                      {clubBadges(c.id).slice(0,2).map(b=><ClubBadge key={b} label={b}/>)}</div>
                    <div className="line" style={{marginTop:4}}>📍 {c.addr}</div>
                    <div className="line" style={{marginTop:3}}><span style={{color:"var(--gold)"}}>{stars(r.avg)}</span> {r.avg.toFixed(1)} · 🎱 {clubTables(c.id).total} bàn {clubBrand(c.id)} · 💰 {slot==="all"?"từ "+priceAt(c.id,"all")+"k":priceAt(c.id,slot)+"k/"+slot.toLowerCase()} · 🕗 {clubHours(c.id)} · {fmtKm(c.dist)}</div>
                  </div>
                  <button className="btn sm ghost" onClick={e=>{e.stopPropagation();toggleFav(c.id);}}
                    style={{fontSize:18,padding:"6px 11px",color:fav.includes(c.id)?"var(--gold)":"var(--muted)",borderColor:fav.includes(c.id)?"var(--gold)":"var(--line)"}}>
                    {fav.includes(c.id)?"★":"☆"}</button>
                </div>
              </div>
            );})}
            {list.length>limit && <button className="btn ghost block" onClick={()=>setLimit(l=>l+40)}>Xem thêm ({list.length-limit} quán)</button>}
          </React.Fragment>}

      {detail && <ClubModal c={detail} r={ratingOf(detail.id)} fav={fav.includes(detail.id)}
        reviews={reviews[detail.id]||[]} bookings={bookings.filter(b=>b.clubId===detail.id)} voucher={clubVoucher(detail.id)}
        photos={photos[detail.id]||[]} onAddPhoto={img=>addPhoto(detail.id,img)}
        cfac={cfac[detail.id]||{}} onFactor={(k,s)=>rateFactor(detail.id,k,s)}
        onReview={(st,text,img)=>addReview(detail.id,st,text,img)} onBook={(d,s,t)=>addBooking(detail.id,d,s,t)}
        onFav={()=>toggleFav(detail.id)} onClose={()=>setDetail(null)} user={user} flash={flash} />}
    </div>
  );
}

                ongoing:{label:"🔴 Đang diễn ra",color:"#37d67a",bg:"#0e2c20"},
                done:{label:"Đã kết thúc",color:"#9fb0a8",bg:"#1c242a"} };
const tourStatus = t => { const d=todayStr(); return t.date<d?"done":(t.date===d?"ongoing":"upcoming"); };
const pById = id => SEED_PLAYERS.find(p=>p.id===id);
// đơn vị tổ chức: ưu tiên CLB thật (clubId), nếu là giải do CLB tự đăng thì lấy host/addr/area
const tourHost = t => { if(t.clubId){ const c=clubById(t.clubId)||{}; return {name:c.name||"BTC", addr:c.addr||"", area:c.area||"hk"}; } return {name:t.host||"BTC", addr:t.addr||"", area:t.area||"hk"}; };
// thể thức chi tiết theo thể loại (nếu giải không tự ghi rules riêng)
const DEFAULT_RULES={
  "9 bi":"9 bi · Phá trong break box · Phá luân phiên (alternate break) · Đua 9 ván (race to 9) · 3 lỗi liên tiếp xử thua ván",
  "10 bi":"10 bi · Gọi bi gọi lỗ (call shot) · Phá luân phiên · Đua 8 ván · Bi 10 phải gọi, vào do may không tính",
  "Bi-a lỗ (8 bi)":"8 bi (pool) · Phá tự do · Gọi bi gọi lỗ · Đua 7 ván · Đi bi 8 sai lỗ = thua ván",
  "3 băng":"Carom 3 băng · Đua 40 điểm · Bi cái phải chạm tối thiểu 3 băng trước khi chạm bi mục tiêu thứ 2 · Đổi lượt khi trượt",
  "Libre":"Carom libre · Đua 100 điểm · Có giới hạn vùng góc (no double-balk) · Đổi lượt khi trượt",
  "Phăng":"Carom 1 băng (phăng) · Đua 50 điểm · Bi cái chạm ≥1 băng",
};
const tourRules = t => t.rules || DEFAULT_RULES[t.game] || t.game;

/* Giải tự tạo: chọn cơ thủ → tự bốc thăm bracket (seed theo ELO) → ghi người thắng để đi tiếp */
function QuickTours({user}){
  const [tours,setTours]=useState(()=>store.get("ct.mytours",[]));
  useEffect(()=>{ store.set("ct.mytours",tours); },[tours]);
  const [making,setMaking]=useState(false);
  const [openId,setOpenId]=useState(null);
  const [f,setF]=useState({name:"",game:GAME_TYPES[1],size:8});
  const [sel,setSel]=useState([]);
  const pool=[{id:user.id,name:user.name,elo:user.elo,avatar:user.avatar,me:true},...SEED_PLAYERS];
  const find=id=>pool.find(x=>x.id===id)||{};
  const nameOf=id=>find(id).name||"—", eloOf=id=>find(id).elo||0, avOf=id=>find(id).avatar;
  const rname=n=>n===1?"Chung kết":n===2?"Bán kết":n===4?"Tứ kết":"Vòng 1/"+(n*2);
  const toggle=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):(s.length<f.size?[...s,id]:s));
  const setSize=sz=>{ setF(x=>({...x,size:sz})); setSel(s=>s.slice(0,sz)); };
  const create=()=>{
    if(sel.length!==f.size) return;
    const seeded=sel.map(id=>find(id)).sort((a,b)=>b.elo-a.elo).map(p=>p.id);
    const r1=[]; for(let i=0;i<f.size/2;i++) r1.push({a:seeded[i],b:seeded[f.size-1-i],w:null});
    const id="qt"+Date.now();
    setTours(ts=>[{id,name:f.name.trim()||"Giải tự tạo",game:f.game,size:f.size,rounds:[r1]},...ts]);
    setMaking(false); setSel([]); setF(x=>({...x,name:""})); setOpenId(id);
  };
  const setWinner=(tid,ri,mi,w)=>setTours(ts=>ts.map(t=>{
    if(t.id!==tid) return t;
    let rounds=t.rounds.map(r=>r.map(m=>({...m}))).slice(0,ri+1);
    rounds[ri][mi].w=w;
    while(rounds[rounds.length-1].length>1 && rounds[rounds.length-1].every(m=>m.w)){
      const ws=rounds[rounds.length-1].map(m=>m.w), nx=[];
      for(let i=0;i<ws.length/2;i++) nx.push({a:ws[2*i],b:ws[2*i+1],w:null});
      rounds.push(nx);
    }
    return {...t,rounds};
  }));
  const del=id=>{ setTours(ts=>ts.filter(t=>t.id!==id)); if(openId===id)setOpenId(null); };
  const champOf=t=>{ const last=t.rounds[t.rounds.length-1]; return last.length===1&&last[0].w?last[0].w:null; };
  return (
    <div className="card" style={{marginBottom:12,borderColor:"#1c5c44"}}>
      <div className="row"><b className="grow">🎲 Giải tự tạo — bốc thăm tự động</b>
        <button className="btn sm" onClick={()=>setMaking(m=>!m)}>{making?"Đóng":"+ Tạo giải"}</button></div>
      {making && <div style={{marginTop:10}}>
        <div className="field" style={{marginBottom:8}}><label>Tên giải</label><input className="input" value={f.name} placeholder="VD: Giải bạn bè cuối tuần" onChange={e=>setF(x=>({...x,name:e.target.value}))}/></div>
        <div className="row" style={{gap:8}}>
          <div className="field grow" style={{marginBottom:8}}><label>Thể loại</label><select className="select" value={f.game} onChange={e=>setF(x=>({...x,game:e.target.value}))}>{GAME_TYPES.map(g=><option key={g}>{g}</option>)}</select></div>
          <div className="field" style={{width:120,marginBottom:8}}><label>Số cơ thủ</label><select className="select" value={f.size} onChange={e=>setSize(+e.target.value)}>{[4,8,16].map(n=><option key={n} value={n}>{n} người</option>)}</select></div>
        </div>
        <div className="shead">Chọn cơ thủ ({sel.length}/{f.size})</div>
        <div className="multi" style={{maxHeight:170,overflowY:"auto"}}>
          {pool.map(p=><span key={p.id} className={"pill"+(sel.includes(p.id)?" on":"")} onClick={()=>toggle(p.id)}>{p.me?"⭐ ":""}{p.name} · {p.elo}</span>)}
        </div>
        <button className="btn block" style={{marginTop:10}} disabled={sel.length!==f.size} onClick={create}>🎲 Bốc thăm & tạo bracket (seed theo ELO)</button>
      </div>}
      {tours.length>0 && <div style={{marginTop:10}}>
        {tours.map(t=>{ const champ=champOf(t); const open=openId===t.id; return (
          <div className="card" key={t.id} style={{marginBottom:8,padding:11}}>
            <div className="row" style={{alignItems:"center"}}>
              <div className="grow" onClick={()=>setOpenId(open?null:t.id)} style={{cursor:"pointer",minWidth:0}}>
                <b style={{fontSize:14}}>{t.name}</b>
                <div className="line" style={{marginTop:2}}>{t.size} người · {t.game}{champ?" · 🏆 "+nameOf(champ):" · đang diễn ra"}</div></div>
              <button className="btn sm ghost" onClick={()=>setOpenId(open?null:t.id)}>{open?"Thu":"Mở"}</button>
              <button className="btn sm danger" style={{marginLeft:6}} onClick={()=>del(t.id)}>Xoá</button>
            </div>

                      {[m.a,m.b].map(pid=>pid?(
                        <div key={pid} onClick={()=>setWinner(t.id,ri,mi,pid)} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 6px",borderRadius:6,cursor:"pointer",background:m.w===pid?"rgba(55,214,122,.16)":"transparent"}}>
                          <Avatar name={nameOf(pid)} id={pid} size={26} av={avOf(pid)}/>
                          <span className="grow" style={{fontSize:13,fontWeight:m.w===pid?800:400}}>{nameOf(pid)} <span className="elo" style={{fontSize:11}}>{eloOf(pid)}</span></span>
                          {m.w===pid?<span style={{color:"#37d67a",fontSize:12}}>✓ thắng</span>:<span style={{color:"var(--muted-2)",fontSize:11}}>chọn ›</span>}
                        </div>):null)}

            </div>}
          </div>
        );})}
      </div>}
    </div>
  );
}
function Tournaments({user,flash,matches,rel,setRelOf,openChat,tourjoined,joinTour,leaveTour,recordTour,tourResults,clubTours,ads}){
  const joined=tourjoined||{}; const results=tourResults||{};
  const [filt,setFilt]=useState("all");
  const [detailT,setDetailT]=useState(null); // giải đang xem
  const [detailP,setDetailP]=useState(null); // cơ thủ đang xem
  const [registerT,setRegisterT]=useState(null); // giải đang đăng ký (mở form QR)

  const order={ongoing:0,upcoming:1,done:2};
  const cancelReg=id=>leaveTour(id);
  const confirmReg=t=>{ joinTour(t.id); setRegisterT(null); };
  const openP = p => p && setDetailP({...p, dist:haversine(user,p)});

  const [cloudTours,setCloudTours]=useState([]); // giải CLB tạo, từ máy chủ (dùng chung)
  useEffect(()=>{ if(!cloud.on) return; let alive=true,ch;
    const load=()=>cloud.clubToursList().then(l=>{ if(alive&&l) setCloudTours(l); });
    load(); ch=cloud.subscribeClubTours(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[]);
  const ALL = useMemo(()=>[...TOURNAMENTS, ...(cloud.on?cloudTours:clubTours)],[clubTours,cloudTours]);
  const list=useMemo(()=>{
    let arr=ALL.map(t=>({...t, st:tourStatus(t)}));
    if(filt==="mine") arr=arr.filter(t=>joined[t.id]);
    else if(filt!=="all") arr=arr.filter(t=>t.st===filt);
    return arr.sort((a,b)=> (order[a.st]-order[b.st]) || (a.st==="done"?(a.date<b.date?1:-1):(a.date<b.date?-1:1)));
  },[filt,joined,ALL]);
  const mineCount=ALL.filter(t=>joined[t.id]).length;

  return (
    <div>
      <div className="sub" style={{marginTop:2}}>{ALL.length} giải · bạn đã đăng ký {mineCount}. Chạm thẻ để xem cơ thủ & kết quả.</div>

      <QuickTours user={user}/>

      {ads.length>0 && <div className="scrollx" style={{marginBottom:12}}>
        {ads.map(ad=>(
          <div key={ad.id} className="card" style={{minWidth:240,maxWidth:240,padding:0,overflow:"hidden",flex:"none"}}>
            {ad.img && <div style={{height:84,backgroundImage:`url(${ad.img})`,backgroundSize:"cover",backgroundPosition:"center"}}/>}
            <div style={{padding:"9px 11px"}}><div style={{fontSize:10,color:"var(--gold)",fontWeight:800}}>QUẢNG CÁO · {ad.club}</div>
              <div className="name" style={{fontSize:13.5,marginTop:2}}>{ad.title}</div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>{ad.text}</div></div>
          </div>
        ))}
      </div>}

      <div className="scrollx" style={{marginBottom:12}}>
        {[["all","Tất cả"],["upcoming","Sắp diễn ra"],["ongoing","Đang diễn ra"],["done","Đã kết thúc"],["mine","Giải của tôi ("+mineCount+")"]].map(([k,l])=>(
          <span key={k} className={"pill"+(filt===k?" on":"")} onClick={()=>setFilt(k)}>{l}</span>))}
      </div>
      {list.length===0 && <div className="empty"><div className="ic">🏆</div>Không có giải nào ở mục này.</div>}
      {list.map((t,i)=>{
        const host=tourHost(t); const isJoined=!!joined[t.id]; const reg=t.players.length+(isJoined?1:0);
        const full=reg>=t.slots; const s=TOUR_ST[t.st];
        const champ=t.champion?pById(t.champion):null;
        const roster=t.players.map(pById).filter(Boolean);
        const dleft=Math.round((Date.parse(t.date)-Date.parse(todayStr()))/86400000);
        const cd = t.st==="done"?"" : dleft===0?" · ⏳ hôm nay" : dleft===1?" · ⏳ ngày mai" : dleft>1?" · ⏳ còn "+dleft+" ngày":"";
        const showH = filt==="all" && t.st!==(i>0?list[i-1].st:null);
        return (
          <React.Fragment key={t.id}>
          {showH && <div className="shead" style={{margin:"16px 2px 8px"}}>{s.label}</div>}
          <div className="card">
            <div className="row" style={{alignItems:"flex-start",gap:8,cursor:"pointer"}} onClick={()=>setDetailT(t)}>
              <div className="grow"><div className="name" style={{fontSize:15.5}}>{t.name}{isJoined&&<span className="chip" style={{marginLeft:6,background:"#0e2c20",color:"#37d67a",borderColor:"#1c5c44"}}>✓ ĐK</span>}</div>
                <div className="gts" style={{marginTop:8}}><span className="chip gt">{t.game}</span><span className="chip">{t.format}</span></div>
              </div>
              <span className="tier" style={{color:s.color,background:s.bg,borderColor:s.color+"55"}}>{s.label}</span>
            </div>
            <div className="line" style={{marginTop:9}}>🏠 <b>{host.name}</b> · {areaById(host.area).name}</div>
            <div className="line" style={{marginTop:4}}>🗓️ {fmtDateVN(t.date)} · {t.time}{cd} · 💰 {t.fee} · 🏆 <b style={{color:"var(--gold)"}}>{t.prize}</b></div>

            {champ && <div className="row" style={{gap:9,marginTop:11,padding:"9px 11px",background:"#211a05",border:"1px solid #4a3808",borderRadius:12,cursor:"pointer"}} onClick={()=>openP(champ)}>
              <div style={{fontSize:22}}>🏆</div><Avatar name={champ.name} id={champ.id} size={38}/>
              <div className="grow"><div style={{fontSize:11,color:"var(--gold)",fontWeight:800}}>VÔ ĐỊCH</div>
                <div className="name" style={{fontSize:14}}>{champ.name}</div></div>
              <TierBadge elo={champ.elo}/></div>}

            {t.st!=="done" && <div style={{marginTop:11}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--muted)",marginBottom:5}}>
                <span>{t.st==="ongoing"?"Cơ thủ đang thi đấu":"Đã đăng ký"}</span><b>{reg}/{t.slots}{full?" · ĐẦY":""}</b></div>
              <div className="scrollx">
                {roster.slice(0,10).map(p=><div key={p.id} onClick={()=>openP(p)} style={{cursor:"pointer"}}><Avatar name={p.name} id={p.id} size={34}/></div>)}
                {isJoined && <div title="Bạn"><Avatar name={user.name} id={user.id} size={34} av={user.avatar}/></div>}
              </div>
            </div>}

            <div className="row" style={{gap:8,marginTop:11}}>
              <button className="btn sm ghost grow" onClick={()=>setDetailT(t)}>{t.st==="done"?"📋 Xem kết quả":"👥 Cơ thủ tham gia"}</button>
              {t.st==="done"
                ? null
                : isJoined
                  ? <button className="btn sm green grow" onClick={()=>cancelReg(t.id)}>✓ Đã đăng ký</button>
                  : full
                    ? <button className="btn sm ghost grow" disabled>Đầy chỗ</button>
                    : <button className="btn sm grow" onClick={()=>setRegisterT(t)}>Đăng ký</button>}
            </div>
          </div>
          </React.Fragment>
        );
      })}

      {detailT && <TournamentModal t={detailT} st={tourStatus(detailT)} user={user} joined={!!joined[detailT.id]}
        recorded={results[detailT.id]||[]} onRecord={(a,b,sa,sb)=>recordTour(detailT,a,b,sa,sb)}
        onRegister={()=>setRegisterT(detailT)} onCancel={()=>cancelReg(detailT.id)} onPlayer={openP} onClose={()=>setDetailT(null)} />}
      {detailP && <PlayerModal p={detailP} rel={rel[detailP.id]} setRelOf={setRelOf} flash={flash} matches={matches} user={user}
        openChat={openChat} onClose={()=>setDetailP(null)} />}
      {registerT && <RegisterModal t={registerT} onConfirm={()=>confirmReg(registerT)} onClose={()=>setRegisterT(null)} />}
    </div>
  );
}

const ROUND_ORDER=["Vòng 1/32","Vòng 1/16","Vòng 1/8","Tứ kết","Bán kết","Chung kết"];

/* Bậc thang tuần: thách người ngay trên mình; thắng thì đổi bậc (leo lên) */
function Ladder({user,recordMatch,flash}){
  const pool=[{id:user.id,name:user.name,elo:user.elo,me:true,avatar:user.avatar},...SEED_PLAYERS];
  const findP=id=>pool.find(p=>p.id===id);
  const initIds=()=>pool.slice().sort((a,b)=>b.elo-a.elo).map(p=>p.id);
  const [ladder,setLadder]=useState(()=>{ const s=store.get("ct.ladder",null); return (s&&s.length&&s.indexOf(user.id)>=0)?s.filter(findP):initIds(); });
  useEffect(()=>{ store.set("ct.ladder",ladder); },[ladder]);
  const [chal,setChal]=useState(null);
  const myPos=ladder.indexOf(user.id);
  const result=(oppId,win)=>{
    const opp=findP(oppId);
    if(opp && opp.id!==user.id && recordMatch) recordMatch(opp, win?5:3, win?3:5, (user.games&&user.games[0])||"9 bi", todayStr());
    if(win) setLadder(l=>{ const a=[...l], mi=a.indexOf(user.id), oi=a.indexOf(oppId); if(oi>=0&&mi>=0){ a[oi]=user.id; a[mi]=oppId; } return a; });
    flash(win?("Thắng! Bạn leo lên bậc của "+(opp?opp.name:"")+" 🪜"):"Chưa thắng — giữ nguyên bậc, thử lại nhé!");
    setChal(null);
  };
  return (
    <div>
      <div className="sub" style={{marginTop:2}}>Thách đấu leo bậc: thách 1–2 người NGAY TRÊN bạn. Thắng thì đổi bậc & leo lên. Làm mới theo ELO mỗi tuần.</div>
      <div className="row" style={{marginBottom:10,alignItems:"center"}}>
        <div className="grow sub" style={{margin:0}}>Bạn đang ở bậc <b style={{color:"var(--gold)"}}>#{myPos+1}</b>/{ladder.length}</div>
        <button className="btn sm ghost" onClick={()=>{ setLadder(initIds()); flash("Đã làm mới bậc thang theo ELO"); }}>↻ Làm mới tuần</button>
      </div>
      {myPos===0 && <div className="card" style={{marginBottom:10,textAlign:"center",borderColor:"#4a3808"}}>🏆 Bạn đang đứng <b style={{color:"var(--gold)"}}>đầu bậc thang</b> tuần này!</div>}
      <div className="card" style={{padding:"4px 10px"}}>
        {ladder.map((id,i)=>{ const p=findP(id); if(!p) return null; const me=id===user.id; const can=!me && (i===myPos-1||i===myPos-2); return (
          <div className="rank-row" key={id} style={me?{background:"#0e2c2033",margin:"0 -6px",padding:"10px 12px",borderRadius:10}:null}>
            <div className={"rk"+(i===0?" g1":i===1?" g2":i===2?" g3":"")}>{i+1}</div>
            <Avatar name={p.name} id={p.id} size={36} av={p.avatar}/>
            <div className="grow" style={{minWidth:0}}><div className="name" style={{fontSize:14}}>{p.name}{me&&<span className="chip" style={{marginLeft:6}}>Bạn</span>}</div>
              <div className="line"><TierBadge elo={p.elo}/><span className="elo">{p.elo}</span></div></div>
            {can && <button className="btn sm" onClick={()=>setChal(id)}>⚔️ Thách</button>}
          </div>);
        })}
      </div>
      {chal && (()=>{ const opp=findP(chal); return (
        <div className="modal-bg" onClick={()=>setChal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="h1" style={{fontSize:18,marginBottom:6}}>Thách đấu {opp.name}</div>
          <div className="sub">Bậc #{ladder.indexOf(chal)+1}. Đấu xong báo kết quả — thắng thì bạn chiếm bậc của họ.</div>
          <div className="kv"><span>Đối thủ</span><b><TierBadge elo={opp.elo}/> {opp.elo} ELO</b></div>
          <div className="kv"><span>Gợi ý chấp</span><b style={{color:"var(--gold)",textAlign:"right"}}>{handicap(user.elo,opp.elo)}</b></div>
          <button className="btn green block" style={{marginTop:12}} onClick={()=>result(chal,true)}>✅ Tôi thắng — leo bậc</button>
          <button className="btn ghost block" style={{marginTop:8}} onClick={()=>result(chal,false)}>Tôi thua</button>
          <button className="btn ghost block" style={{marginTop:8}} onClick={()=>setChal(null)}>Huỷ</button>
        </div></div>);
      })()}

  );

        </div>
        {sbMsg && <div className="sub" style={{margin:"8px 0 0"}}>{sbMsg}</div>}
        <div style={{fontSize:11,color:"var(--muted-2)",marginTop:6}}>Sau khi Lưu/đổi key hãy tải lại trang (F5) để bật đồng bộ realtime. anon key là khoá công khai — an toàn để dán ở client.</div>
      </div>

      <div className="card">
        <div style={{fontWeight:800,marginBottom:6}}>Về thang điểm ELO</div>
        {TIERS.slice().reverse().map(t=>(
          <div className="kv" key={t.name}><span><TierBadge elo={t.min}/></span><b>{t.min}{t.min===TIERS[0].min?"+":` – ${TIERS.find(x=>x.min>t.min)?.min-1||""}`}</b></div>
        ))}
      </div>

      <div className="card">
        <div className="shead">💾 Sao lưu & khôi phục dữ liệu</div>
        <div className="sub" style={{margin:"0 0 8px"}}>Dữ liệu lưu trong trình duyệt này. Tải file sao lưu để giữ an toàn / chuyển sang máy khác.</div>
        <div className="row" style={{gap:8}}>
          <button className="btn sm grow" onClick={()=>{ try{ var d={}; for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i); if(k&&k.indexOf("ct.")===0)d[k]=localStorage.getItem(k);} var a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(d)],{type:"application/json"})); a.download="poolmate-backup.json"; a.click(); }catch(e){} }}>⬇️ Tải sao lưu</button>
          <input type="file" accept="application/json" style={{display:"none"}} id="pm-restore" onChange={e=>{ var f=e.target.files&&e.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=function(){ try{ var data=JSON.parse(r.result); if(!window.confirm("Khôi phục sẽ GHI ĐÈ dữ liệu hiện tại trong trình duyệt này. Tiếp tục?"))return; Object.keys(data).forEach(function(k){ if(k.indexOf("ct.")===0) localStorage.setItem(k,data[k]); }); location.reload(); }catch(err){ alert("File sao lưu không hợp lệ."); } }; r.readAsText(f); }}/>
          <button className="btn sm ghost grow" onClick={()=>{var el=document.getElementById('pm-restore'); el&&el.click();}}>⬆️ Khôi phục</button>
        </div>
      </div>

      <div className="card">
        <div className="row" style={{alignItems:"center"}}>
          <div className="grow"><b>🔗 Chia sẻ hồ sơ</b><div className="sub" style={{margin:"2px 0 0"}}>Khoe hạng &amp; ELO của bạn.</div></div>
          <button className="btn sm ghost" onClick={()=>{ var txt="🎱 "+user.name+" trên PoolMate — hạng "+tierOf(user.elo).name+" · "+user.elo+" ELO · 📍 "+areaById(user.area).name; try{ if(navigator.share){navigator.share({title:"PoolMate",text:txt});} else if(navigator.clipboard){navigator.clipboard.writeText(txt); alert("Đã copy:\n"+txt);} else alert(txt); }catch(e){} }}>Chia sẻ</button>
        </div>
      </div>

      <div className="card">
        <div className="shead">ℹ️ Về PoolMate &amp; mẹo nhanh</div>
        <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.75}}>
          • <b>Thi đấu → Tìm đối</b>: lọc / quẹt theo độ hợp, mở hồ sơ xem gợi ý chấp.<br/>
          • <b>Kết nối</b>: kết bạn, nhắn tin, ghi tỉ số (đấu người thật cần đối thủ xác nhận).<br/>
          • <b>Xem bi-a → Đi chấm</b>: đăng clip YouTube, thả tim, bình luận.<br/>
          • <b>Khám phá → CLB</b>: 157 quán — xem ảnh &amp; đánh giá thật trên Google Maps.<br/>
          • Đăng nhập <b>Email</b> để đồng bộ thật giữa nhiều máy.
        </div>
        <a className="btn ghost block" style={{marginTop:10,textAlign:"center",textDecoration:"none"}} href="mailto:chidoanbusiness@gmail.com?subject=G%C3%B3p%20%C3%BD%20PoolMate">💬 Góp ý / Báo lỗi</a>
      </div>

      <div className="card">
        <div className="row" style={{alignItems:"center"}}>
          <div className="grow"><b>🔔 Thông báo đẩy</b><div className="sub" style={{margin:"2px 0 0"}}>Báo tin nhắn, lời mời kết bạn, xác nhận tỉ số — kể cả khi tab đang ẩn.</div></div>
          <button className="btn sm" onClick={toggleNotif} style={notifOn?{borderColor:"#37d67a",color:"#37d67a"}:null}>{notifOn?"Đang bật ✓":"Bật"}</button>
        </div>
      </div>
      {isAdmin() && <div className="card" style={{borderColor:"var(--gold)"}}>
        <div className="row" style={{alignItems:"center"}}>
          <div className="grow"><b>🛡️ Quản trị</b><div className="sub" style={{margin:"2px 0 0"}}>Thống kê · gỡ nội dung · chặn user.</div></div>
          <button className="btn sm" onClick={()=>setAdminOpen(true)}>Mở</button></div>
      </div>}
      </React.Fragment>}
      {adminOpen && <AdminPanel onClose={()=>setAdminOpen(false)} flash={flash} />}
      <div className="legal" style={{margin:"16px auto"}}>PoolMate · bản dùng thử cục bộ — dữ liệu lưu trong trình duyệt này.</div>
    </div>
  );
}

/* ============================================================
   TRANG CLB / NHÀ TỔ CHỨC
   ============================================================ */
const FORMATS=["Loại trực tiếp","Loại kép","Vòng tròn","Vòng bảng + loại"];
function ClubDashboard({user,setUser,flash,onLogout}){
  const [clubTours,setClubTours]=useState(()=>store.get("ct.clubTours",[]));
  const [ads,setAds]=useState(()=>store.get("ct.ads",[]));
  useEffect(()=>{ store.set("ct.clubTours",clubTours); },[clubTours]);
  useEffect(()=>{ store.set("ct.ads",ads); },[ads]);
  // nạp giải của chính CLB này từ máy chủ (để quản lý/xoá)
  useEffect(()=>{ if(!cloud.on) return; let alive=true,ch;
    const load=()=>cloud.clubToursList().then(l=>{ if(alive&&l) setClubTours(l.filter(t=>t.by_id===myId())); });
    load(); ch=cloud.subscribeClubTours(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[]);

  const bannerRef=useRef(null), adRef=useRef(null);
  const up=(k,v)=>setUser(u=>({...u,[k]:v}));
  const onBanner=e=>{ const f=e.target.files&&e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>up("banner",r.result); r.readAsDataURL(f); };

  const [tf,setTf]=useState({name:"",game:GAME_TYPES[1],date:daysAgoStr(-7),time:"19:00",fee:"50k",prize:"",slots:16,format:FORMATS[0],rules:"",tier_min:"",tier_max:"",sponsors:""});
  const tup=(k,v)=>setTf(s=>({...s,[k]:v}));
  const postTour=()=>{
    if(!user.clubName){ flash("Nhập tên CLB ở phần Hồ sơ trước"); return; }
    if(!tf.name.trim()){ flash("Nhập tên giải"); return; }
    if(cloud.on && !cloud.ready()){ flash("Đăng nhập CLB bằng Email để đăng giải lên hệ thống ✉️"); return; }
    const item={...tf, id:"ut"+Date.now()+myId().slice(0,6), host:user.clubName, addr:user.addr, area:user.area, players:[], createdBy:"club", by_id:myId()};
    setClubTours(a=>[item, ...a]);
    if(cloud.ready()) cloud.clubTourAdd(item).then(ok=>{ if(ok) cloud.clubToursList().then(l=>l&&setClubTours(l.filter(t=>t.by_id===myId()))); });
    flash("Đã đăng giải — người chơi đã thấy ở tab Giải đấu 🏆"); setTf({...tf,name:"",prize:""});
  };
  const delTour=id=>{ setClubTours(a=>a.filter(t=>t.id!==id)); if(cloud.ready()) cloud.clubTourDel(id); };

  const [af,setAf]=useState({title:"",text:""}); const [adImg,setAdImg]=useState("");
  const onAdImg=e=>{ const f=e.target.files&&e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>setAdImg(r.result); r.readAsDataURL(f); };
  const postAd=()=>{ if(!af.title.trim()){ flash("Nhập tiêu đề quảng cáo"); return; }
    setAds(a=>[{id:"ad"+Date.now(),title:af.title,text:af.text,img:adImg,club:user.clubName||"CLB"}, ...a]);
    setAf({title:"",text:""}); setAdImg(""); flash("Đã đăng quảng cáo 📣"); };
  const delAd=id=>setAds(a=>a.filter(x=>x.id!==id));
  // Quản lý quán: chọn quán → xem đặt bàn / check-in / người theo dõi + gửi thông báo
  const [mClub,setMClub]=useState(user.manageClubId||"");
  const [ownCins,setOwnCins]=useState([]), [ownBooks,setOwnBooks]=useState([]), [ownFols,setOwnFols]=useState([]);
  const [bc,setBc]=useState({title:"",text:""});
  useEffect(()=>{ if(!cloud.on||!mClub){ setOwnCins([]);setOwnBooks([]);setOwnFols([]); return; } let alive=true;
    cloud.checkinsRecent(mClub).then(l=>{ if(alive)setOwnCins(l||[]); });
    cloud.bookingsByClub(mClub).then(l=>{ if(alive)setOwnBooks(l||[]); });
    cloud.clubFollowers(mClub).then(l=>{ if(alive)setOwnFols(l||[]); }); },[mClub]);
  const saveMClub=(id)=>{ setMClub(id); up("manageClubId",id); };
  const broadcast=()=>{ if(!mClub){ flash("Chọn quán bạn quản lý trước"); return; } if(!bc.title.trim()){ flash("Nhập tiêu đề thông báo"); return; }
    setAds(a=>[{id:"ad"+Date.now(),title:bc.title,text:bc.text,img:"",club:user.clubName||(clubById(mClub)||{}).name||"CLB"}, ...a]);
    if(cloud.ready()) (ownFols||[]).forEach(f=>{ if(isRealId(f.uid)) cloud.pushSend(f.uid,"📣 "+((clubById(mClub)||{}).name||"CLB"),bc.title+(bc.text?" — "+bc.text:"")); });
    flash("Đã gửi thông báo tới "+ownFols.length+" người theo dõi 📣"); setBc({title:"",text:""}); };

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand"><Balls size={34}/><div>PoolMate<small>Trang CLB / Nhà tổ chức</small></div></div>
        <button className="btn sm ghost" style={{marginLeft:"auto"}} onClick={onLogout}>Đăng xuất</button>
      </div>
      <div className="content" style={{paddingBottom:40}}>
        <div className="h1">Hồ sơ Câu lạc bộ</div>
        <div className="sub">Thông tin & ảnh này hiển thị cho người chơi.</div>
        <div className="card">
          {user.banner && <div style={{height:120,borderRadius:12,backgroundImage:`url(${user.banner})`,backgroundSize:"cover",backgroundPosition:"center",marginBottom:12}}/>}
          <div className="field"><label>Tên CLB / đơn vị tổ chức</label>
            <input className="input" value={user.clubName||""} placeholder="VD: CLB Bida Hồ Gươm" onChange={e=>up("clubName",e.target.value)}/></div>
          <div className="field"><label>Khu vực</label>
            <select className="select" value={user.area||"hk"} onChange={e=>up("area",e.target.value)}>{AREAS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
          <div className="field"><label>Địa chỉ</label>
            <input className="input" value={user.addr||""} placeholder="Số nhà, đường…" onChange={e=>up("addr",e.target.value)}/></div>
          <div className="field"><label>Giới thiệu</label>
            <textarea className="textarea" value={user.desc||""} placeholder="Giới thiệu CLB, số bàn, giá giờ…" onChange={e=>up("desc",e.target.value)}/></div>
          <input ref={bannerRef} type="file" accept="image/*" style={{display:"none"}} onChange={onBanner}/>
          <button className="btn ghost block" onClick={()=>bannerRef.current&&bannerRef.current.click()}>🖼️ Tải ảnh bìa CLB</button>
        </div>

        <div className="h1" style={{marginTop:8}}>📊 Quản lý quán</div>
        <div className="card">
          <div className="field"><label>Quán bạn quản lý (để nhận đặt bàn, xem check-in & người theo dõi)</label>
            <select className="select" value={mClub} onChange={e=>saveMClub(e.target.value)}>
              <option value="">— Chọn quán —</option>{CLUBS_AZ.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select></div>
          {!cloud.on && <div className="sub" style={{margin:0}}>Cần bật máy chủ (đăng nhập) để nhận dữ liệu đặt bàn / theo dõi.</div>}
          {mClub && <React.Fragment>
            <div className="stat" style={{margin:"4px 0 10px"}}>
              <div className="b"><b style={{color:"var(--gold)"}}>{ownBooks.length}</b><small>Đặt bàn</small></div>
              <div className="b"><b style={{color:"var(--gold)"}}>{ownCins.length}</b><small>Check-in 3h</small></div>
              <div className="b"><b style={{color:"var(--gold)"}}>{ownFols.length}</b><small>Theo dõi</small></div>
            </div>
            <div className="shead">📅 Đặt bàn</div>
            {ownBooks.length===0? <div className="sub" style={{margin:"0 0 8px"}}>Chưa có đặt bàn nào qua app.</div>
              : ownBooks.slice(0,15).map(b=><div className="kv" key={b.id}><span>{b.by_name||"Khách"}{b.info?" · "+b.info:""}</span><b>{fmtDateVN(b.date)} · {b.slot}</b></div>)}
            <div className="shead" style={{marginTop:10}}>🟢 Đang ở quán (3h qua)</div>
            {ownCins.length===0? <div className="sub" style={{margin:"0 0 8px"}}>Chưa ai check-in.</div>
              : <div className="gts">{ownCins.slice(0,16).map((x,i)=><span key={i} className="chip">{x.user_name||"Cơ thủ"}</span>)}</div>}
            <div className="shead" style={{marginTop:10}}>📣 Gửi thông báo cho {ownFols.length} người theo dõi</div>
            <div className="field" style={{marginBottom:8}}><input className="input" value={bc.title} placeholder="Tiêu đề (VD: Giảm 30% khung sáng T2-T6)" onChange={e=>setBc(s=>({...s,title:e.target.value}))}/></div>
            <div className="field" style={{marginBottom:8}}><textarea className="textarea" value={bc.text} placeholder="Nội dung ưu đãi / sự kiện…" onChange={e=>setBc(s=>({...s,text:e.target.value}))}/></div>
            <button className="btn block" onClick={broadcast}>Gửi thông báo tới người theo dõi</button>
          </React.Fragment>}
        </div>

        <div className="h1" style={{marginTop:8}}>Đăng giải đấu</div>
        <div className="card">
          <div className="field"><label>Tên giải</label><input className="input" value={tf.name} placeholder="VD: Giải 9 bi CLB mở rộng" onChange={e=>tup("name",e.target.value)}/></div>
          <div className="field"><label>Thể loại</label><select className="select" value={tf.game} onChange={e=>tup("game",e.target.value)}>{GAME_TYPES.map(g=><option key={g}>{g}</option>)}</select></div>
          <div className="field"><label>Thể thức</label><select className="select" value={tf.format} onChange={e=>tup("format",e.target.value)}>{FORMATS.map(g=><option key={g}>{g}</option>)}</select></div>
          <div className="row" style={{gap:10}}>
            <div className="field grow"><label>Ngày</label><input type="date" className="input" value={tf.date} onChange={e=>tup("date",e.target.value)}/></div>
            <div className="field" style={{width:120}}><label>Giờ</label><input type="time" className="input" value={tf.time} onChange={e=>tup("time",e.target.value)}/></div>
          </div>
          <div className="row" style={{gap:10}}>
            <div className="field grow"><label>Lệ phí</label><input className="input" value={tf.fee} placeholder="VD: 100k / Miễn phí" onChange={e=>tup("fee",e.target.value)}/></div>
            <div className="field" style={{width:96}}><label>Số chỗ</label><input type="number" min="2" className="input" value={tf.slots} onChange={e=>tup("slots",Math.max(2,+e.target.value))}/></div>
          </div>
          <div className="field"><label>Giải thưởng</label><input className="input" value={tf.prize} placeholder="VD: 5.000.000đ + cúp" onChange={e=>tup("prize",e.target.value)}/></div>
          <div className="row" style={{gap:10}}>
            <div className="field grow"><label>Giới hạn hạng — từ</label>
              <select className="select" value={tf.tier_min} onChange={e=>tup("tier_min",e.target.value)}><option value="">Không giới hạn</option>{TIER_ORDER.map(h=><option key={h} value={h}>Hạng {h}</option>)}</select></div>
            <div className="field grow"><label>đến</label>
              <select className="select" value={tf.tier_max} onChange={e=>tup("tier_max",e.target.value)}><option value="">Không giới hạn</option>{TIER_ORDER.map(h=><option key={h} value={h}>Hạng {h}</option>)}</select></div>
          </div>
          <div className="field"><label>Nhà tài trợ (tuỳ chọn)</label><input className="input" value={tf.sponsors} placeholder="VD: Predator · Nước tăng lực XYZ · CLB ABC" onChange={e=>tup("sponsors",e.target.value)}/></div>
          <div className="field"><label>Thể thức chi tiết (tuỳ chọn — để trống sẽ dùng luật mặc định theo thể loại)</label>
            <textarea className="textarea" value={tf.rules} placeholder="VD: 9 bi · phá break box · phá luân phiên · đua 9 ván · 2 mạng · ball-in-hand…" onChange={e=>tup("rules",e.target.value)}/></div>
          <button className="btn block" onClick={postTour}>Đăng giải đấu</button>
        </div>

        {clubTours.length>0 && <div className="card">
          <div style={{fontWeight:800,marginBottom:8}}>Giải đã đăng ({clubTours.length})</div>
          {clubTours.map(t=>(
            <div className="kv" key={t.id}>
              <span>{t.name}<br/><small style={{color:"var(--muted)"}}>{fmtDateVN(t.date)} · {t.game} · {t.fee}</small></span>
              <button className="btn sm danger" onClick={()=>delTour(t.id)}>Xoá</button>
            </div>
          ))}
        </div>}

        <div className="h1" style={{marginTop:8}}>Quảng cáo / thông báo</div>
        <div className="card">
          <div className="field"><label>Tiêu đề</label><input className="input" value={af.title} placeholder="VD: Khai trương bàn Aileex mới" onChange={e=>setAf(s=>({...s,title:e.target.value}))}/></div>
          <div className="field"><label>Nội dung</label><textarea className="textarea" value={af.text} placeholder="Ưu đãi, sự kiện…" onChange={e=>setAf(s=>({...s,text:e.target.value}))}/></div>
          {adImg && <div style={{height:90,borderRadius:10,backgroundImage:`url(${adImg})`,backgroundSize:"cover",backgroundPosition:"center",marginBottom:10}}/>}
          <input ref={adRef} type="file" accept="image/*" style={{display:"none"}} onChange={onAdImg}/>
          <button className="btn ghost block" style={{marginBottom:8}} onClick={()=>adRef.current&&adRef.current.click()}>🖼️ Thêm ảnh quảng cáo</button>
          <button className="btn block" onClick={postAd}>Đăng quảng cáo</button>
        </div>

        {ads.length>0 && <div className="card">
          <div style={{fontWeight:800,marginBottom:8}}>Quảng cáo đã đăng ({ads.length})</div>
          {ads.map(ad=>(
            <div className="kv" key={ad.id}><span>{ad.title}<br/><small style={{color:"var(--muted)"}}>{ad.text}</small></span>
              <button className="btn sm danger" onClick={()=>delAd(ad.id)}>Xoá</button></div>
          ))}
        </div>}

        <div className="legal" style={{margin:"18px auto"}}>Giải & quảng cáo bạn đăng sẽ hiện cho người chơi ở tab <b>Giải đấu</b> (trên cùng trình duyệt này — bản giả lập, chưa có máy chủ chung).</div>
      </div>
    </div>
  );
}

/* ============================================================
   SHOP & CHỢ phụ kiện bi-a
   ============================================================ */
function MarketCard({m,user,sr,onRateSeller,onComment,onContact,onDel}){
  const [txt,setTxt]=useState(""), [showC,setShowC]=useState(false);
  const cmts=m.comments||[];
  const send=()=>{ if(!txt.trim())return; onComment(txt); setTxt(""); };
  return (
    <div className="card" style={{padding:13,marginBottom:10}}>
      <div className="name" style={{fontSize:14.5}}>{m.title}</div>
      {m.photo && <img src={m.photo} loading="lazy" alt="" style={{width:"100%",maxHeight:220,objectFit:"cover",borderRadius:10,margin:"8px 0"}}/>}
      <div className="line" style={{marginTop:3}}><b style={{color:"var(--gold)"}}>{m.price}</b> · {m.cond} · 📍 {m.area}</div>
      {m.text && <div style={{fontSize:13,color:"var(--muted)",marginTop:5}}>{m.text}</div>}
      <div className="row" style={{marginTop:8,alignItems:"center",gap:6}}>
        <div className="grow line" style={{margin:0}}>👤 {m.by}{sr>0 && <span style={{color:"var(--gold)"}}> · {stars(sr)} {sr}.0</span>}</div>
        <span style={{fontSize:11,color:"var(--muted-2)"}}>Đánh giá NB:</span>
        <span style={{whiteSpace:"nowrap"}}>{[1,2,3,4,5].map(n=><span key={n} onClick={()=>onRateSeller(n)} style={{fontSize:17,cursor:"pointer",color:n<=sr?"var(--gold)":"#3b5a4c"}}>★</span>)}</span>
      </div>
      <div className="row" style={{gap:8,marginTop:10,flexWrap:"wrap"}}>
        <button className="btn sm grow" onClick={onContact}>📞 Liên hệ</button>
        <button className="btn sm ghost grow" onClick={()=>setShowC(s=>!s)}>💬 Hỏi người bán ({cmts.length})</button>
        {m.by===(user.name||"Bạn") && onDel && <button className="btn sm danger" onClick={onDel}>Xoá</button>}
      </div>
      {showC && <div style={{marginTop:9}}>
        {cmts.map((c,i)=><div key={i} style={{fontSize:13,margin:"5px 0",lineHeight:1.4}}><b>{c.by}</b> <span style={{color:"var(--muted-2)",fontSize:11}}>{c.ts}</span><br/>{c.text}</div>)}
        <div className="row" style={{gap:8,marginTop:6}}>
          <input className="input" style={{flex:1}} placeholder="Hỏi về gậy / giá / tình trạng…" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") send(); }}/>
          <button className="btn sm" onClick={send}>Gửi</button>

}
function ShopHub({user,flash}){
  const [seg,setSeg]=useState("shop");
  const [cat,setCat]=useState("all");
  const [market,setMarket]=useState(()=>{ if(cloud.on) return []; const s=store.get("ct.market",null); return s||SEED_MARKET; });
  const [posting,setPosting]=useState(false);
  const [mq,setMq]=useState("");   // tìm tin chợ
  const cats=[...new Set(SHOP_ITEMS.map(i=>i.cat))];
  useEffect(()=>{ if(!cloud.on) store.set("ct.market",market); },[market]);
  // Chợ gậy dùng chung qua máy chủ: nạp + realtime; nếu chợ chung trống thì gieo 7 tin mẫu (idempotent theo id)
  useEffect(()=>{
    if(!cloud.on) return; let alive=true, ch;
    const load=()=>cloud.marketList().then(l=>{ if(alive&&l) setMarket(l); });
    cloud.marketList().then(l=>{ if(!alive) return;
      if(l && l.length===0) cloud.marketSeed(SEED_MARKET.map(s=>({...s,by_id:"seed"}))).then(load); else load(); });
    ch=cloud.subscribeMarket(load);
    return ()=>{ alive=false; cloud.unsub(ch); };
  },[]);
  const addListing=l=>{ if(cloud.on && !cloud.ready()){ flash("Đăng nhập bằng Email để đăng tin ✉️"); return; }
    const item={...l, id:"m"+Date.now(), by:(user.name||"Bạn"), byId:myId(), ts:todayStr(), comments:[]};
    setMarket(m=>[item, ...m]); setPosting(false); flash("Đã đăng tin bán 🛒");
    if(cloud.ready()) cloud.marketAdd(item).then(ok=>{ if(ok) cloud.marketList().then(l=>l&&setMarket(l)); }); };
  const delListing=id=>{ if(!window.confirm("Xoá tin bán này?")) return; setMarket(m=>m.filter(x=>x.id!==id)); if(cloud.ready()) cloud.marketDel(id); };
  const [sellerRatings,setSellerRatings]=useState(()=>store.get("ct.sellerRatings",{}));
  useEffect(()=>{ store.set("ct.sellerRatings",sellerRatings); },[sellerRatings]);
  const [sellerCloud,setSellerCloud]=useState({}); // {seller:{sum,n}} từ máy chủ
  useEffect(()=>{ if(!cloud.on) return; let alive=true,ch;
    const load=()=>cloud.ratingsList().then(l=>{ if(!alive||!l) return; const m={}; l.forEach(r=>{ if(r.kind!=="seller") return; const t=m[r.target]||(m[r.target]={sum:0,n:0}); t.sum+=r.stars; t.n++; }); setSellerCloud(m); });
    load(); ch=cloud.subscribeRatings(load); return ()=>{ alive=false; cloud.unsub(ch); }; },[]);
  const sellerAvg=name=>{ const a=sellerCloud[name]; return a? Math.round(a.sum/a.n) : (sellerRatings[name]||0); };
  const rateSeller=(name,s)=>{ setSellerRatings(r=>({...r,[name]:s})); if(cloud.ready()) cloud.rate("seller",name,s); flash("Đã đánh giá người bán ⭐"); };
  const addComment=(id,text)=>{ const t=(text||"").trim(); if(!t)return; if(cloud.on && !cloud.ready()){ flash("Đăng nhập bằng Email để hỏi người bán ✉️"); return; } setMarket(m=>m.map(x=>{ if(x.id!==id) return x; const nc=[...(x.comments||[]),{by:(user.name||"Bạn"),text:t,ts:nowHM()}]; if(cloud.ready()) cloud.marketPatch(id,{comments:nc}); return {...x,comments:nc}; })); };

  return (
    <div>
      <div className="h1">Shop &amp; Chợ phụ kiện</div>
      <div className="seg">
        <button className={seg==="shop"?"on":""} onClick={()=>setSeg("shop")}>🛒 Cửa hàng</button>
        <button className={seg==="market"?"on":""} onClick={()=>setSeg("market")}>🔁 Chợ mua bán</button>
      </div>

      {seg==="shop" ? <React.Fragment>
        <div className="sub" style={{marginBottom:10}}>Cơ, đầu cơ, lơ, bao cơ, bi… (giá tham khảo).</div>
        <div className="scrollx" style={{marginBottom:10}}>
          <span className={"pill"+(cat==="all"?" on":"")} onClick={()=>setCat("all")}>Tất cả</span>
          {cats.map(c=><span key={c} className={"pill"+(cat===c?" on":"")} onClick={()=>setCat(c)}>{c}</span>)}
        </div>
        {SHOP_ITEMS.filter(it=>cat==="all"||it.cat===cat).map(it=>(
          <div className="card pcard" key={it.id} style={{padding:12,alignItems:"center"}}>
            <div style={{fontSize:30,width:46,textAlign:"center"}}>{it.emoji}</div>
            <div className="meta"><div className="name" style={{fontSize:14.5}}>{it.name}</div>
              <div className="line"><span className="chip">{it.cat}</span> · <b style={{color:"var(--gold)"}}>{it.price}</b></div></div>
            <button className="btn sm" onClick={()=>flash("Đã thêm vào giỏ (giả lập)")}>Mua</button>
          </div>
        ))}
      </React.Fragment> : <React.Fragment>
        <div className="sub" style={{marginBottom:10}}>Mua bán / trao đổi gậy & phụ kiện giữa các cơ thủ.</div>
        <button className="btn block" style={{marginBottom:12}} onClick={()=>setPosting(true)}>+ Đăng tin bán / trao đổi</button>
        {market.length>3 && <div style={{position:"relative",marginBottom:10}}><input className="input" placeholder="🔎 Tìm tin (tên / mô tả)…" value={mq} onChange={e=>setMq(e.target.value)}/>{mq&&<span onClick={()=>setMq("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"var(--muted)",fontSize:15}}>✕</span>}</div>}
        {market.length===0 && <div className="empty"><div className="ic">🛒</div>Chưa có tin bán nào. Hãy đăng tin đầu tiên!</div>}
        {market.filter(m=>(!mq||(m.title+" "+(m.text||"")).toLowerCase().indexOf(mq.toLowerCase())>=0) && !isBanned(m.byId)).map(m=>(
          <MarketCard key={m.id} m={m} user={user} sr={sellerAvg(m.by)}
            onRateSeller={s=>rateSeller(m.by,s)} onComment={t=>addComment(m.id,t)}
            onContact={()=>flash("Đã gửi liên hệ tới "+m.by+" (giả lập)")} onDel={()=>delListing(m.id)}/>
        ))}
      </React.Fragment>}

      {posting && <MarketForm user={user} onSave={addListing} onClose={()=>setPosting(false)} />}
    </div>
  );
}

function MarketForm({user,onSave,onClose}){
  const [f,setF]=useState({title:"",price:"",cond:"Mới 90%",area:areaById(user.area||"hk").name,text:"",photo:""});
  const [busy,setBusy]=useState(false);
  const up=(k,v)=>setF(s=>({...s,[k]:v}));
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:"90vh",overflowY:"auto"}}>
      <div className="h1" style={{fontSize:18,marginBottom:12}}>Đăng tin bán / trao đổi</div>
      <div className="field"><label>Tiêu đề</label><input className="input" value={f.title} placeholder="VD: Cơ Predator P3 like new" onChange={e=>up("title",e.target.value)}/></div>
      <div className="row" style={{gap:10}}>
        <div className="field grow"><label>Giá</label><input className="input" value={f.price} placeholder="VD: 4.000.000đ / Giao lưu" onChange={e=>up("price",e.target.value)}/></div>
        <div className="field" style={{width:120}}><label>Tình trạng</label><input className="input" value={f.cond} onChange={e=>up("cond",e.target.value)}/></div>
      </div>
      <div className="field"><label>Khu vực</label>
        <select className="select" value={f.area} onChange={e=>up("area",e.target.value)}>{AREAS.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select></div>
      <div className="field"><label>Mô tả</label><textarea className="textarea" value={f.text} placeholder="Mô tả tình trạng, lý do bán, phụ kiện kèm theo…" onChange={e=>up("text",e.target.value)}/></div>
      <div className="field"><label>Ảnh sản phẩm (tuỳ chọn)</label>
        {f.photo
          ? <div style={{position:"relative"}}><img src={f.photo} alt="" style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:10,display:"block"}}/><button className="btn sm danger" style={{position:"absolute",top:6,right:6}} onClick={()=>up("photo","")}>Xoá ảnh</button></div>
          : <label className="btn ghost block" style={{cursor:"pointer",margin:0}}>{busy?"Đang tải ảnh…":"📷 Thêm ảnh"}
              <input type="file" accept="image/*" style={{display:"none"}} disabled={busy} onChange={async e=>{ const file=e.target.files&&e.target.files[0]; e.target.value=""; if(!file)return; setBusy(true); const blob=await shrinkImage(file,1024); let url=null; if(cloud.ready()) url=await cloud.uploadImage(blob,"market","jpg"); if(!url) url=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>res(null);r.readAsDataURL(blob);}); if(url) up("photo",url); setBusy(false); }}/>
            </label>}
      </div>
      <button className="btn block" disabled={!f.title.trim()||!f.price.trim()} onClick={()=>onSave(f)}>Đăng tin</button>
      <button className="btn ghost block" style={{marginTop:8}} onClick={onClose}>Huỷ</button>
    </div></div>
  );
}

function WatchTab({user,setUser,clips,addClip,likeClip,commentClip,delClip,flash,meId}){
  const [seg,setSeg]=useState("hl");
  const [q,setQ]=useState("");
  const [disc,setDisc]=useState("all"); // all | pool | carom
  const [gen,setGen]=useState("all");   // all | m | f
  const [vtype,setVtype]=useState("hl"); // hl | cls | best | all  (loại video trong Highlight)
  const [pro,setPro]=useState(null);
  const [tsub,setTsub]=useState("up"); // up | live
  const favPros=user.favPros||[];
  const ALL_HL=[...HIGHLIGHTS,...HL_2025];
  const dfit = it => disc==="all" || discOf(it)===disc;
  const gfit = it => gen==="all" || (it.players||[]).some(p=>isFemale(p)===(gen==="f"));
  // ===== Lấy video thật + tự cập nhật mỗi giờ qua YouTube Data API (cần key của người dùng) =====
  const [ytKey,setYtKey]=useState(()=>store.get("ct.ytkey",""));
  const [ytCache,setYtCache]=useState(()=>store.get("ct.ytcache",{}));
  const [ytKeyOpen,setYtKeyOpen]=useState(false);
  const [ytKeyInput,setYtKeyInput]=useState("");
  const [ytBusy,setYtBusy]=useState(false);
  const [hlLimit,setHlLimit]=useState(40);
  useEffect(()=>{ store.set("ct.ytkey",ytKey); },[ytKey]);
  useEffect(()=>{ store.set("ct.ytcache",ytCache); },[ytCache]);
  const selPlayer = (q && VID_CATS.some(c=>c.players.indexOf(q)>=0)) ? q : null;
  const ytQ = selPlayer ? (selPlayer+(CAROM_NAMES.indexOf(selPlayer)>=0?" 3 cushion":" pool")) : (q || "9 ball pool 2026 highlights");
  const deco = s => (s||"").replace(/&amp;/g,"&").replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,"<").replace(/&gt;/g,">");
  const fmtYmd = s => { const d=(s||"").slice(0,10).split("-"); return d.length===3? d[2]+"/"+d[1]+"/"+d[0] : (s||""); };
  const fmtAgo = ts => { const m=Math.round((Date.now()-ts)/60000); return m<1?"vừa xong":m<60? m+" phút trước" : Math.round(m/60)+" giờ trước"; };
  const fetchYT = useCallback((query,key)=>{
    if(!key||!query) return;
    setYtBusy(true);
    fetch("https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=date&maxResults=15&q="+encodeURIComponent(query)+"&key="+encodeURIComponent(key))
      .then(r=>r.json()).then(d=>{ setYtBusy(false);
        if(d.error){ flash("YouTube API: "+((d.error.errors&&d.error.errors[0]&&d.error.errors[0].reason)||d.error.message||"lỗi")); return; }
        const vids=(d.items||[]).filter(it=>it.id&&it.id.videoId).map(it=>({id:it.id.videoId,title:deco(it.snippet.title),date:it.snippet.publishedAt,ch:deco(it.snippet.channelTitle)}));
        setYtCache(c=>Object.assign({},c,{[query]:{at:Date.now(),vids}}));
      }).catch(()=>{ setYtBusy(false); flash("Không gọi được YouTube API (kiểm tra mạng/key)."); });
  },[flash]);
  useEffect(()=>{
    if(!ytKey || seg!=="hl") return;
    const c=ytCache[ytQ];
    if(!c || (Date.now()-c.at)>3600000) fetchYT(ytQ,ytKey);
    const iv=setInterval(()=>fetchYT(ytQ,ytKey),3600000); // tự cập nhật mỗi 1 tiếng
    return ()=>clearInterval(iv);
  },[ytKey,seg,ytQ,fetchYT]);
  const toggleFav=n=>setUser(u=>{const cur=u.favPros||[]; return {...u,favPros:cur.includes(n)?cur.filter(x=>x!==n):[...cur,n]};});
  const NEW=<span className="chip" style={{marginLeft:6,background:"#3a1414",color:"#ffb4ab",borderColor:"#5a2b28"}}>MỚI</span>;
  const hit=(players,title)=>{ if(!q) return true; const s=q.toLowerCase(); return (players||[]).some(n=>n.toLowerCase().includes(s)) || (title||"").toLowerCase().includes(s); };
  const proChips=(players)=> players&&players.length>0 && <div className="line" style={{marginTop:5}}>{players.map(n=>
    <span key={n} className="chip" style={favPros.includes(n)?{borderColor:"var(--gold)",color:"var(--gold)"}:null}>{favPros.includes(n)?"★ ":""}{n}</span>)}</div>;
  const vidCard=(key,title,sub,link,isNew,players)=>(

      <div className="row" style={{gap:12,alignItems:"center"}}>
        <div style={{fontSize:24}}>▶️</div>
        <div className="grow"><div className="name" style={{fontSize:14.5}}>{title}{isNew&&NEW}</div>

      {proChips(players)}

  const hlink = h => h.vid ? "https://www.youtube.com/watch?v="+h.vid : YT(h.q);  // có ID video → mở thẳng; chưa có → tìm kiếm
  return (

        <button className={seg==="clips"?"on":""} onClick={()=>setSeg("clips")}>Đi chấm</button>

      {["hl","pros"].indexOf(seg)>=0 && <div className="scrollx" style={{marginBottom:8}}>
        {[["all","Tất cả"],["pool","🎱 Bi-a lỗ"],["carom","🔴 Carom"]].map(d=><span key={d[0]} className={"pill"+(disc===d[0]?" on":"")} onClick={()=>setDisc(d[0])}>{d[1]}</span>)}
      </div>}
      {["hl","pros"].indexOf(seg)>=0 && <div className="scrollx" style={{marginBottom:10}}>
        {[["all","Tất cả"],["m","👨 Nam"],["f","👩 Nữ"]].map(d=><span key={d[0]} className={"pill"+(gen===d[0]?" on":"")} onClick={()=>setGen(d[0])}>{d[1]}</span>)}
      </div>}
      {["hl","pros"].indexOf(seg)>=0 && <input className="input" style={{marginBottom:10}} placeholder="🔎 Lọc theo tên cơ thủ…" value={q} onChange={e=>setQ(e.target.value)}/>}

          {VID_CATS.map(c=>(
            <select key={c.key} className="select" style={{flex:"1 1 45%",padding:"8px 9px"}} value={c.players.includes(q)?q:""} onChange={e=>setQ(e.target.value)}>

  return (
    <div className="card" style={{marginBottom:10}}>
      <div className="row" style={{alignItems:"flex-start"}}><div className="grow"><div className="name" style={{fontSize:15}}>{t.name}</div>
        <div className="line" style={{marginTop:3}}>🏠 {host.name} · 🗓️ {fmtDateVN(t.date)} {t.time}</div></div>
        <span className="tier" style={{color:s.color,background:s.bg,borderColor:s.color+"55"}}>{s.label}</span></div>

      <div style={{fontSize:12,color:"var(--muted)",fontWeight:700,margin:"11px 0 6px"}}>DANH SÁCH NGƯỜI CHƠI ({roster.length+1}) · chạm để xem hồ sơ</div>
      {nextOpp && Prow(nextOpp,true)}
      {others.map(p=>Prow(p,false))}
      <div className="card" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",marginBottom:6,borderColor:"var(--accent)"}}>
        <Avatar name={user.name} id={user.id} size={36} av={user.avatar}/>
        <div className="grow" style={{minWidth:0}}>
          <div className="name" style={{fontSize:14}}>{user.name} <span className="chip" style={{marginLeft:4}}>Bạn</span></div>
          <div className="line" style={{marginTop:2}}><TierBadge elo={user.elo}/><span className="elo">{user.elo} ELO</span></div>
        </div>
      </div>

      {t.results && t.results.length>0 && <div style={{marginTop:12}}>
        <div style={{fontSize:12,color:"var(--muted)",fontWeight:700,marginBottom:6}}>BẢN ĐỒ BRACKET</div>
        <Bracket results={t.results} champion={t.champion} nameOf={nameOf}/></div>}

      {allResults.length>0 && <div style={{marginTop:12}}>
        <div style={{fontSize:12,color:"var(--muted)",fontWeight:700,marginBottom:6}}>KẾT QUẢ</div>
        {allResults.map((m,i)=><div className="kv" key={i}><span><b style={{color:"var(--muted)"}}>{m.round}</b>{m.ts?" · "+m.ts:""}</span>
          <b><span style={{color:m.sa>m.sb?"#37d67a":"var(--text)"}}>{nameOf(m.a)}</span> <span className="elo">{m.sa}–{m.sb}</span> <span style={{color:m.sb>m.sa?"#37d67a":"var(--text)"}}>{nameOf(m.b)}</span></b></div>)}
      </div>}

      {t.st!=="done" && <div style={{marginTop:12}}>
        <div style={{fontSize:12,color:"var(--muted)",fontWeight:700,marginBottom:6}}>GHI ĐIỂM TRẬN VỪA ĐẤU XONG</div>
        <div className="row" style={{gap:8,alignItems:"flex-end"}}>
          <div className="field grow" style={{marginBottom:0}}><label>Cơ thủ A</label><select className="select" value={ra} onChange={e=>setRa(e.target.value)}>{parts.map(id=><option key={id} value={id}>{nameOf(id)}</option>)}</select></div>
          <input type="number" min="0" className="input" style={{width:60}} value={rsa} onChange={e=>setRsa(+e.target.value)}/>
        </div>
        <div className="row" style={{gap:8,alignItems:"flex-end",marginTop:8}}>
          <div className="field grow" style={{marginBottom:0}}><label>Cơ thủ B</label><select className="select" value={rb} onChange={e=>setRb(e.target.value)}>{parts.map(id=><option key={id} value={id}>{nameOf(id)}</option>)}</select></div>
          <input type="number" min="0" className="input" style={{width:60}} value={rsb} onChange={e=>setRsb(+e.target.value)}/>
        </div>
        <button className="btn block" style={{marginTop:10}} disabled={ra===rb||rsa===rsb} onClick={()=>onRecord(t,ra,rb,rsa,rsb)}>Kết thúc trận &amp; ghi điểm</button>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
