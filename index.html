      {toggleBlock && <div className="row" style={{gap:8,marginTop:12}}>
        <button className="btn sm ghost grow" onClick={()=>{ const was=(blocked||[]).includes(p.id); toggleBlock(p.id); flash&&flash(was?"Đã bỏ chặn":"Đã chặn — ẩn người này khỏi Khám phá"); }}>{(blocked||[]).includes(p.id)?"✓ Bỏ chặn":"🚫 Chặn"}</button>
        <button className="btn sm ghost grow" onClick={()=>{ const reason=window.prompt('Báo cáo "'+p.name+'" vì lý do gì? (VD: hủy kèo, thái độ xấu, khai sai trình, spam)'); if(reason&&reason.trim()){ if(cloud.ready()){ cloud.reportAdd({id:"rp"+Date.now(),target_id:p.id,target_name:p.name,reason:reason.trim()}); flash&&flash("Đã gửi báo cáo cho quản trị 🚩"); } else flash&&flash("Đăng nhập Email để báo cáo"); } }}>🚩 Báo cáo</button>
      </div>}

      {h2h.length>0 && <div style={{marginTop:13}}>
        <div className="row" style={{marginBottom:7}}><b className="grow" style={{fontSize:13.5}}>Lịch sử đối đầu</b>
          <span className="chip">{h2hW}T · {h2hL}B</span></div>
        {h2h.slice(0,5).map(m=>(
          <div className="kv" key={m.id}><span>{fmtDateVN(m.date)} · {m.game}</span>
            <b><span style={{color:m.win?"#37d67a":"#e5564b"}}>{m.myScore}–{m.oppScore}</span> <span style={{color:m.delta>=0?"#37d67a":"#e5564b"}}>({m.delta>=0?"+":""}{m.delta})</span></b></div>
        ))}
      </div>}

      <div className="card" style={{marginTop:13,padding:"11px 13px"}}>
        <div className="row" style={{alignItems:"center",marginBottom:7}}>
          <div className="grow" style={{fontSize:13.5}}>🤝 <b>Uy tín / fair-play</b></div>
          {(()=>{ const R=repOf(p.id); return R?<span className="chip" style={{color:"var(--gold)",borderColor:"var(--gold)"}}>★ {R.avg} · {R.count} lượt</span>:<span className="chip" style={{color:"var(--muted-2)"}}>chưa có</span>; })()}
        </div>
        {REP_CRIT.map(crit=>(
          <div className="row" key={crit.k} style={{alignItems:"center",marginBottom:5,gap:6}}>
            <div className="grow" style={{fontSize:13}}>{crit.l}</div>
            <div style={{whiteSpace:"nowrap"}}>{[1,2,3,4,5].map(n=><span key={n} onClick={()=>rate(crit.k,n)} style={{fontSize:19,cursor:"pointer",lineHeight:1,color:n<=(rep[crit.k]||0)?"var(--gold)":"#3b5a4c"}}>★</span>)}</div>
          </div>
        ))}
        <div style={{fontSize:11.5,color:"var(--muted-2)",marginTop:4}}>Chấm sau khi đã chơi cùng — chống khai sai trình & giữ cộng đồng văn minh.</div>
      </div>

      <div style={{marginTop:13}}><ConnectBtn rel={rel} id={p.id} setRelOf={setRelOf} flash={flash} name={p.name} big/></div>
      {rel==="matched" && openChat && <button className="btn green block" style={{marginTop:8}} onClick={()=>{onClose();openChat(p.id);}}>💬 Nhắn tin</button>}
      <button className="btn ghost block" style={{marginTop:8}} onClick={onClose}>Đóng</button>
    </div></div>
  );
}

/* ============================================================
   BẢN ĐỒ (Leaflet)
   ============================================================ */
function MapBox({user, players, clubs, rel, onPlayer, onClub}){
  const elRef=useRef(null), mapRef=useRef(null), layerRef=useRef(null);
  useEffect(()=>{
    if(mapRef.current) return;
    const map=L.map(elRef.current,{zoomControl:true}).setView([user.lat,user.lng],13);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
    layerRef.current=L.layerGroup().addTo(map); mapRef.current=map;
    setTimeout(()=>map.invalidateSize(),150);
  },[]);
  useEffect(()=>{
    const lg=layerRef.current; if(!lg) return; lg.clearLayers();
    const pin=(color,label,size=30)=>L.divIcon({className:"",html:
      `<div class="mk" style="width:${size}px;height:${size}px;background:${color};font-size:13px;color:#06120d"><b>${label}</b></div>`,
      iconSize:[size,size], iconAnchor:[size/2,size]});
    L.marker([user.lat,user.lng],{icon:pin("#fff","🧍",34),zIndexOffset:1000}).addTo(lg).bindPopup('<div class="pop"><b>Bạn</b></div>');
    (clubs||[]).forEach(c=>{ const m=L.marker([c.lat,c.lng],{icon:pin("#3d7bd6","🎱")}).addTo(lg); if(onClub) m.on("click",()=>onClub(c)); });
    (players||[]).forEach(p=>{ const color=(rel&&rel[p.id]==="matched")?"#37d67a":tierOf(p.elo).color;
      const m=L.marker([p.lat,p.lng],{icon:pin(color,initials(p.name).slice(0,2))}).addTo(lg); if(onPlayer) m.on("click",()=>onPlayer(p)); });
  },[players,clubs,rel,user]);
  return (
    <div style={{position:"relative"}}>
      <div ref={elRef} style={{height:"56vh",minHeight:340,borderRadius:16,border:"1px solid var(--line)",overflow:"hidden"}}></div>
      {((players||clubs||[]).length>0) && <div style={{position:"absolute",left:10,top:10,zIndex:500,background:"var(--card)",border:"1px solid var(--line)",borderRadius:8,padding:"4px 9px",fontSize:12,fontWeight:800,boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>{(players||clubs||[]).length} {players?"cơ thủ":"CLB"} quanh đây</div>}
      <button onClick={()=>mapRef.current&&mapRef.current.setView([user.lat,user.lng],14)} aria-label="Về vị trí của tôi"
        style={{position:"absolute",right:10,bottom:10,zIndex:500,background:"var(--gold)",color:"var(--on-gold)",border:"none",borderRadius:10,padding:"8px 12px",fontWeight:800,fontSize:13,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.4)"}}>🎯 Vị trí của tôi</button>
    </div>
  );
}

const INTL_RANKINGS={
  fargo:{ name:"Fargo Rate", url:"https://www.fargorate.com/", desc:"Chỉ số sức mạnh (rating) — càng cao càng mạnh.",
    rows:[["Fedor Gorst","836"],["Joshua Filler","832"],["Francisco Sánchez Ruiz","828"],["Shane Van Boening","824"],["Eklent Kaçi","820"],["Jayson Shaw","818"],["Ko Pin-Yi","815"],["Albin Ouschan","812"]],
    vn:["Dương Quốc Hoàng","~798"] },
  wnt:{ name:"World Nineball Tour", url:"https://matchroompool.com/rankings/", desc:"BXH hệ thống giải Matchroom (Nineball Tour).",
    rows:[["Francisco Sánchez Ruiz","#1"],["Fedor Gorst","#2"],["Joshua Filler","#3"],["Eklent Kaçi","#4"],["Shane Van Boening","#5"],["Jayson Shaw","#6"],["Ko Pin-Yi","#7"],["Albin Ouschan","#8"]],
    vn:["Dương Quốc Hoàng","#26"] },
  wpa:{ name:"WPA World Ranking", url:"https://wpapool.com/world-ranking/", desc:"Bảng xếp hạng chính thức của WPA.",
    rows:[["Francisco Sánchez Ruiz","#1"],["Fedor Gorst","#2"],["Joshua Filler","#3"],["Ko Pin-Yi","#4"],["Eklent Kaçi","#5"],["Albin Ouschan","#6"],["Jayson Shaw","#7"],["Shane Van Boening","#8"]],
    vn:["Dương Quốc Hoàng","top 30"] },
};
function Ranking({user}){
  const [scope,setScope]=useState("city"); // city = Hà Nội, nation = toàn quốc, intl = quốc tế
  const [sys,setSys]=useState("fargo");
  const [rq,setRq]=useState("");   // tìm cơ thủ trong bảng
  const [cloudRows,setCloudRows]=useState([]); // hồ sơ thật từ máy chủ (BXH dùng chung)
  const [fArea,setFArea]=useState("all"), [fGame,setFGame]=useState("all"), [fTier,setFTier]=useState("all"), [board2,setBoard2]=useState("elo");
  useEffect(()=>{
    if(!cloud.on) return; let alive=true, ch;
    const load=()=>cloud.profilesList().then(l=>{ if(alive&&l) setCloudRows(l); });
    load(); ch=cloud.subscribeProfiles(load);
    return ()=>{ alive=false; cloud.unsub(ch); };
  },[]);
  const rows=useMemo(()=>{
    const me={...user, areaName:areaById(user.area).name, city:"Hà Nội", me:true};
    const seedIds=new Set(SEED_PLAYERS.map(p=>p.id));
    const extras=cloudRows
      .filter(r=>r.id!==myId() && !seedIds.has(r.id) && !r.banned)   // bỏ chính mình (đã có 'me') + tránh trùng seed + ẩn user bị chặn
      .map(r=>({id:r.id, name:r.name||"Người chơi", elo:r.elo||1200, area:r.area, games:r.games||[],
        areaName:areaById(r.area).name, city:"Hà Nội", avatar:r.avatar, cloud:true}));
    let all=[...SEED_PLAYERS,...extras,me];
    if(scope==="city") all=all.filter(p=>(p.city||"Hà Nội")==="Hà Nội");
    if(fArea!=="all") all=all.filter(p=>p.area===fArea);
    if(fGame!=="all") all=all.filter(p=>(p.games||[]).includes(fGame));
    if(fTier!=="all") all=all.filter(p=>tierOf(p.elo).name===fTier);
    if(board2==="rep") return all.slice().sort((a,b)=>((repOf(b.id)||{avg:0}).avg-(repOf(a.id)||{avg:0}).avg)||(b.elo-a.elo));
    return all.sort((a,b)=>b.elo-a.elo);
  },[scope,user,cloudRows,fArea,fGame,fTier,board2]);
  const myRank = rows.findIndex(r=>r.me)+1;
  const above = myRank>1 ? rows[myRank-2] : null;
  const gap = above ? (above.elo - user.elo + 1) : 0;
  const board=INTL_RANKINGS[sys];

  return (
    <div>
      <div className="sub" style={{marginTop:4}}>{scope==="intl"
        ? "Bảng xếp hạng quốc tế — số liệu tham khảo, bấm nguồn để cập nhật."
        : <span>Bạn đang đứng hạng <b style={{color:"var(--gold)"}}>#{myRank}</b>/{rows.length} {scope==="city"?"tại Hà Nội":"toàn quốc"}.{board2!=="elo"?" — đang xem bảng Uy tín 🤝":(above?<span> Còn <b style={{color:"var(--gold)"}}>{gap} ELO</b> để vượt {above.name}.</span>:" Bạn đang dẫn đầu! 🏆")}</span>}</div>
      <div className="seg">
        <button className={scope==="city"?"on":""} onClick={()=>setScope("city")}>Hà Nội</button>
        <button className={scope==="nation"?"on":""} onClick={()=>setScope("nation")}>Toàn quốc</button>
        <button className={scope==="intl"?"on":""} onClick={()=>setScope("intl")}>Quốc tế</button>
      </div>

      {scope==="intl" ? <React.Fragment>
        <div className="scrollx" style={{marginBottom:10}}>
          {Object.keys(INTL_RANKINGS).map(k=><span key={k} className={"pill"+(sys===k?" on":"")} onClick={()=>setSys(k)}>{INTL_RANKINGS[k].name}</span>)}
        </div>
        <div className="sub" style={{marginBottom:8}}>{board.desc}</div>
        <div className="card" style={{padding:"6px 12px"}}>
          {board.rows.map((r,i)=>(
            <div className="rank-row" key={i}>
              <div className={"rk"+(i===0?" g1":i===1?" g2":i===2?" g3":"")}>{["🥇","🥈","🥉"][i]||(i+1)}</div>
              <Avatar name={r[0]} id={r[0]} size={34}/>
              <div className="grow"><div className="name" style={{fontSize:14}}>{r[0]}</div></div>
              <div className="elo" style={{fontSize:15}}>{r[1]}</div>
            </div>))}
          {board.vn && <div className="rank-row" style={{background:"#0e2c2033",margin:"0 -6px",padding:"11px 12px",borderRadius:10}}>
            <div className="rk" style={{fontSize:15}}>🇻🇳</div>
            <Avatar name={board.vn[0]} id={board.vn[0]} size={34}/>
            <div className="grow"><div className="name" style={{fontSize:14}}>{board.vn[0]} <span className="chip" style={{marginLeft:4}}>VN</span></div></div>
            <div className="elo" style={{fontSize:15}}>{board.vn[1]}</div></div>}
        </div>
        <a className="btn ghost block" style={{marginTop:10,textDecoration:"none",textAlign:"center"}} href={board.url} target="_blank" rel="noopener">Xem bảng chính thức {board.name} ↗</a>
        <div className="legal" style={{margin:"10px auto"}}>Số liệu mang tính tham khảo, có thể đã thay đổi — bấm "Xem bảng chính thức" để cập nhật.</div>
      </React.Fragment>
      : <React.Fragment>
        <div style={{position:"relative",marginBottom:10}}>
          <input className="input" placeholder="🔎 Tìm cơ thủ trong bảng…" value={rq} onChange={e=>setRq(e.target.value)}/>
          {rq && <span onClick={()=>setRq("")} title="Xoá" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"var(--muted)",fontSize:15}}>✕</span>}
        </div>
        <div className="seg" style={{marginBottom:10}}>
          <button className={board2==="elo"?"on":""} onClick={()=>setBoard2("elo")}>🏆 ELO</button>
          <button className={board2==="rep"?"on":""} onClick={()=>setBoard2("rep")}>🤝 Uy tín</button>
        </div>
        <div className="row wrap" style={{marginBottom:10,gap:8}}>
          <select className="select" style={{width:"auto",padding:"7px 10px"}} value={fArea} onChange={e=>setFArea(e.target.value)}>
            <option value="all">Toàn khu vực</option>{AREAS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
          <select className="select" style={{width:"auto",padding:"7px 10px"}} value={fGame} onChange={e=>setFGame(e.target.value)}>
            <option value="all">Mọi thể loại</option>{GAME_TYPES.map(g=><option key={g} value={g}>{g}</option>)}
          </select>
          <select className="select" style={{width:"auto",padding:"7px 10px"}} value={fTier} onChange={e=>setFTier(e.target.value)}>
            <option value="all">Mọi hạng</option>{TIERS.map(t=><option key={t.name} value={t.name}>Hạng {t.name}</option>)}
          </select>
        </div>
        <div className="card" style={{padding:"6px 12px"}}>
        {rows.map((p,i)=> (rq && p.name.toLowerCase().indexOf(rq.toLowerCase())<0) ? null : (
          <div className="rank-row" key={p.id} style={p.me?{background:"#0e2c2033",margin:"0 -6px",padding:"11px 12px",borderRadius:10}:null}>
            <div className={"rk"+(i===0?" g1":i===1?" g2":i===2?" g3":"")}>{["🥇","🥈","🥉"][i]||(i+1)}</div>
            <Avatar name={p.name} id={p.id} size={38} av={p.avatar}/>
            <div className="grow">
              <div className="name" style={{fontSize:14}}>{p.name}{p.me && <span className="chip" style={{marginLeft:6}}>Bạn</span>}{p.cloud && <span className="chip" style={{marginLeft:6}}>● thật</span>}</div>
              <div className="line"><TierBadge elo={p.elo}/> · <span>📍 {p.areaName}</span></div>
            </div>
            <div className="elo" style={{fontSize:16}}>{board2==="rep"? (()=>{const R=repOf(p.id); return R?"★ "+R.avg:"–";})() : p.elo}</div>
          </div>
        ))}
        </div>
      </React.Fragment>}
    </div>
  );
}

/* ============================================================
   KẾT NỐI
   ============================================================ */
function Connections({user,rel,setRelOf,flash,challenges,addChallenge,setChallenge,recordMatch,openChat,unreadFor,matches,confirms,confirmAccept,confirmReject,myUid,blocked=[],toggleBlock}){
  const [seg,setSeg]=useState("friends");
  const [fq,setFq]=useState("");   // tìm bạn bè
  const [detail,setDetail]=useState(null);
  const [challengeTo,setChallengeTo]=useState(null); // mở form thách đấu
  const [matchWith,setMatchWith]=useState(null);     // {opp, chId?} mở form ghi kết quả

  const withDist = p => ({...p, dist:haversine(user,p)});
  const playerById = id => anyPlayer(id);
  const relIds = k => Object.keys(rel||{}).filter(id=>rel[id]===k);   // gồm cả bạn THẬT (uuid) + cơ thủ mẫu
  const friends = relIds("matched").map(id=>anyPlayer(id)).filter(Boolean).map(withDist);
  const reqIn   = relIds("incoming").map(id=>anyPlayer(id)).filter(Boolean).map(withDist);
  const reqOut  = relIds("sent").map(id=>anyPlayer(id)).filter(Boolean).map(withDist);
  const pendIn  = (confirms||[]).filter(c=>c.opponent===myUid && c.status==="pending");
  const pendOut = (confirms||[]).filter(c=>c.reporter===myUid && c.status==="pending");
  const upcoming= challenges.filter(c=>c.status==="pending"||c.status==="accepted");

  return (
    <div>
      <div className="h1">Kết nối & thách đấu</div>
      <div className="sub">Kết bạn, hẹn giờ ra bàn, rồi ghi lại kết quả để cập nhật ELO.</div>
      {(pendIn.length>0 || pendOut.length>0) && <div className="card" style={{marginBottom:12,borderColor:"var(--gold)"}}>
        <div className="shead">⚖️ Xác nhận tỉ số (đấu người thật)</div>
        {pendIn.map(c=>(
          <div key={c.id} style={{padding:"7px 0",borderBottom:"1px dashed var(--line)"}}>
            <div style={{fontSize:13.5}}><b>{c.reporter_name||"Đối thủ"}</b> báo: bạn <b>{c.opponent_score}</b> – <b>{c.reporter_score}</b> {c.reporter_name} · {c.game}</div>
            <div className="row" style={{gap:8,marginTop:6}}>
              <button className="btn sm green grow" onClick={()=>confirmAccept&&confirmAccept(c.id)}>✓ Đúng — xác nhận</button>
              <button className="btn sm danger grow" onClick={()=>confirmReject&&confirmReject(c.id)}>✗ Sai</button>
            </div>
          </div>))}
        {pendOut.map(c=>(
          <div key={c.id} className="kv"><span>Chờ <b>{c.opponent_name}</b> xác nhận ({c.reporter_score}–{c.opponent_score})</span><b style={{color:"var(--muted)"}}>⏳</b></div>))}
      </div>}
      <div className="seg">
        <button className={seg==="friends"?"on":""} onClick={()=>setSeg("friends")}>Bạn bè ({friends.length})</button>
        <button className={seg==="requests"?"on":""} onClick={()=>setSeg("requests")}>Lời mời ({reqIn.length+reqOut.length})</button>
        <button className={seg==="challenges"?"on":""} onClick={()=>setSeg("challenges")}>Lịch hẹn ({upcoming.length})</button>
      </div>

      {/* ===== BẠN BÈ ===== */}
      {seg==="friends" && friends.length>4 && <div style={{position:"relative",marginBottom:10}}><input className="input" placeholder="🔎 Tìm bạn…" value={fq} onChange={e=>setFq(e.target.value)}/>{fq&&<span onClick={()=>setFq("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"var(--muted)",fontSize:15}}>✕</span>}</div>}
      {seg==="friends" && (friends.length===0
        ? <div className="empty"><div className="ic">🤝</div>Chưa có bạn nào. Sang Khám phá để gửi lời mời nhé!</div>
        : friends.filter(p=>!fq||p.name.toLowerCase().indexOf(fq.toLowerCase())>=0).map(p=>(
          <div className="card" key={p.id}>
            <div className="pcard">
              <div onClick={()=>setDetail(p)} style={{cursor:"pointer"}}><Avatar name={p.name} id={p.id}/></div>
              <div className="meta" onClick={()=>setDetail(p)} style={{cursor:"pointer"}}>
                <div className="name"><span className={"dot"+(p.online?" on":"")}></span>{p.name}{(()=>{const h2h=matches.filter(m=>m.oppId===p.id);const hw=h2h.filter(m=>m.win).length;return h2h.length>0 && <span className="chip" style={{marginLeft:6}}>Đối đầu {hw}–{h2h.length-hw}</span>;})()}</div>
                <div className="line"><TierBadge elo={p.elo}/> · <span>📍 {p.areaName} · {fmtKm(p.dist)}</span>{p.bet?" · ☕ "+p.bet:""}</div>
                <div className="line" style={{color:"var(--gold)"}}>📞 Zalo {p.zalo} · chấp: {handicap(user.elo,p.elo)}</div>
              </div>
              <button className="btn sm grow" style={{maxWidth:120,position:"relative"}} onClick={()=>openChat(p.id)}>💬 Nhắn tin
                {unreadFor(p.id)>0 && <span className="unread-dot" style={{marginLeft:5}}>{unreadFor(p.id)}</span>}</button>
            </div>
            <div className="row" style={{gap:8,marginTop:11}}>
              <button className="btn sm ghost grow" onClick={()=>setChallengeTo(p)}>📅 Thách đấu</button>
              <button className="btn sm grow" onClick={()=>setMatchWith({opp:p})}>🎱 Ghi kết quả</button>
            </div>
          </div>
        )))}

      {/* ===== LỜI MỜI ===== */}
      {seg==="requests" && (reqIn.length+reqOut.length===0
        ? <div className="empty"><div className="ic">✉️</div>Không có lời mời nào.</div>
        : <div>
          {reqIn.length>0 && <div className="shead">Đến với bạn</div>}
          {reqIn.map(p=>(
            <div className="card pcard" key={p.id}>
              <div onClick={()=>setDetail(p)} style={{cursor:"pointer"}}><Avatar name={p.name} id={p.id}/></div>
              <div className="meta" onClick={()=>setDetail(p)} style={{cursor:"pointer"}}>
                <div className="name"><span className={"dot"+(p.online?" on":"")}></span>{p.name}</div>
                <div className="line"><TierBadge elo={p.elo}/> · <span>📍 {p.areaName} · {fmtKm(p.dist)}</span></div>
              </div>
              <ConnectBtn rel={rel[p.id]} id={p.id} setRelOf={setRelOf} flash={flash} name={p.name}/>
            </div>
          ))}
          {reqOut.length>0 && <div className="shead" style={{marginTop:16}}>Bạn đã gửi</div>}
          {reqOut.map(p=>(
            <div className="card pcard" key={p.id}>
              <div onClick={()=>setDetail(p)} style={{cursor:"pointer"}}><Avatar name={p.name} id={p.id}/></div>
              <div className="meta" onClick={()=>setDetail(p)} style={{cursor:"pointer"}}>
                <div className="name"><span className={"dot"+(p.online?" on":"")}></span>{p.name}</div>
                <div className="line"><TierBadge elo={p.elo}/> · <span>📍 {p.areaName} · {fmtKm(p.dist)}</span></div>
              </div>
              <ConnectBtn rel={rel[p.id]} id={p.id} setRelOf={setRelOf} flash={flash} name={p.name}/>
            </div>
          ))}
        </div>)}

      {/* ===== LỊCH HẸN / THÁCH ĐẤU ===== */}
      {seg==="challenges" && (upcoming.length===0
        ? <div className="empty"><div className="ic">📅</div>Chưa có lịch hẹn nào. Vào "Bạn bè" để thách đấu một ai đó!</div>
        : upcoming.map(c=>{
          const opp = playerById(c.oppId); if(!opp) return null;
          return (
            <div className="card" key={c.id}>
              <div className="pcard">
                <Avatar name={opp.name} id={opp.id}/>
                <div className="meta">
                  <div className="name">{opp.name} <span className="chip gt">{c.game}</span>{c.bet && <span className="chip" style={{marginLeft:4}}>☕ {c.bet}</span>}</div>
                  <div className="line">🗓️ {fmtDateVN(c.date)} · {c.time}{(()=>{const d=Math.round((Date.parse(c.date)-Date.parse(todayStr()))/86400000); return d===0?" · ⏳ hôm nay":d===1?" · ⏳ ngày mai":d>1?" · ⏳ còn "+d+"n":"";})()} · {c.club?(clubById(c.club)||{}).name:"chưa chọn CLB"}</div>
                  <div className="line">{c.dir==="in"?"⬅️ Lời mời đấu đến bạn":"➡️ Bạn đã gửi"} · {c.status==="accepted"?<span style={{color:"#37d67a"}}>đã nhận</span>:<span style={{color:"var(--gold)"}}>chờ xác nhận</span>}</div>
                </div>
              </div>
              <div className="row" style={{gap:8,marginTop:11,flexWrap:"wrap"}}>
                {c.dir==="in" && c.status==="pending" && <>
                  <button className="btn sm green grow" onClick={()=>{setChallenge(c.id,{status:"accepted"});flash("Đã nhận lời thách đấu 🎯");}}>Nhận đấu</button>
                  <button className="btn sm ghost" onClick={()=>{setChallenge(c.id,{status:"declined"});flash("Đã từ chối");}}>Từ chối</button>
                </>}
                {c.status==="accepted" && <button className="btn sm grow" onClick={()=>setMatchWith({opp,chId:c.id})}>🎱 Ghi kết quả</button>}
                {c.dir==="out" && c.status==="pending" && <button className="btn sm ghost" onClick={()=>{setChallenge(c.id,{status:"declined"});flash("Đã huỷ lời mời");}}>Huỷ lời mời</button>}
                <button className="btn sm ghost" onClick={()=>dlICS("Đấu bi-a với "+opp.name,c.date,c.time,c.club?((clubById(c.club)||{}).name||""):"")}>📅 Lịch</button>
              </div>
            </div>
          );
        }))}

      {detail && <PlayerModal p={detail} rel={rel[detail.id]} setRelOf={setRelOf} flash={flash} onClose={()=>setDetail(null)} openChat={openChat} matches={matches} user={user} blocked={blocked} toggleBlock={toggleBlock} />}
      {challengeTo && <ChallengeForm opp={challengeTo} user={user} onSave={c=>{addChallenge(c);setChallengeTo(null);setSeg("challenges");}} onClose={()=>setChallengeTo(null)} />}
      {matchWith && <MatchForm opp={matchWith.opp} user={user} matches={matches}
        onSave={(ms,os,g,d)=>{ recordMatch(matchWith.opp,ms,os,g,d); if(matchWith.chId) setChallenge(matchWith.chId,{status:"done"}); setMatchWith(null); }}
        onClose={()=>setMatchWith(null)} />}
    </div>
  );
}

function HandiBox({mine,opp,aName,bName}){
  const d=Math.abs((mine||0)-(opp||0));
  const g=d<60?0:d<150?1:d<300?2:3;
  const giver=(mine||0)>=(opp||0)?(aName||"Bạn"):(bName||"Đối thủ");
  return (
    <div style={{padding:"9px 12px",borderRadius:12,border:"1px solid #4a3808",background:"#211a05",marginBottom:11}}>
      <div style={{fontSize:13}}>🎯 <b style={{color:"var(--gold)"}}>Chấp tự động (theo ELO)</b> · chênh {d}</div>
      <div style={{fontSize:12.5,color:"var(--muted)",marginTop:3}}>{g===0?"Ngang cơ — không cần chấp.":giver+" (cơ trên) chấp "+g+" ván cho người yếu hơn."}</div>
    </div>
  );
}
function ChallengeForm({opp,user,onSave,onClose}){
  const [f,setF]=useState({date:daysAgoStr(-1),time:"20:00",club:(opp.clubs&&opp.clubs[0])||(user.clubs&&user.clubs[0])||"",game:opp.games[0]||"9 bi",bet:opp.bet||BET_LEVELS[0]});
  const up=(k,v)=>setF(s=>({...s,[k]:v}));
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="h1" style={{fontSize:18,marginBottom:4}}>Thách đấu {opp.name}</div>
      <div className="sub">Đề xuất thời gian, địa điểm & mức kèo. Đối phương sẽ nhận hoặc từ chối.</div>
      <HandiBox mine={user.elo} opp={opp.elo}/>
      <div className="row" style={{gap:10}}>
        <div className="field grow"><label>Ngày</label><input type="date" className="input" value={f.date} onChange={e=>up("date",e.target.value)}/></div>
        <div className="field" style={{width:120}}><label>Giờ</label><input type="time" className="input" value={f.time} onChange={e=>up("time",e.target.value)}/></div>
      </div>
      <div className="field"><label>Thể loại</label>
        <select className="select" value={f.game} onChange={e=>up("game",e.target.value)}>{GAME_TYPES.map(g=><option key={g}>{g}</option>)}</select></div>
      <div className="field"><label>Kèo vui — thua mời</label>
        <select className="select" value={f.bet} onChange={e=>up("bet",e.target.value)}>{BET_LEVELS.map(b=><option key={b}>{b}</option>)}</select></div>
      <div className="field"><label>CLB</label>
        <select className="select" value={f.club} onChange={e=>up("club",e.target.value)}><option value="">— Chưa chọn —</option>{CLUBS_AZ.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
      <button className="btn block" onClick={()=>onSave({oppId:opp.id,...f})}>Gửi lời thách đấu</button>
      <button className="btn ghost block" style={{marginTop:8}} onClick={onClose}>Huỷ</button>
    </div></div>
  );
}

function MatchForm({opp,user,matches,onSave,onClose}){
  const [f,setF]=useState({date:todayStr(),game:opp.games[0]||"9 bi",my:5,opp:3});
  const up=(k,v)=>setF(s=>({...s,[k]:v}));
  const win=f.my>f.opp;
  const provisional=(matches||[]).length<10;
  const preview=eloDelta(user.elo,opp.elo,win,provisional?48:32);
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="h1" style={{fontSize:18,marginBottom:4}}>Ghi kết quả vs {opp.name}</div>
      <div className="sub">Bạn {user.elo} · Đối thủ {opp.elo} ELO</div>
      <HandiBox mine={user.elo} opp={opp.elo}/>
      <div className="field"><label>Ngày</label><input type="date" className="input" value={f.date} max={todayStr()} onChange={e=>up("date",e.target.value)}/></div>
      <div className="field"><label>Thể loại</label>
        <select className="select" value={f.game} onChange={e=>up("game",e.target.value)}>{GAME_TYPES.map(g=><option key={g}>{g}</option>)}</select></div>
      <div className="row wrap" style={{gap:6,marginBottom:10,alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>Đua tới</span>
        {[5,7,9].map(n=><span key={n} className="pill" onClick={()=>setF(s=>({...s,my:n,opp:Math.min(s.opp,n-1)}))}>{n} ván</span>)}</div>
      <div className="row" style={{gap:10}}>
        <div className="field grow"><label>Bạn (ván thắng)</label><input type="number" min="0" className="input" value={f.my} onChange={e=>up("my",+e.target.value)}/></div>
        <div className="field grow"><label>{opp.name}</label><input type="number" min="0" className="input" value={f.opp} onChange={e=>up("opp",+e.target.value)}/></div>
      </div>
      <div className="card" style={{padding:"11px 13px",textAlign:"center",marginBottom:12}}>
        Kết quả: <b style={{color:win?"#37d67a":"#e5564b"}}>{win?"THẮNG":"THUA"}</b> ·
        ELO <b style={{color:preview>=0?"#37d67a":"#e5564b"}}>{preview>=0?"+":""}{preview}</b> → <b className="elo">{user.elo+preview}</b>
        {provisional && <div style={{fontSize:11.5,color:"var(--muted-2)",marginTop:5}}>⚡ Đang định hạng nhanh (dưới 10 trận) — ELO thay đổi mạnh hơn.</div>}
      </div>
      <button className="btn block" disabled={f.my===f.opp} onClick={()=>onSave(f.my,f.opp,f.game,f.date)}>{f.my===f.opp?"Tỉ số phải có người thắng":"Lưu kết quả"}</button>
      <button className="btn ghost block" style={{marginTop:8}} onClick={onClose}>Huỷ</button>
    </div></div>
  );
}

/* ============================================================
   CHAT (giả lập, lưu cục bộ)
   ============================================================ */
function ChatScreen({pid,msgs,onSend,onClose}){
  const opp = anyPlayer(pid);
  const [text,setText]=useState("");
  const bodyRef=useRef(null);
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs]);
  useEffect(()=>{ const h=e=>{ if(e.key==="Escape") onClose(); }; window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[onClose]);
  if(!opp) return null;
  const send=()=>{ if(!text.trim())return; onSend(pid,text); setText(""); };
  return (
    <div className="chat"><div className="chat-inner">
      <div className="chat-head">
        <button className="bk" onClick={onClose}>‹</button>
        <Avatar name={opp.name} id={opp.id} size={40}/>
        <div className="grow">
          <div className="name" style={{fontSize:15}}><span className={"dot"+(opp.online?" on":"")}></span>{opp.name}</div>
          <div className="line"><TierBadge elo={opp.elo}/> · <span>{opp.online?"Đang hoạt động":"Ngoại tuyến"}</span></div>
        </div>
      </div>
      <div className="chat-body" ref={bodyRef}>
        <div className="chat-day">{isRealId(pid)?"💬 Tin nhắn đồng bộ realtime giữa hai người (qua máy chủ).":"Tin nhắn chỉ lưu trên máy bạn (bản giả lập). Trả lời của đối phương là tự động."}</div>
        {msgs.map(m=>(
          <div key={m.id} className={"bub "+(m.me?"me":"them")}>{m.text}<span className="t">{m.ts}</span></div>
        ))}
      </div>
      <div className="scrollx" style={{padding:"6px 12px 0"}}>
        {["Mấy giờ?","Ở CLB nào?","Chốt kèo 🎱","Đang tới","Để mình xem lịch"].map(qr=>(
          <span key={qr} className="pill" onClick={()=>onSend(pid,qr)}>{qr}</span>))}
      </div>
      <div className="chat-input">
        <input value={text} placeholder={"Nhắn cho "+opp.name+"…"} onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter") send(); }}/>
        <button onClick={send} aria-label="Gửi">➤</button>
      </div>
    </div></div>
  );
}

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function daysAgoStr(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtDateVN(s){ const [y,m,d]=s.split("-"); return d+"/"+m; }

  "Vung cơ trên đường thẳng":{dg:"stance",steps:["Đặt cơ song song mép băng hoặc một đường kẻ thẳng.","Vung thử 15–20 lần, nhìn mũi cơ chạy đúng trên đường thẳng, không lượn.","Giữ cổ tay & khuỷu cố định, chỉ cẳng tay chuyển động."],tip:"Quay video từ phía sau để soi đường cơ có thẳng không."},
  "Bi cái đi thẳng về chỗ cũ":{dg:"stance",steps:["Đặt bi cái ở chấm, đánh tâm bi đi thẳng hết bàn.","Mục tiêu: bi bật băng cuối và lăn về gần đúng điểm xuất phát.","Lặp 10 lần, để ý độ thẳng và lực."]},
  "Qua cổ chai (bottle drill)":{dg:"stance",steps:["Dựng một chai làm 'cổng' ở giữa bàn.","Đánh bi cái xuyên qua khe mà không chạm vật.","Thu hẹp khe / tăng cự ly để khó dần."],tip:"Bài kinh điển luyện độ thẳng đường cơ."},
  "Giữ yên đầu":{dg:"stance",steps:["Quay video ngang tầm bàn khi bạn đánh.","Kiểm tra đầu & thân không nhấc lên trước khi bi chạm.","Giữ yên thêm 1 giây sau khi cơ chạm bi (freeze)."]},
  "Nhịp pre-shot cố định":{dg:"mental",steps:["Chọn quy trình: ngắm → 2–3 vung thử → 1 nhịp dừng → đánh.","Lặp y hệt cho mọi cú, kể cả cú dễ.","Đếm thầm để giữ nhịp ổn định."]},
  "Đánh tâm bi cái":{dg:"stance",steps:["Ngắm chính giữa bi cái, không lệch trái/phải.","Đánh 10 cú đi thẳng, quan sát bi không 'đổi làn'.","Nếu bi lệch là bạn đang vô tình đánh xoáy."]},
  "Ba kiểu cầu tay":{dg:"mental",steps:["Tập cầu hở (open), cầu kín (closed), và cầu trên băng.","Mỗi kiểu giữ 10 cú cho quen độ vững.","Cầu kín cho cú mạnh, cầu hở cho cú nhẹ/khó."]},
  "Đường ngắm thẳng hàng":{dg:"straight",steps:["Xếp bi cái – bi mục tiêu – lỗ trên một đường thẳng.","Vào 10/10 ở cự ly gần rồi mới tăng khoảng cách.","Đứng sau bi cái soi đường trước khi cúi xuống."]},
  "Tăng tốc qua bi":{dg:"stance",steps:["Kéo cơ về (backswing) thật chậm.","Tăng tốc đều, nhanh nhất đúng lúc chạm bi.","Tránh 'giật' ngay từ đầu khiến mất kiểm soát."]},
  "Bi cái dừng đúng mốc":{dg:"speed",steps:["Đặt một mốc (đồng xu) trên bàn.","Đánh bi cái dừng đúng tại mốc, không cần bi mục tiêu.","Đổi mốc xa/gần để rèn cảm giác lực."]},
  // Lực & bi cái
  "Stop shot tăng cự ly":{dg:"stop",steps:["Bi cái và bi 1 thẳng hàng với lỗ.","Đánh tâm/hơi dưới tâm để bi cái dừng ngay khi bi 1 đi.","Tăng dần khoảng cách bi cái–bi 1 (1→2→3 ô), mỗi mốc 10 cú."],tip:"Cự ly càng xa càng phải đánh thấp hơn để 'stun'."},
  "Follow kiểm soát":{dg:"follow",steps:["Đánh trên tâm bi cái để bi đi tới sau khi chạm.","Định trước điểm dừng, chỉnh lực để dừng đúng đó.","Đừng đánh quá mạnh khiến bi đi quá đà."]},
  "Draw kiểm soát":{dg:"draw",steps:["Đánh dưới tâm bi cái, cơ giữ ngang.","Kéo bi cái về đúng khoảng định trước.","Tăng lượng draw dần, giữ đường cơ thẳng."]},
  "Thang tốc độ (speed ladder)":{dg:"speed",steps:["Đặt 5 mốc A→E dọc bàn.","Đánh bi cái dừng lần lượt ở từng mốc.","Ghi mốc nào hay lố/thiếu để hiệu chỉnh."]},
  "Force follow":{dg:"follow",steps:["Bi cái sát bi 1, đánh cao và mạnh.","Bi cái 'xuyên' đi tới một đoạn dài sau khi chạm.","Giữ follow through dài và thẳng."]},
  "Power draw":{dg:"draw",steps:["Đánh thật thấp dưới tâm, cú dứt khoát.","Kéo bi cái về gần hết chiều dài bàn.","Giữ cơ ngang & follow through, đừng nhấc cơ."]},
  "Stun run-through":{dg:"follow",steps:["Đánh hơi dưới tâm với lực vừa.","Bi cái khựng lại rồi lăn nhẹ một đoạn ngắn.","Dùng khi cần đi 'một chút' về phía trước."]},
  "Bi cái về sát băng (lag)":{dg:"stance",steps:["Đánh bi cái đi hết bàn, dừng càng sát băng cuối càng tốt.","Không chạm băng là lý tưởng (như cú lag giành phát).","Lặp 10 cú, đo khoảng cách tới băng."]},
  "Hai băng tới điểm":{dg:"pos2",steps:["Đặt mục tiêu (vùng) ở nửa bàn bên kia.","Đánh bi cái đi 2 băng về đúng vùng đó.","Dùng khi không tới được bằng 1 băng."]},
  "Xoáy nhẹ trái/phải":{dg:"stance",steps:["Đánh lệch tâm bi cái một chút sang trái rồi phải.","Quan sát bi cái 'cong' và đổi đường sau băng.","Bắt đầu mức xoáy nhỏ để kiểm soát."]},
  // Cắt bi & ngắm
  "Cắt 5 góc (15–75°)":{dg:"cut",steps:["Đặt bi 1 cách lỗ góc ~1 ô.","Đặt bi cái tạo góc cắt 15°, vào 10 bi; rồi 30/45/60/75°.","Ghi tỉ lệ vào ở từng góc để biết góc yếu."]},
  "Cắt dọc băng (rail cut)":{dg:"rail",steps:["Đặt bi 1 sát băng dài.","Cắt cho bi chạy dọc băng vào lỗ góc.","Ngắm hơi 'dày' hơn vì bi dễ văng khỏi băng."]},
  "Bi dài hết bàn":{dg:"long",steps:["Đặt bi 1 ở đầu bàn, bi cái ở đầu kia.","Vào lỗ góc xa, giữ đường cơ thật thẳng.","Tập trung vào điểm chạm, đánh lực vừa đủ."]},
  "Cắt cực mỏng":{dg:"thin",steps:["Đặt góc cắt rất rộng (~80°).","Chỉ chạm rất nhẹ rìa bi 1.","Luyện cảm giác 'mỏng' — sai một chút là trượt."]},
  "Cắt ngược (back cut)":{dg:"cut",steps:["Đặt bi sao cho phải cắt ngược hướng tự nhiên.","Ngắm kỹ điểm chạm và tin vào đường ngắm.","Đừng đánh quá mạnh, dễ mất điểm chạm."]},
  "Spot shot":{dg:"long",steps:["Đặt bi 1 ở chấm (foot spot).","Bi cái sau vạch phá, cắt bi 1 vào lỗ góc.","Bài chuẩn đo độ ổn định cú cắt trung bình."]},
  "Bi ma (ghost ball)":{dg:"cut",steps:["Hình dung một 'bi ma' nằm sát sau bi 1, hướng về lỗ.","Đánh tâm bi cái tới đúng vị trí bi ma đó.","Áp dụng cho mọi góc để học điểm ngắm."]},
  "Vào lỗ giữa nhiều góc":{dg:"cut",steps:["Đặt bi 1 gần lỗ giữa.","Vào từ nhiều hướng khác nhau (trái/phải/thẳng).","Lỗ giữa 'khó nuốt' hơn lỗ góc nên cần chính xác."]},
  "Bi dính băng vào góc":{dg:"rail",steps:["Đặt bi 1 dính sát băng.","Đánh cho bi cái & bi 1 chạm băng gần như cùng lúc.","Vào lỗ góc cuối băng — bài khó cần lực chuẩn."]},
  "Bánh xe (wagon wheel)":{dg:"wagon",steps:["Đặt 1 bi mục tiêu trước một lỗ.","Lần lượt đặt bi cái ở ~8 vị trí quanh (hình nan hoa).","Vào đủ các góc để biết bạn yếu góc nào."]},
  // Vị trí bi
  "Đi bi 1 chạm":{dg:"pos",steps:["Vào bi 1, để bi cái chạm đúng 1 băng.","Bi cái về 'vùng' định trước cho cú kế tiếp.","Điều lực để không quá/thiếu băng."]},
  "Đi bi không băng":{dg:"straight",steps:["Chọn cú có góc tự nhiên đưa bi cái tới vị trí.","Không dùng băng — chỉ lực & góc.","Đơn giản nhưng là nền tảng của position."]},
  "Ô vuông thu nhỏ":{dg:"pos",steps:["Tưởng tượng một ô vuông làm đích cho bi cái.","Đưa bi cái dừng trong ô.","Thu nhỏ ô dần để tăng độ khó."]},
  "Ba bi có shape":{dg:"line",steps:["Đặt 3 bi, vào lần lượt.","Mỗi cú phải để bi cái mở góc đẹp cho bi sau.","Clear cả 3 mới tính đạt."]},
  "Né bi cản":{dg:"pos",steps:["Đặt 1 bi cản giữa bi cái và đích.","Đi đường (qua băng) vòng qua bi cản.","Tính trước đường bi cái sẽ đi."]},
  "Giữ góc thay vì thẳng":{dg:"pos",steps:["Tránh để cú thẳng tắp (khó đi tiếp).","Cố để lại góc ~30° cho cú sau.","Góc nhỏ giúp điều bi cái dễ hơn."]},
  "Vị trí 2 băng":{dg:"pos2",steps:["Khi đích ở xa, dùng 2 băng đưa bi cái về.","Tính điểm chạm băng thứ nhất trước.","Lực lớn hơn cú 1 băng."]},
  "Vào \"vùng\" thay vì điểm":{dg:"pos",steps:["Nhắm cả một vùng an toàn, không phải 1 điểm.","Giảm áp lực 'phải chuẩn tuyệt đối'.","Đây là tư duy position của cơ thủ giỏi."]},
  "Né tự lỗ (scratch)":{dg:"cut",steps:["Nhận diện cú dễ scratch (bi cái theo bi vào lỗ).","Dùng draw/stun để giữ bi cái lại.","Luôn hỏi 'bi cái đi đâu' trước khi đánh."]},
  "Mở cụm có kế hoạch":{dg:"run15",steps:["Chọn cú vừa vào 1 bi vừa chạm nhẹ cụm dính.","Mở cụm vừa đủ, không tản loạn.","Giữ bi cái ở vị trí kiểm soát sau khi mở."]},
  // Băng & kick
  "Băng 1 lần vào lỗ":{dg:"bank1",steps:["Đặt bi 1 cách băng vừa phải.","Tính điểm chạm băng (góc tới ≈ góc phản).","Đánh bi 1 băng 1 lần vào lỗ đối diện."]},
  "Băng 2 lần":{dg:"bank2",steps:["Bài khó hơn: bi đi 2 băng mới vào.","Dùng hệ kim cương để tính đường.","Lực ổn định là chìa khoá."]},
  "Kick 1 băng chạm bi":{dg:"kick",steps:["Khi bị che, đánh bi cái vào băng rồi bật ra chạm bi mục tiêu.","Tính 'gương' (phản chiếu) qua băng để ngắm.","Mục tiêu tối thiểu: chạm hợp lệ, tránh phạm lỗi."]},
  "Kick 2 băng":{dg:"bank2",steps:["Tính đường 2 băng để chạm bi bị giấu kỹ.","Dùng điểm kim cương.","Chấp nhận khó — đây là 'đường thoát'."]},
  "Hệ kim cương cơ bản":{dg:"bank2",steps:["Học đánh số các điểm kim cương trên thành bàn.","Áp dụng: điểm xuất phát − điểm đích = điểm băng cần nhắm.","Tập vài đường chuẩn cho thuộc."],tip:"Dùng nhiều ở carom 3 băng."},
  "Băng vào lỗ giữa":{dg:"bank1",steps:["Cross-side: bi 1 băng vào lỗ giữa đối diện.","Góc hẹp nên cần điểm chạm chính xác.","Lực vừa, tránh bi nảy khỏi lỗ."]},
  "Băng vào lỗ góc chéo":{dg:"bank2",steps:["Cross-corner: bi băng chéo về lỗ góc bên kia.","Đường dài, dễ sai góc.","Đánh dứt khoát, giữ cơ thẳng."]},
  "Băng có xoáy bù":{dg:"bank1",steps:["Thêm english để 'bẻ' điểm tới sau băng.","Xoáy làm góc phản đổi — luyện để biết bù bao nhiêu.","Bắt đầu với xoáy nhẹ."]},
  "Băng dọc bàn dài":{dg:"bank2",steps:["Bi băng chạy gần hết chiều dài bàn.","Cần lực lớn nhưng vẫn kiểm soát hướng.","Dễ bị 'ngắn' nếu thiếu lực."]},
  "Kick rồi thủ":{dg:"kick",steps:["Kick chạm bi hợp lệ xong để bi cái về thế an toàn.","Vừa thoát phạm lỗi vừa không tặng cơ hội.","Tư duy phòng thủ nâng cao."]},
  // Phá (break)
  "Phá 9 bi giữ bi cái":{dg:"break9",steps:["Đặt bi cái trong break box.","Phá trúng bi 1 đầu rack, lực dứt khoát.","Mục tiêu: bi cái về giữa bàn, có ≥1 bi xuống lỗ."]},
  "Phá mạnh đếm bi":{dg:"break9",steps:["Phá hết lực (vẫn giữ chuẩn xác).","Đếm số bi xuống lỗ mỗi lần phá.","Ghi trung bình qua 10 cú."]},
  "Phá kiểm soát (soft break)":{dg:"break9",steps:["Phá lực vừa, ưu tiên tản bi & đứng bi cái.","Phổ biến ở 9 bi/10 bi hiện đại.","Đổi lực để tìm 'điểm ngọt' giữ bi cái tốt nhất."]},
  "Phá lệch (cut break) 9 bi":{dg:"break9",steps:["Đặt bi cái lệch về một bên box.","Cắt vào bi 1 để khống chế hướng bi & bi cái.","Nhiều cơ thủ pro dùng để giữ bi 1."]},
  "Phá full rack (8 bi)":{dg:"breakfull",steps:["Phá tam giác đầy, nhắm đỉnh rack.","Mục tiêu tản đều, không để bi chụm.","Giữ bi cái không scratch."]},
  "Phá chạm bi thứ hai":{dg:"breakfull",steps:["Nhắm chạm bi thứ 2 của rack (kỹ thuật nâng cao).","Có thể tản tốt hơn ở một số kiểu rack.","Cần độ chính xác cao."]},
  "Không scratch sau phá":{dg:"break9",steps:["Phá 10 lần liên tiếp.","Tính số lần bi cái KHÔNG rơi lỗ / không bay bàn.","Chỉnh điểm đánh & lực để giữ bi cái."]},
  "Phá rồi đọc bàn":{dg:"ghost",steps:["Sau phá, dừng lại 'đọc' cả bàn.","Chọn bi 1 và hình dung pattern 3 cú đầu.","Rồi mới vào bi."]},
  "Phá từ nhiều vị trí":{dg:"break9",steps:["Thử phá từ sát băng, giữa box, lệch box.","So sánh kiểu nào cho kết quả ổn định nhất.","Chốt 'điểm phá tủ' của bạn."]},
  "Phá & chạy (break-and-run)":{dg:"ghost",steps:["Phá xong cố clear toàn bàn một lượt.","Đếm số lần break-and-run / 10.","Mục tiêu thực chiến quan trọng nhất."]},
  // Safety
  "Giấu bi cái sau cụm":{dg:"safety",steps:["Đưa bi cái nấp sau một/nhiều bi.","Đối thủ không thấy bi mục tiêu nên phải kick.","Để bi mục tiêu ở nơi khó."]},
  "Safe dính băng":{dg:"safety",steps:["Đẩy bi cái về dính sát băng.","Cú đánh từ băng khó hơn nhiều.","Kết hợp giấu góc nhìn càng tốt."]},
  "Two-way shot":{dg:"cut",steps:["Chọn cú vừa cố vào bi, vừa tính nếu trượt thì bi cái về thế thủ.","Giảm rủi ro khi cú khó.","Tư duy 'được ăn cả, ngã an toàn'."]},
  "Đẩy bi về cuối + giấu":{dg:"safety",steps:["Đẩy bi mục tiêu ra xa cuối bàn.","Đồng thời giấu bi cái sau cụm.","Khoảng cách + bị che = cực khó cho đối thủ."]},
  "Hook toàn phần":{dg:"safety",steps:["Khoá để đối thủ không thấy bi hợp lệ nào.","Buộc họ kick/băng dễ phạm lỗi.","Cẩn thận luật nếu chính bạn phạm lỗi khi tạo hook."]},
  "Roll-out (9 bi)":{dg:"ghost",steps:["Sau phá, dùng quyền push-out đẩy bi cái tới thế dễ hơn.","Đối thủ chọn đánh tiếp hay trả lại cho bạn.","Dùng khi bi 1 quá khó."]},
  "Đấu safety qua lại":{dg:"safety",steps:["Hai bên liên tục đánh thủ tới khi ai đó lộ bi.","Tập kiên nhẫn và kiểm soát lực.","Người mất bình tĩnh trước thường thua."]},
  "Khống chế cự ly khi thủ":{dg:"safety",steps:["Khi thủ, canh khoảng cách bi cái–bi mục tiêu.","Đủ xa để khó, không quá đà để mất kiểm soát.","Lực là yếu tố quyết định."]},
  "Phá cụm an toàn":{dg:"run15",steps:["Khi bi dính cụm, tách nhẹ mà vẫn giữ thế.","Không mở toang tặng đối thủ.","Kết hợp một cú thủ nếu cần."]},
  "Trả safe sau khi bị hook":{dg:"kick",steps:["Bị giấu bi thì kick chạm hợp lệ rồi để lại thế thủ.","Vừa thoát phạm lỗi vừa phản đòn.","Tính đường kick + lực kiểm soát."]},
  // Chạy bi & pattern
  "Ghost 9 bi (đua 10)":{dg:"ghost",steps:["Rack 9 bi rồi tự phá.","Cố clear một lượt; trượt cú nào là 'bi ma' thắng ván.","Đua 10 ván, ghi số ván bạn thắng."],tip:"Thước đo trình run-out khách quan nhất."},
  "Ghost 8 bi":{dg:"ghost",steps:["Như ghost 9 bi nhưng chỉ 8 bi (dễ hơn).","Phù hợp trình trung cấp.","Quen rồi thì tăng lên 9–10 bi."]},
  "Ghost 10 bi":{dg:"ghost",steps:["Bản khó: 10 bi, gọi bi gọi lỗ.","Trượt hoặc sai gọi là thua ván.","Dành cho trình cao."]},
  "Run-out 6 bi ngẫu nhiên":{dg:"run15",steps:["Rải ngẫu nhiên 6 bi + bi cái.","Cố clear một lượt, tự chọn thứ tự hợp lý.","Lặp nhiều lần, để ý pattern tối ưu."]},
  "Hàng bi thẳng (line)":{dg:"line",steps:["Đặt 5–7 bi cách đều trên một đường tới lỗ góc.","Vào lần lượt, dùng follow/draw giữ bi cái trên đường.","Mục tiêu: vào liên tiếp không trượt."]},
  "Bài chữ L":{dg:"ldrill",steps:["Đặt 6 bi theo hình chữ L quanh bàn.","Chạy theo thứ tự, mỗi cú canh shape cho cú sau.","Clear trọn vẹn trong vài lần thử."]},
  "Mighty X / X-drill":{dg:"xdrill",steps:["Xếp bi theo hình chữ X.","Đòi hỏi điều bi cái qua lại giữa các nhánh.","Bài nâng cao về position."]},
  "Run 15 bi (sức bền)":{dg:"run15",steps:["Rải 15 bi rồi tự phá.","Cố clear, đếm chuỗi bi vào liên tiếp.","Rèn tập trung & thể lực cả ván dài."]},
  "Rotation theo số":{dg:"run15",steps:["Phải vào bi theo thứ tự số tăng dần.","Buộc đi bi cái tới đúng bi tiếp theo.","Khó hơn vì không được chọn bi dễ."]},
  "Đọc pattern trước khi đánh":{dg:"ghost",steps:["Trước khi vào bi, đứng đọc cả bàn.","Vạch thứ tự & đường bi cái 3–4 cú đầu.","Đánh đúng kế hoạch đã vạch."]},
  // Carom
  "3 băng cơ bản":{dg:"carom3",steps:["Bi cái phải chạm ≥3 băng trước khi chạm bi mục tiêu thứ 2.","Bắt đầu với các thế bi mở.","Mỗi carom hợp lệ = 1 điểm."]},
  "Hệ kim cương carom":{dg:"carom3",steps:["Đánh số các điểm kim cương quanh bàn.","Điểm xuất phát − điểm đích = điểm băng cần nhắm.","Tập các thế tủ cho thuộc lòng."]},
  "Gom bi libre (nurse)":{dg:"carom3",steps:["Dồn 2 bi mục tiêu lại gần nhau ở góc.","Đánh nhẹ để ghi điểm liên tục mà bi gần như đứng yên.","Kỹ thuật ghi 'sê-ri' của libre."]},
  "Cú phăng 1 băng":{dg:"carom3",steps:["Carom chỉ cần 1 băng (phăng).","Tập đường ngắn & lực nhẹ.","Nền tảng trước khi lên 3 băng."]},
  "Bài cố định 3 băng":{dg:"carom3",steps:["Đặt bi đúng các 'thế bài' chuẩn (position play).","Lặp tới khi thuộc đường và lực.","Cách luyện của VĐV chuyên nghiệp."]},
  "Bó góc libre":{dg:"carom3",steps:["Giữ cả 3 bi trong một góc bàn.","Ghi điểm chuỗi với lực rất nhẹ.","Đòi hỏi cảm giác lực cực tinh."]},
  "Xoáy điều hướng carom":{dg:"carom3",steps:["Dùng english để đổi đường bi cái sau băng.","Cùng điểm chạm nhưng xoáy khác cho đường khác.","Mở rộng kho 'đường' của bạn."]},
  "Lực dài 3 băng":{dg:"carom3",steps:["Các thế cần đường vòng lớn quanh bàn.","Đánh lực mạnh nhưng vẫn trúng đường.","Luyện độ ổn định ở cú dài."]},
  "Đường về sau 3 băng":{dg:"carom3",steps:["Sau khi ghi điểm, tính để bi cái về thế ghi tiếp.","Đây là position play của carom.","Giúp ghi sê-ri dài."]},
  "Run libre (đua 20)":{dg:"carom3",steps:["Cố ghi 20 điểm liên tục không trượt.","Tập trung gom & giữ bi.","Nâng mục tiêu dần (30, 50...)."]},
  // Tâm lý & thi đấu
  "Ván áp lực 1 mạng":{dg:"mental",steps:["Tự quy ước: trượt 1 cú là thua cả ván.","Đánh như đang ở cú quyết định của giải.","Rèn giữ bình tĩnh dưới áp lực."]},
  "Pre-shot mỗi cú":{dg:"mental",steps:["Áp dụng đúng quy trình trước cú cho MỌI cú.","Không 'đánh ẩu' cú dễ.","Sự đều đặn tạo phong độ ổn định."]},
  "Reset sau cú trượt":{dg:"mental",steps:["Sau khi trượt: hít thở, thả lỏng vai.","Bỏ qua lỗi, coi cú sau là cú đầu tiên.","Tránh 'cay cú' đánh vội."]},
  "Nhật ký cảm giác":{dg:"mental",steps:["Sau buổi tập ghi: tập trung tốt không, lỗi nào lặp lại.","Theo dõi tâm lý theo thời gian.","Lưu ở tab Nhật ký."]},
  "Thở trước cú quan trọng":{dg:"mental",steps:["Trước cú khó/quyết định: 1 nhịp thở sâu, thở ra chậm.","Hạ nhịp tim, tay vững hơn.","Biến nó thành thói quen tự động."]},
  "Đua mô phỏng (race to N)":{dg:"mental",steps:["Tự đua tới N ván như thi đấu thật.","Tính điểm và tạo áp lực từng ván.","Ghi lại kết quả để theo dõi."]},
  "Đánh khi mệt":{dg:"mental",steps:["Tập 15–20' cuối buổi khi đã mỏi.","Học giữ kỹ thuật & tập trung lúc xuống sức.","Mô phỏng giai đoạn cuối trận dài."]},
  "Hình dung cả ván":{dg:"mental",steps:["Trước khi vào bi, 'chiếu phim' đường chạy trong đầu.","Thấy rõ bi cái đi đâu từng cú.","Tăng tự tin & độ chính xác."]},
  "Không trượt 20 bi dễ":{dg:"line",steps:["Đặt liên tục các cú dễ.","Mục tiêu: vào 20 cú liên tiếp không trượt.","Rèn sự tập trung vào cú đơn giản."]},
  "Chơi có chấp":{dg:"mental",steps:["Tự nhận chấp (cho đối thủ trước vài ván/bi).","Buộc bạn chơi tốt hơn để gỡ.","Quen với áp lực bị dẫn trước."]},
};
function DrillModal({drill,onClose}){
  const det=DRILL_DETAIL[drill.n]||{};
  const dg=det.dg||"straight";
  const cfg=DIAGRAMS[dg];
  const steps=det.steps||[drill.d];
  const lv=LV[drill.lv]||LV["TB"];
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:"90vh",overflowY:"auto"}}>
      <button onClick={onClose} aria-label="Đóng" style={{float:"right",background:"none",color:"var(--muted)",fontSize:24,lineHeight:.8,cursor:"pointer",padding:"0 2px"}}>×</button>
      <div className="h1" style={{fontSize:17,marginBottom:6,paddingRight:22}}>{drill.n}</div>
      <div className="line" style={{marginBottom:11}}><span className="chip" style={{background:"transparent",color:lv.c,borderColor:lv.b}}>{drill.lv}</span></div>
      {dg==="mental"
        ? <div className="card" style={{textAlign:"center",padding:20,background:"#0e1f18"}}><div style={{fontSize:36}}>🧠</div><div className="sub" style={{margin:"8px 0 0"}}>Bài tập tư duy / thi đấu — không cần sơ đồ bàn, tập trung vào quy trình.</div></div>
        : (cfg && <PoolTable balls={cfg.balls} arrows={cfg.arrows} carom={cfg.carom}/>)}
      {dg!=="mental" && <div style={{fontSize:11,color:"var(--muted-2)",marginTop:6}}>Sơ đồ minh hoạ (vị trí tương đối) · ⚪ bi cái · 🟡 bi mục tiêu · 🟢 vùng tới · 🔴 bi cản</div>}
      <div className="shead" style={{marginTop:14}}>Hướng dẫn từng bước</div>
      <ol style={{margin:0,paddingLeft:18,lineHeight:1.6,fontSize:13.5}}>{steps.map((s,i)=><li key={i} style={{marginBottom:6}}>{s}</li>)}</ol>
      {det.tip && <div className="card" style={{marginTop:12,padding:"10px 12px",borderColor:"#4a3808"}}>💡 <b style={{color:"var(--gold)"}}>Mẹo:</b> {det.tip}</div>}
      <button className="btn ghost block" style={{marginTop:14}} onClick={onClose}>Đóng</button>
    </div></div>
  );
}

const SEED_TRAINING = ()=>[
  {id:"t1",date:daysAgoStr(1),minutes:90, club:"c1",game:"9 bi",            drills:["Cắt bi góc","Đi bi 1 chạm"],          rating:4,note:"Vào nước tốt, còn lỗi khi đi bi dài."},
  {id:"t2",date:daysAgoStr(2),minutes:60, club:"c1",game:"Bi-a lỗ (8 bi)",  drills:["Đẩy bi cái (stop/follow/draw)"],       rating:3,note:""},
  {id:"t3",date:daysAgoStr(4),minutes:120,club:"c2",game:"9 bi",            drills:["Cú phá","Gãi bi"],   rating:5,note:"Buổi tập tốt nhất tuần."},
  {id:"t4",date:daysAgoStr(6),minutes:45, club:"", game:"Bi-a lỗ (8 bi)",   drills:["Kê cơ & tư thế"],                      rating:3,note:"Tập tư thế ở nhà."},
];

function Training({flash,user}){
  const [seg,setSeg]     = useState("log");
  const [logs,setLogs]   = useState(()=>{ const s=store.get("ct.training",null); return s||SEED_TRAINING(); });
  const [goal,setGoal]   = useState(()=>store.get("ct.goal",180)); // phút/tuần
  const [adding,setAdding]=useState(false);
  const [editGoal,setEditGoal]=useState(false);

  useEffect(()=>{ store.set("ct.training",logs); },[logs]);
  useEffect(()=>{ store.set("ct.goal",goal); },[goal]);

  const sorted = useMemo(()=>[...logs].sort((a,b)=>a.date<b.date?1:-1),[logs]);
  const total  = logs.reduce((s,l)=>s+l.minutes,0);
  const week   = logs.filter(l=>l.date>=daysAgoStr(6)).reduce((s,l)=>s+l.minutes,0);
  const goalPct= goal>0? Math.min(100,Math.round(week/goal*100)) : 0;
  const avgRating= logs.length? (logs.reduce((s,l)=>s+l.rating,0)/logs.length).toFixed(1) : "–";

  // streak: số ngày liên tiếp (tính tới hôm nay) có ít nhất 1 buổi tập
  const streak = useMemo(()=>{
    const set=new Set(logs.map(l=>l.date)); let n=0;
    for(let i=0;i<400;i++){ if(set.has(daysAgoStr(i))) n++; else if(i>0) break; }
    return n;
  },[logs]);

  // biểu đồ 14 ngày gần đây
  const chart = useMemo(()=>{
    const arr=[]; for(let i=13;i>=0;i--){ const d=daysAgoStr(i); arr.push({d, m:logs.filter(l=>l.date===d).reduce((s,l)=>s+l.minutes,0)}); }
    return {arr, max:Math.max(60,...arr.map(a=>a.m))};
  },[logs]);

  // bài tập tập nhiều nhất
  const topDrills = useMemo(()=>{
    const c={}; logs.forEach(l=>l.drills.forEach(d=>c[d]=(c[d]||0)+1));
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,4);
  },[logs]);

  const del = id => setLogs(ls=>ls.filter(l=>l.id!==id));
  const add = s  => { setLogs(ls=>[{...s,id:"t"+Date.now()},...ls]); setAdding(false); flash("Đã lưu buổi tập 💪"); };

  return (
    <div>
      <div className="h1">Tập luyện</div>
      <div className="sub">Nhật ký · bài tập · bài tập hình · tâm lý · video — luyện toàn diện (dữ liệu riêng của bạn).</div>

      <div className="seg">
        <button className={seg==="log"?"on":""} onClick={()=>setSeg("log")}>Nhật ký</button>
        <button className={seg==="drills"?"on":""} onClick={()=>setSeg("drills")}>Bài tập</button>
        <button className={seg==="program"?"on":""} onClick={()=>setSeg("program")}>Bài tập hình</button>
        <button className={seg==="psych"?"on":""} onClick={()=>setSeg("psych")}>Tâm lý</button>
        <button className={seg==="video"?"on":""} onClick={()=>setSeg("video")}>Video</button>
        <button className={seg==="rules"?"on":""} onClick={()=>setSeg("rules")}>Luật</button>
      </div>

      {seg==="program" && <ProgramTab user={user}/>}
      {seg==="psych" && <PsychTab/>}
      {seg==="video" && <VideoTab/>}
      {seg==="rules" && <RulesTab/>}

      {seg==="drills" && <DrillProgress flash={flash}/>}

      {seg==="log" && <React.Fragment>
      <div className="card" style={{borderColor:"#4a3808"}}>💡 <b style={{color:"var(--gold)"}}>Mẹo hôm nay:</b> {["Giữ yên đầu & thân khi vào cơ.","Đưa mắt theo bi cái tới khi nó dừng.","Lực vừa đủ — kiểm soát quan trọng hơn mạnh.","Tạo nhịp pre-shot cố định trước mỗi cú.","Mỗi buổi dành 10' luyện bi cắt mỏng."][new Date().getDate()%5]}</div>
      <div className="card">
        <div className="row"><div className="grow">
          <b>Mục tiêu tuần</b>
          <div style={{color:"var(--muted)",fontSize:12.5,marginTop:2}}>{week} / {goal} phút · 7 ngày qua</div>
        </div><button className="btn sm ghost" onClick={()=>setEditGoal(true)}>Đổi</button></div>
        <div style={{height:12,background:"#0b1813",border:"1px solid var(--line)",borderRadius:999,marginTop:11,overflow:"hidden"}}>
          <div style={{height:"100%",width:goalPct+"%",background:goalPct>=100?"#37d67a":"var(--gold)",transition:"width .3s"}}></div></div>
        <div style={{textAlign:"right",fontSize:12,color:"var(--muted)",marginTop:5}}>{goalPct}%{goalPct>=100?" — Đạt mục tiêu! 🎉":""}</div>
      </div>

      <div className="stat">
        <div className="b"><b>{streak}</b><small>Streak 🔥</small></div>
        <div className="b"><b>{(total/60).toFixed(1)}h</b><small>Tổng giờ</small></div>
        <div className="b"><b>{logs.length}</b><small>Buổi tập</small></div>
        <div className="b"><b>{avgRating}</b><small>Điểm TB ⭐</small></div>
      </div>

      <div className="card" style={{marginTop:12}}>
        <b>14 ngày gần đây</b>
        <div className="row" style={{alignItems:"flex-end",gap:4,height:90,marginTop:12}}>
          {chart.arr.map((a,i)=>(
            <div key={i} className="grow" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}} title={a.m+" phút"}>
              <div style={{width:"100%",maxWidth:18,height:Math.max(3,a.m/chart.max*68),background:a.m?"var(--felt-light)":"#142a20",borderRadius:4}}></div>
              <small style={{fontSize:8.5,color:"var(--muted-2)"}}>{fmtDateVN(a.d).split("/")[0]}</small>
            </div>
          ))}
        </div>
        {topDrills.length>0 && <div style={{marginTop:14}}>
          <div style={{fontSize:12.5,color:"var(--muted)",fontWeight:700,marginBottom:7}}>BÀI TẬP NHIỀU NHẤT</div>
          <div className="gts">{topDrills.map(([d,n])=><span key={d} className="chip">{d} · {n}×</span>)}</div>
        </div>}
      </div>

      <button className="btn block" style={{marginTop:14}} onClick={()=>setAdding(true)}>+ Ghi buổi tập</button>

      <div style={{marginTop:16}}>
        {sorted.length===0 && <div className="empty"><div className="ic">📈</div>Chưa có buổi tập nào. Bấm "Ghi buổi tập" để bắt đầu!</div>}
        {sorted.map(l=>(
          <div className="card" key={l.id} style={{padding:13}}>
            <div className="row" style={{alignItems:"flex-start"}}><div className="grow">
              <div className="row wrap" style={{gap:7}}><b>{fmtDateVN(l.date)}</b><span className="chip gt">{l.game}</span><span className="chip">{l.minutes}′</span><span>{"⭐".repeat(l.rating)}</span></div>
              <div style={{color:"var(--muted)",fontSize:12.5,marginTop:5}}>📍 {l.club?(clubById(l.club)?clubById(l.club).name:"—"):"Tại nhà / khác"}</div>
            </div><button className="btn sm danger" onClick={()=>del(l.id)}>Xoá</button></div>
            {l.drills.length>0 && <div className="gts" style={{marginTop:9}}>{l.drills.map(d=><span key={d} className="chip">{d}</span>)}</div>}
            {l.note && <div style={{color:"var(--muted)",fontSize:13,marginTop:9,fontStyle:"italic"}}>"{l.note}"</div>}
          </div>
        ))}
      </div>

      {adding && <TrainingForm onSave={add} onClose={()=>setAdding(false)} />}
      {editGoal && <GoalModal goal={goal} onSave={g=>{setGoal(g);setEditGoal(false);}} onClose={()=>setEditGoal(false)} />}
      </React.Fragment>}
    </div>
  );
}

/* Theo dõi điểm số từng bài tập theo thời gian */
const SEED_DRILLSCORES = ()=>[
  {id:"d1",date:daysAgoStr(6),drill:"Cắt bi góc",made:5,total:10},
  {id:"d2",date:daysAgoStr(4),drill:"Cắt bi góc",made:6,total:10},
  {id:"d3",date:daysAgoStr(2),drill:"Cắt bi góc",made:8,total:10},
  {id:"d4",date:daysAgoStr(1),drill:"Cắt bi góc",made:7,total:10},
  {id:"d5",date:daysAgoStr(3),drill:"Cú phá",made:3,total:10},
  {id:"d6",date:daysAgoStr(1),drill:"Cú phá",made:5,total:10},
];

function DrillProgress({flash}){
  const [scores,setScores]=useState(()=>{ const s=store.get("ct.drillscores",null); return s||SEED_DRILLSCORES(); });
  const [drill,setDrill]=useState(DRILLS[1]);
  const [adding,setAdding]=useState(false);
  useEffect(()=>{ store.set("ct.drillscores",scores); },[scores]);

  const mine = useMemo(()=> scores.filter(s=>s.drill===drill)
    .sort((a,b)=>a.date<b.date?-1:1), [scores,drill]);
  const pct = s => Math.round(s.made/s.total*100);
  const best = mine.length? Math.max(...mine.map(pct)) : 0;
  const last = mine.length? pct(mine[mine.length-1]) : 0;
  const first= mine.length? pct(mine[0]) : 0;
  const trend= last-first;

  const add = s => { setScores(ls=>[{...s,id:"d"+Date.now()},...ls]); setAdding(false); flash("Đã ghi điểm bài tập 🎯"); };
  const del = id => setScores(ls=>ls.filter(s=>s.id!==id));

  return (
    <div>
      <div className="field"><label>Chọn bài tập</label>
        <select className="select" value={drill} onChange={e=>setDrill(e.target.value)}>{DRILLS.map(d=><option key={d}>{d}</option>)}</select></div>

      {DRILL_GUIDE[drill] && <div className="card" style={{borderColor:"#1c5c44",marginBottom:12}}>
        <div className="shead" style={{color:"var(--gold)"}}>Hướng dẫn · {drill}</div>
        <div style={{fontSize:13.5,marginBottom:6}}>🎯 <b>Mục tiêu:</b> {DRILL_GUIDE[drill].goal}</div>
        <div style={{fontSize:13.5,color:"var(--muted)",lineHeight:1.55}}>🛠️ {DRILL_GUIDE[drill].how}</div>
      </div>}

      <div className="stat">
        <div className="b"><b>{mine.length?last+"%":"–"}</b><small>Gần nhất</small></div>
        <div className="b"><b>{mine.length?best+"%":"–"}</b><small>Tốt nhất</small></div>
        <div className="b"><b>{mine.length}</b><small>Lần ghi</small></div>
        <div className="b"><b style={{color:trend>=0?"#37d67a":"#e5564b"}}>{mine.length>1?(trend>=0?"+":"")+trend+"%":"–"}</b><small>Tiến bộ</small></div>
      </div>
      <div style={{fontSize:11.5,color:"var(--muted-2)",margin:"8px 2px 0"}}>📊 Mốc tham khảo: tay mơ ~40% · hạng C–D ~65% · hạng A–B ~85% · hạng CN ~95%</div>

      <div className="card" style={{marginTop:12}}>
        <b>Độ chính xác theo thời gian</b>
        {mine.length===0
          ? <div style={{color:"var(--muted)",fontSize:13.5,marginTop:8}}>Chưa có dữ liệu cho bài này. Bấm "Ghi điểm" để thêm lần tập đầu tiên.</div>
          : <div className="row" style={{alignItems:"flex-end",gap:6,height:120,marginTop:14}}>
            {mine.map(s=>(
              <div key={s.id} className="grow" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}} title={s.made+"/"+s.total}>
                <small style={{fontSize:10,color:"var(--gold)",fontWeight:800}}>{pct(s)}%</small>
                <div style={{width:"100%",maxWidth:26,height:Math.max(4,pct(s)/100*82),background:"linear-gradient(180deg,var(--gold),var(--gold-dim))",borderRadius:5}}></div>
                <small style={{fontSize:8.5,color:"var(--muted-2)"}}>{fmtDateVN(s.date)}</small>
              </div>
            ))}
          </div>}
      </div>

      <button className="btn block" style={{marginTop:14}} onClick={()=>setAdding(true)}>+ Ghi điểm bài tập</button>

      <div style={{marginTop:16}}>
        {[...scores].sort((a,b)=>a.date<b.date?1:-1).slice(0,10).map(s=>(
          <div className="card" key={s.id} style={{padding:"11px 13px"}}>
            <div className="row"><div className="grow">
              <div className="row wrap" style={{gap:7}}><b>{fmtDateVN(s.date)}</b><span className="chip">{s.drill}</span></div>
              <div style={{color:"var(--muted)",fontSize:12.5,marginTop:4}}>{s.made}/{s.total} bi · <b style={{color:"var(--gold)"}}>{pct(s)}%</b></div>
            </div><button className="btn sm danger" onClick={()=>del(s.id)}>Xoá</button></div>
          </div>
        ))}
      </div>

      {adding && <DrillForm drill={drill} onSave={add} onClose={()=>setAdding(false)} />}
    </div>
  );
}

function ProgramTab({user}){
  const myTier = tierOf(user.elo).name;
  const [cat,setCat]=useState(0);
  const [openDrill,setOpenDrill]=useState(null);
  const [sub,setSub]=useState("drills"); // drills | tip
  const totalDrills = DRILL_LIBRARY.reduce((s,c)=>s+c.items.length,0);
  // Điểm yếu tự xác định → lọc bài tập
  const bandOf = t => ["I","H","G"].includes(t)?"Mới":["F","E","D"].includes(t)?"TB":"Cao";
  const myBand = bandOf(myTier);
  const [weak,setWeak]=useState(()=>store.get("ct.weakness",[]));
  useEffect(()=>{ store.set("ct.weakness",weak); },[weak]);
  const toggleWeak = i => setWeak(w=>w.includes(i)?w.filter(x=>x!==i):[...w,i]);
  const weakDrills = weak.flatMap(i=>DRILL_LIBRARY[i].items.map(it=>({...it,cat:DRILL_LIBRARY[i].cat,icon:DRILL_LIBRARY[i].icon})))
    .sort((a,b)=>(a.lv===myBand?0:1)-(b.lv===myBand?0:1));
  const segBar = (
    <div className="seg">
      <button className={sub==="drills"?"on":""} onClick={()=>setSub("drills")}>📐 Bài tập hình</button>
      <button className={sub==="tip"?"on":""} onClick={()=>setSub("tip")}>🎱 Đầu cơ</button>
    </div>
  );
  if(sub==="tip") return (<div>{segBar}<TipTab/></div>);
  return (
    <div>
      {segBar}
      <div className="sub" style={{marginTop:2}}>Lộ trình & {totalDrills} bài tập chia theo kỹ năng — tự luyện có hệ thống theo đúng trình của bạn.</div>

      <div className="shead">Lộ trình theo trình độ</div>
      {LEVEL_PLAN.map(p=>{ const mine=p.match.includes(myTier); return (
        <div className="card" key={p.band} style={{marginBottom:10,borderColor:mine?"var(--gold)":"var(--line)",background:mine?"rgba(242,193,78,.06)":undefined}}>
          <div className="row"><b className="grow" style={{color:p.color}}>{p.band}</b>
            {mine && <span className="chip" style={{marginRight:6,background:"#2a2410",color:"var(--gold)",borderColor:"var(--gold)"}}>Trình của bạn</span>}
            <span className="chip">{p.tiers}</span></div>
          <div className="gts" style={{marginTop:9}}>{p.focus.map(f=><span key={f} className="chip">{f}</span>)}</div>
          <div style={{fontSize:12.5,color:"var(--muted)",marginTop:9}}>🎯 {p.goal}</div>
        </div>
      );})}

      <div className="shead" style={{marginTop:18}}>Bài tập chuẩn</div>
      {ROUTINES.map(r=>(
        <div className="card" key={r.name} style={{marginBottom:10}}>
          <div className="row"><b className="grow">{r.name}</b><span className="chip">{r.level}</span></div>
          <div style={{fontSize:13,marginTop:7}}>🎯 <b>Mục tiêu:</b> {r.goal}</div>
          <div style={{fontSize:13,color:"var(--muted)",marginTop:5,lineHeight:1.55}}>🛠️ {r.how}</div>
          <div style={{fontSize:12,color:"var(--gold)",marginTop:7}}>📊 Chuẩn tham khảo: {r.target}</div>
        </div>
      ))}
      <div className="shead" style={{marginTop:18}}>🎯 Bài tập theo điểm yếu</div>
      <div className="card">
        <div className="sub" style={{margin:"0 0 10px"}}>Chọn (các) kỹ năng bạn thấy yếu — app lọc & ưu tiên bài tập đúng điểm yếu, hợp trình <b>{myBand}</b> của bạn.</div>
        <div className="multi">{DRILL_LIBRARY.map((c,i)=>(
          <span key={i} className={"pill"+(weak.includes(i)?" on":"")} onClick={()=>toggleWeak(i)}>{c.icon} {c.cat}</span>))}</div>
        {weak.length>0 && <button className="btn sm ghost" style={{marginTop:11}} onClick={()=>setWeak([])}>Xoá lựa chọn</button>}
      </div>
      {weak.length>0
        ? <React.Fragment>
            <div className="sub" style={{margin:"10px 2px 6px",fontSize:12.5}}><b style={{color:"var(--gold)"}}>{weakDrills.length} bài</b> cho điểm yếu của bạn (ưu tiên mức {myBand}, chạm để xem sơ đồ & hướng dẫn):</div>
            <div className="card">
              {weakDrills.map((it,j)=>(
                <div key={it.cat+it.n} onClick={()=>setOpenDrill(it)} style={{padding:"9px 4px",cursor:"pointer",borderRadius:8,borderBottom:j<weakDrills.length-1?"1px dashed var(--line)":"none"}}>
                  <div className="row" style={{gap:8,alignItems:"baseline"}}><b className="grow" style={{fontSize:13.5}}>{it.n}</b>
                    <span className="chip" style={{background:"transparent",color:LV[it.lv].c,borderColor:LV[it.lv].b}}>{it.lv}</span>
                    <span style={{color:"var(--muted)",fontSize:16}}>›</span></div>
                  <div style={{fontSize:11.5,color:"var(--muted-2)",marginTop:2}}>{it.icon} {it.cat} · {it.d}</div>
                </div>
              ))}
            </div>
          </React.Fragment>
        : <div className="sub" style={{margin:"8px 2px 0",fontSize:12.5}}>Chưa chọn điểm yếu nào — chọn ở trên để nhận bài tập phù hợp.</div>}

      <div className="shead" style={{marginTop:18}}>Thư viện {totalDrills} bài tập theo kỹ năng</div>
      <div className="scrollx" style={{marginBottom:10}}>
        {DRILL_LIBRARY.map((c,i)=><span key={c.cat} className={"pill"+(cat===i?" on":"")} onClick={()=>setCat(i)}>{c.icon} {c.cat}</span>)}
      </div>
      <div className="card">
        <div className="row" style={{marginBottom:8}}><b className="grow">{DRILL_LIBRARY[cat].icon} {DRILL_LIBRARY[cat].cat}</b><span className="chip">{DRILL_LIBRARY[cat].items.length} bài</span></div>
        {DRILL_LIBRARY[cat].items.map((it,j)=>(
          <div key={j} onClick={()=>setOpenDrill(it)} style={{padding:"9px 4px",cursor:"pointer",borderRadius:8,borderBottom:j<DRILL_LIBRARY[cat].items.length-1?"1px dashed var(--line)":"none"}}>
            <div className="row" style={{gap:8,alignItems:"baseline"}}><b className="grow" style={{fontSize:13.5}}>{j+1}. {it.n}</b>
              <span className="chip" style={{background:"transparent",color:LV[it.lv].c,borderColor:LV[it.lv].b}}>{it.lv}</span>
              <span style={{color:"var(--muted)",fontSize:16}}>›</span></div>
            <div style={{fontSize:12.5,color:"var(--muted)",marginTop:3,lineHeight:1.5}}>{it.d}</div>
          </div>
        ))}
      </div>
      <div className="sub" style={{textAlign:"center",margin:"8px 0 0",fontSize:12}}>👆 Chạm một bài để xem <b style={{color:"var(--gold)"}}>sơ đồ bàn + hướng dẫn từng bước</b>.</div>
      <div className="legal" style={{margin:"12px auto"}}>Phương pháp luyện phổ biến trong giới bi-a — điều chỉnh theo HLV & khả năng của bạn. Ghi điểm từng bài ở tab <b>Bài tập</b>.</div>
      {openDrill && <DrillModal drill={openDrill} onClose={()=>setOpenDrill(null)} />}
    </div>
  );
}

      <line x1="55" y1="90" x2="120" y2="52" stroke="#ffffff55" strokeWidth="1" strokeDasharray="2 2"/>
      <circle cx="55" cy="90" r="7" fill="#fff" stroke="#0006"/>
      <circle cx="124" cy="49" r="7" fill="#f4d35e" stroke="#0006"/>
      <line x1="128" y1="46" x2="188" y2="22" stroke="#f4d35e" strokeWidth="1.6" strokeDasharray="4 3" markerEnd="url(#ah2g)"/>

      <line x1="120" y1="55" x2="180" y2="86" stroke="#37d67a" strokeWidth="1.4" strokeDasharray="3 3" markerEnd="url(#ah2)"/>

      <text x="160" y="116" textAnchor="middle" fontSize="7" fill="#fff" fontWeight="700">STUN (tiếp tuyến)</text>
      <text x="184" y="84" textAnchor="end" fontSize="7" fill="#37d67a" fontWeight="700">FOLLOW</text>
      <text x="108" y="118" textAnchor="middle" fontSize="7" fill="#9ec7ff" fontWeight="700">DRAW</text>

function CueBall({sel,onSel}){
  const R=44,cx=60,cy=60,d=23;
  return (
    <svg viewBox="0 0 120 122" style={{width:150,height:152,display:"block",margin:"0 auto"}}>
      <circle cx={cx} cy={cy} r={R} fill="#fdfdfd" stroke="#cfcfcf" strokeWidth="1"/>
      <ellipse cx={cx-14} cy={cy-15} rx="11" ry="8" fill="#ffffff" opacity="0.9"/>
      <circle cx={cx} cy={cy} r={R*0.6} fill="none" stroke="#00000022" strokeWidth="1" strokeDasharray="3 3"/>
      {TIP_POINTS.map(p=>{const X=cx+p.x*d,Y=cy+p.y*d;const on=sel===p.id;return (
        <circle key={p.id} cx={X} cy={Y} r="7" fill={on?"#f2c14e":"#16302455"} stroke={on?"#3a2e06":"#0008"} strokeWidth="1.2"
          onClick={()=>onSel(p.id)} style={{cursor:"pointer"}}/>);})}
      <text x={cx} y="9" textAnchor="middle" fontSize="7" fill="#8fb0a1" fontWeight="700">CAO</text>
      <text x={cx} y="119" textAnchor="middle" fontSize="7" fill="#8fb0a1" fontWeight="700">THẤP</text>
      <text x="3" y={cy+2} fontSize="7" fill="#8fb0a1" fontWeight="700">TRÁI</text>
      <text x="117" y={cy+2} textAnchor="end" fontSize="7" fill="#8fb0a1" fontWeight="700">PHẢI</text>
    </svg>
  );
}

  return (

      <div className="sub" style={{marginTop:2}}>Điểm chạm của đầu cơ (đã lơ) lên bi cái quyết định bi cái đi tới, lùi hay xoáy. Chạm vào một điểm trên bi để xem.</div>
      <div className="card" style={{textAlign:"center"}}>
        <CueBall sel={sel} onSel={setSel}/>
        <div style={{fontSize:11,color:"var(--muted-2)",marginTop:2}}>Vòng nét đứt = giới hạn an toàn; đánh ra ngoài rất dễ <b>trượt đầu cơ (miscue)</b>.</div>
      </div>
      <div className="card" style={{borderColor:"var(--gold)",background:"rgba(242,193,78,.06)"}}>
        <b style={{color:"var(--gold)",fontSize:15}}>{p.n}</b>
        <div style={{fontSize:13.5,marginTop:7}}>🎱 <b>Hiệu ứng:</b> {p.e}</div>
        <div style={{fontSize:13.5,color:"var(--muted)",marginTop:5}}>🎯 <b>Dùng khi:</b> {p.u}</div>
      </div>
      <div className="shead" style={{marginTop:16}}>Nguyên tắc đầu cơ</div>
      <div className="card">
        {TIP_PRINCIPLES.map((t,i)=><div key={i} style={{fontSize:13,lineHeight:1.5,margin:"6px 0",paddingLeft:16,textIndent:-16}}>• {t}</div>)}
      </div>

      <div className="shead" style={{marginTop:16}}>Bi cái đi đâu? (đường tiếp tuyến)</div>
      <div className="card">
        <TangentDiagram/>
        <div style={{fontSize:12.5,color:"var(--muted)",marginTop:9,lineHeight:1.55}}>Cùng một cú cắt, điểm chạm quyết định đường bi cái: <b style={{color:"#fff"}}>Stun</b> đi theo đường tiếp tuyến (vuông góc đường tâm 2 bi) · <b style={{color:"#37d67a"}}>Follow</b> chếch tới trước · <b style={{color:"#9ec7ff"}}>Draw</b> kéo lùi lại. Đây là nền tảng để 'đi' bi cái sau mỗi cú.</div>
      </div>

      <div className="shead" style={{marginTop:16}}>3 hiện tượng phải biết khi đánh xoáy</div>
      {TIP_EFFECTS.map(e=>(
        <div className="card" key={e.k} style={{marginBottom:8}}>
          <b style={{fontSize:14}}>{e.k}</b>
          <div style={{fontSize:13,color:"var(--muted)",marginTop:5,lineHeight:1.5}}>{e.d}</div>
          <div style={{fontSize:12.5,color:"var(--gold)",marginTop:6}}>✅ Cách bù: {e.fix}</div>
        </div>
      ))}

      <div className="shead" style={{marginTop:16}}>Lỗi thường gặp</div>
      <div className="card">{TIP_MISTAKES.map((t,i)=><div key={i} style={{fontSize:13,lineHeight:1.5,margin:"6px 0",paddingLeft:18,textIndent:-18}}>⚠️ {t}</div>)}</div>

      <div className="shead" style={{marginTop:16}}>Bảo dưỡng đầu cơ & lơ</div>
      <div className="card">{TIP_CARE.map((t,i)=><div key={i} style={{fontSize:13,lineHeight:1.5,margin:"6px 0",paddingLeft:18,textIndent:-18}}>🧰 {t}</div>)}</div>

      <div className="shead" style={{marginTop:16}}>Bài tập đầu cơ</div>
      {TIP_DRILLS.map(dr=>(
        <div className="card" key={dr.n} style={{marginBottom:10}}>
          <b style={{fontSize:14}}>{dr.n}</b>
          <ol style={{margin:"7px 0 0",paddingLeft:18,lineHeight:1.6,fontSize:13.5}}>{dr.s.map((s,i)=><li key={i} style={{marginBottom:4}}>{s}</li>)}</ol>
        </div>
      ))}
      <div className="legal" style={{margin:"12px auto"}}>Kiến thức bi-a chung (điểm chạm, squirt/swerve, miscue) — tham khảo, cảm giác thực tế tuỳ cây cơ & đầu cơ của bạn.</div>
    </div>
  );
}
